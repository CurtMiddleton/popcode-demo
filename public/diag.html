<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Popcode Diagnostic</title>
    <style>
      body {
        font-family: -apple-system, system-ui, sans-serif;
        background: #111; color: #eee;
        padding: 16px; margin: 0;
        font-size: 14px;
      }
      h1 { font-size: 18px; margin: 0 0 12px; }
      .row {
        padding: 10px 12px; margin-bottom: 8px;
        border-radius: 8px;
        background: #222;
        border-left: 4px solid #555;
        word-break: break-word;
      }
      .row.ok { border-left-color: #4c4; }
      .row.err { border-left-color: #f44; }
      .row.pending { border-left-color: #fc4; }
      .label { font-weight: bold; }
      .detail { font-size: 11px; color: #aaa; margin-top: 4px; font-family: monospace; }
      .time { color: #888; font-size: 11px; }
    </style>
  </head>
  <body>
    <h1>Popcode diagnostic</h1>
    <div id="results"></div>

    <script>
      const results = document.getElementById('results');
      const t0 = performance.now();

      function addRow(label) {
        const row = document.createElement('div');
        row.className = 'row pending';
        row.innerHTML = '<div class="label">' + label + '</div><div class="detail">pending…</div>';
        results.appendChild(row);
        return row;
      }
      function updateRow(row, status, detail) {
        row.className = 'row ' + status;
        const elapsed = Math.round(performance.now() - t0);
        row.querySelector('.detail').textContent = detail + '  [' + elapsed + 'ms]';
      }

      // Row 0: confirm inline script runs at all
      const rowScript = addRow('0. inline script running');
      updateRow(rowScript, 'ok', 'yes');

      // Row 1: basic fetch to Google (baseline network test)
      const rowNet = addRow('1. network baseline (fetch google.com)');
      fetch('https://www.google.com/generate_204', { mode: 'no-cors' })
        .then(() => updateRow(rowNet, 'ok', 'fetch succeeded'))
        .catch(e => updateRow(rowNet, 'err', 'FETCH FAILED: ' + e.message));

      // Row 2: load supabase CDN
      const rowSupa = addRow('2. load supabase CDN');
      const supaScript = document.createElement('script');
      supaScript.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
      supaScript.onload = () => updateRow(rowSupa, 'ok', 'supabase loaded, window.supabase=' + typeof window.supabase);
      supaScript.onerror = (e) => updateRow(rowSupa, 'err', 'supabase FAILED to load');
      document.head.appendChild(supaScript);

      // Row 3: load A-Frame CDN
      const rowAframe = addRow('3. load A-Frame CDN');
      const aframeScript = document.createElement('script');
      aframeScript.src = 'https://aframe.io/releases/1.4.2/aframe.min.js';
      aframeScript.onload = () => updateRow(rowAframe, 'ok', 'aframe loaded, window.AFRAME=' + typeof window.AFRAME);
      aframeScript.onerror = () => updateRow(rowAframe, 'err', 'aframe FAILED to load');
      document.head.appendChild(aframeScript);

      // Row 4: load MindAR CDN (after A-Frame loads)
      const rowMindar = addRow('4. load MindAR CDN (after A-Frame)');
      aframeScript.addEventListener('load', () => {
        const mindarScript = document.createElement('script');
        mindarScript.src = 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js';
        mindarScript.onload = () => updateRow(rowMindar, 'ok', 'mindar loaded');
        mindarScript.onerror = () => updateRow(rowMindar, 'err', 'mindar FAILED to load');
        document.head.appendChild(mindarScript);
      });

      // Row 5: test supabase query (after supabase loads)
      const rowQuery = addRow('5. supabase query test');
      supaScript.addEventListener('load', () => {
        try {
          const db = window.supabase.createClient(
            'https://mrwpkhsluzokytpvmwqk.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yd3BraHNsdXpva3l0cHZtd3FrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTA2MDksImV4cCI6MjA5MTE2NjYwOX0.YMfuRpKvcmfoJ75Gxhf7ekoCaeDfR0Dsz_9Beg5ULAI'
          );
          db.from('collections').select('*').eq('slug', 'egrbne2j').single()
            .then(({ data, error }) => {
              if (error) {
                updateRow(rowQuery, 'err', 'query error: ' + error.message);
              } else {
                updateRow(rowQuery, 'ok', 'query returned: ' + (data ? 'row found' : 'no row'));
              }
            })
            .catch(e => updateRow(rowQuery, 'err', 'query rejected: ' + e.message));
        } catch (e) {
          updateRow(rowQuery, 'err', 'createClient threw: ' + e.message);
        }
      });

      // Row 6: try creating a minimal WebGL context
      const rowWebGL = addRow('6. WebGL context creation');
      try {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        if (gl) {
          const ext = gl.getExtension('WEBGL_debug_renderer_info');
          const renderer = ext ? gl.getParameter(ext.UNMASKED_RENDERER_WEBGL) : 'unknown';
          updateRow(rowWebGL, 'ok', 'WebGL ok, renderer: ' + renderer);
        } else {
          updateRow(rowWebGL, 'err', 'WebGL NOT available');
        }
      } catch (e) {
        updateRow(rowWebGL, 'err', 'WebGL threw: ' + e.message);
      }

      // Row 7: user agent
      const rowUA = addRow('7. user agent');
      updateRow(rowUA, 'ok', navigator.userAgent);

      // Row 8: fetch the actual .mind file for egrbne2j
      const rowMind = addRow('8. fetch .mind file for egrbne2j');
      supaScript.addEventListener('load', () => {
        const db2 = window.supabase.createClient(
          'https://mrwpkhsluzokytpvmwqk.supabase.co',
          'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yd3BraHNsdXpva3l0cHZtd3FrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTA2MDksImV4cCI6MjA5MTE2NjYwOX0.YMfuRpKvcmfoJ75Gxhf7ekoCaeDfR0Dsz_9Beg5ULAI'
        );
        db2.from('collections').select('mind_file_url').eq('slug', 'egrbne2j').single()
          .then(({ data, error }) => {
            if (error || !data) {
              updateRow(rowMind, 'err', 'no mind_file_url: ' + (error?.message || 'empty'));
              return;
            }
            const mindUrl = data.mind_file_url;
            const mindStart = performance.now();
            fetch(mindUrl)
              .then(r => {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.arrayBuffer();
              })
              .then(buf => {
                const ms = Math.round(performance.now() - mindStart);
                updateRow(rowMind, 'ok', 'downloaded ' + buf.byteLength + ' bytes in ' + ms + 'ms');
              })
              .catch(e => updateRow(rowMind, 'err', 'mind fetch failed: ' + e.message));
          });
      });

      // Row 9: create a real <a-scene> with mindar-image and wait for arReady
      const rowScene = addRow('9. create a-scene + mindar-image (10s timeout)');
      Promise.all([
        new Promise(res => aframeScript.addEventListener('load', res)),
        new Promise(res => supaScript.addEventListener('load', res))
      ]).then(() => {
        // MindAR loads after A-Frame, wait for it too
        const waitForMindar = () => {
          if (window.AFRAME && window.AFRAME.components['mindar-image']) return Promise.resolve();
          return new Promise(res => setTimeout(res, 100)).then(waitForMindar);
        };
        return waitForMindar();
      }).then(() => {
        const db3 = window.supabase.createClient(
          'https://mrwpkhsluzokytpvmwqk.supabase.co',
          'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yd3BraHNsdXpva3l0cHZtd3FrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTA2MDksImV4cCI6MjA5MTE2NjYwOX0.YMfuRpKvcmfoJ75Gxhf7ekoCaeDfR0Dsz_9Beg5ULAI'
        );
        return db3.from('collections').select('mind_file_url').eq('slug', 'egrbne2j').single();
      }).then(({ data }) => {
        const mindUrl = data.mind_file_url;
        const sceneStart = performance.now();
        const scene = document.createElement('a-scene');
        scene.setAttribute('mindar-image', 'imageTargetSrc: ' + mindUrl + '; autoStart: false;');
        scene.setAttribute('embedded', '');
        scene.setAttribute('vr-mode-ui', 'enabled: false');
        scene.setAttribute('device-orientation-permission-ui', 'enabled: false');
        scene.style.position = 'fixed'; scene.style.top = '-9999px'; scene.style.left = '-9999px';
        scene.style.width = '1px'; scene.style.height = '1px';

        const sceneTimeout = setTimeout(() => {
          updateRow(rowScene, 'err', 'TIMEOUT: arReady did not fire in 10s');
        }, 10000);

        scene.addEventListener('arReady', () => {
          clearTimeout(sceneTimeout);
          const ms = Math.round(performance.now() - sceneStart);
          updateRow(rowScene, 'ok', 'arReady fired in ' + ms + 'ms');
        });
        scene.addEventListener('arError', (e) => {
          clearTimeout(sceneTimeout);
          updateRow(rowScene, 'err', 'arError: ' + (e?.detail?.message || 'unknown'));
        });

        try {
          document.body.appendChild(scene);
        } catch (e) {
          clearTimeout(sceneTimeout);
          updateRow(rowScene, 'err', 'appendChild threw: ' + e.message);
        }
      }).catch(e => updateRow(rowScene, 'err', 'setup failed: ' + e.message));
    </script>
  </body>
</html>
