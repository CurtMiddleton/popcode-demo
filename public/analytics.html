<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Popcode — Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <style>
      @font-face {
        font-family: 'FilsonPro';
        src: url('/assets/fonts/FilsonProMedium/font.woff2') format('woff2'),
             url('/assets/fonts/FilsonProMedium/font.woff') format('woff');
        font-weight: 400; font-style: normal;
      }
      @font-face {
        font-family: 'FilsonPro';
        src: url('/assets/fonts/FilsonProBold/font.woff2') format('woff2'),
             url('/assets/fonts/FilsonProBold/font.woff') format('woff');
        font-weight: 700; font-style: normal;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh; background: #f2f0eb;
        font-family: 'FilsonPro', sans-serif; color: #1a1a1a;
        display: flex; flex-direction: column; align-items: center;
        padding: 0 0 80px; overflow-x: hidden;
      }
      .site-header {
        width: 100vw; background: linear-gradient(135deg, #7657FC 0%, #589AF9 100%);
        padding: 24px 24px 40px; min-height: 200px;
        display: flex; align-items: flex-end; justify-content: center;
        position: relative; margin-bottom: 32px; align-self: stretch;
      }
      .top-bar {
        width: 100%; max-width: 900px; padding: 0 24px;
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 24px; gap: 12px; flex-wrap: wrap;
      }
      .top-bar h1 { font-size: 26px; font-weight: 700; }
      .back-btn {
        background: linear-gradient(135deg, #7657FC 0%, #589AF9 100%);
        color: white; border: none; border-radius: 24px;
        padding: 10px 20px; font-size: 14px; font-weight: 700;
        font-family: 'FilsonPro', sans-serif; cursor: pointer;
        text-decoration: none; white-space: nowrap;
      }
      .content { width: 100%; max-width: 900px; padding: 0 24px; }

      .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
      @media (max-width: 560px) { .cards { grid-template-columns: repeat(2, 1fr); } }
      .card { background: white; border-radius: 16px; padding: 20px 18px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
      .card-value { font-size: 36px; font-weight: 700; color: #1a1a1a; line-height: 1; margin-bottom: 6px; }
      .card-label { font-size: 12px; color: #888; }
      .card.highlight .card-value { color: #7657FC; }

      .section { margin-bottom: 28px; }
      .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
      .section-title { font-size: 16px; font-weight: 700; }

      .table-wrap { background: white; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: auto; }
      table { width: 100%; border-collapse: collapse; min-width: 500px; }
      th { background: #f8f7f4; font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.05em; padding: 10px 14px; text-align: left; white-space: nowrap; }
      td { font-size: 13px; padding: 10px 14px; border-top: 1px solid #f0eeea; vertical-align: middle; }
      tr:hover td { background: #fafaf8; }

      .pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
      .pill-iOS { background: #e8f0fe; color: #3b5bdb; }
      .pill-Android { background: #e6f9ee; color: #2b8a3e; }
      .pill-Desktop { background: #f0f0f0; color: #666; }
      .pill-Unknown { background: #f0f0f0; color: #999; }

      .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; }
      .badge-scan_open     { background: #f0f0f0; color: #555; }
      .badge-target_found  { background: #e8f9ee; color: #2b8a3e; }
      .badge-video_play    { background: #e8f0fe; color: #3b5bdb; }
      .badge-video_complete{ background: #ede9fe; color: #7657FC; }
      .badge-video_error   { background: #ffe8e8; color: #c92a2a; }

      .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
      .bar-label { font-size: 13px; width: 90px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .bar-track { flex: 1; background: #f0eeea; border-radius: 99px; height: 10px; overflow: hidden; }
      .bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(135deg, #7657FC 0%, #589AF9 100%); }
      .bar-count { font-size: 13px; font-weight: 700; width: 36px; text-align: right; flex-shrink: 0; }

      .range-bar { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
      .range-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #e0ddd6; background: white; font-size: 13px; font-weight: 700; font-family: 'FilsonPro', sans-serif; cursor: pointer; color: #555; }
      .range-btn.active { background: linear-gradient(135deg, #7657FC 0%, #589AF9 100%); color: white; border-color: transparent; }

      .loading-msg { display: flex; align-items: center; gap: 12px; color: #888; font-size: 14px; padding: 40px 0; }
      .spinner { width: 24px; height: 24px; border-radius: 50%; border: 3px solid #e8e8e8; border-top-color: #7657FC; animation: spin 0.8s linear infinite; flex-shrink: 0; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .empty { color: #aaa; font-size: 14px; text-align: center; padding: 32px; }
      .muted { color: #aaa; }
      .flag { font-size: 16px; margin-right: 4px; }
    </style>
  </head>
  <body>
    <header class="site-header">
      <img src="/assets/Popcode_logo.rev.svg" alt="Popcode" style="height:80px;"/>
      <button id="logout-btn" style="position:absolute;right:20px;top:20px;background:#78A7FF;color:white;border:none;border-radius:20px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:'FilsonPro',sans-serif;">Sign Out</button>
    </header>

    <div class="top-bar">
      <h1>Analytics</h1>
      <a href="/manage.html" class="back-btn">My Collections</a>
    </div>

    <div class="content">
      <div class="range-bar">
        <button class="range-btn" data-days="1">Today</button>
        <button class="range-btn" data-days="7">7 days</button>
        <button class="range-btn active" data-days="30">30 days</button>
        <button class="range-btn" data-days="90">90 days</button>
        <button class="range-btn" data-days="0">All time</button>
      </div>
      <div id="main-content">
        <div class="loading-msg"><div class="spinner"></div>Loading analytics...</div>
      </div>
    </div>

    <script>
      const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      let activeDays = 30;

      db.auth.getSession().then(({ data }) => {
        if (!data.session) { window.location.href = '/auth.html'; return; }
        loadAnalytics();
      });

      document.getElementById('logout-btn').addEventListener('click', async () => {
        await db.auth.signOut(); window.location.href = '/auth.html';
      });

      document.querySelectorAll('.range-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeDays = parseInt(btn.dataset.days);
          loadAnalytics();
        });
      });

      function formatDate(iso) {
        return new Date(iso).toLocaleString(undefined, {
          month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
      }
      function pct(a, b) { return b === 0 ? '—' : Math.round((a / b) * 100) + '%'; }

      function devicePill(d) {
        const cls = 'pill-' + (d || 'Unknown');
        return `<span class="pill ${cls}">${d || 'Unknown'}</span>`;
      }
      function eventBadge(e) {
        const labels = { scan_open: 'Opened', target_found: 'Photo Found', video_play: 'Video Played', video_complete: 'Completed', video_error: 'Error' };
        return `<span class="badge badge-${e}">${labels[e] || e}</span>`;
      }
      function countryFlag(code) {
        if (!code) return '';
        const flag = code.toUpperCase().replace(/./g, c => String.fromCodePoint(0x1F1E0 - 65 + c.charCodeAt(0)));
        return `<span class="flag">${flag}</span>`;
      }
      function barRows(obj, maxVal) {
        return Object.entries(obj).sort((a,b) => b[1]-a[1]).map(([label, n]) => `
          <div class="bar-row">
            <div class="bar-label" title="${label}">${label}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/maxVal*100)}%"></div></div>
            <div class="bar-count">${n}</div>
          </div>`).join('');
      }

      async function loadAnalytics() {
        document.getElementById('main-content').innerHTML =
          '<div class="loading-msg"><div class="spinner"></div>Loading...</div>';

        // Load ALL collections (not just current user's)
        const { data: allCols } = await db.from('collections').select('slug, name, user_id');
        const colNames = Object.fromEntries((allCols || []).map(c => [c.slug, c.name || c.slug]));

        // Load events — no slug filter, show everything
        let query = db.from('scan_events').select('*').order('created_at', { ascending: false });
        if (activeDays > 0) {
          const since = new Date(Date.now() - activeDays * 86400000).toISOString();
          query = query.gte('created_at', since);
        }
        const { data: events } = await query.limit(5000);
        const evts = events || [];

        if (evts.length === 0 && activeDays !== 0) {
          document.getElementById('main-content').innerHTML =
            '<p class="empty">No events in this period yet.</p>';
          return;
        }

        // ── Summary ───────────────────────────────────────────────────────────
        const opens     = evts.filter(e => e.event_type === 'scan_open').length;
        const found     = evts.filter(e => e.event_type === 'target_found').length;
        const plays     = evts.filter(e => e.event_type === 'video_play').length;
        const completes = evts.filter(e => e.event_type === 'video_complete').length;
        const errors    = evts.filter(e => e.event_type === 'video_error').length;
        const uniqueIPs = new Set(evts.map(e => e.ip_address).filter(Boolean)).size;

        // ── Breakdowns ────────────────────────────────────────────────────────
        const deviceCounts = {}, countryCounts = {}, colStats = {}, browserCounts = {};
        evts.forEach(e => {
          if (e.event_type === 'scan_open') {
            const d = e.device_type || 'Unknown';
            deviceCounts[d] = (deviceCounts[d] || 0) + 1;
            const c = e.country || 'Unknown';
            countryCounts[c] = (countryCounts[c] || 0) + 1;
            const b = e.browser || 'Unknown';
            browserCounts[b] = (browserCounts[b] || 0) + 1;
          }
          const s = e.slug;
          if (!colStats[s]) colStats[s] = { opens:0, found:0, plays:0, completes:0 };
          if (e.event_type === 'scan_open')      colStats[s].opens++;
          if (e.event_type === 'target_found')   colStats[s].found++;
          if (e.event_type === 'video_play')     colStats[s].plays++;
          if (e.event_type === 'video_complete') colStats[s].completes++;
        });

        const maxDevice  = Math.max(...Object.values(deviceCounts), 1);
        const maxCountry = Math.max(...Object.values(countryCounts), 1);
        const maxBrowser = Math.max(...Object.values(browserCounts), 1);

        const recent = evts.slice(0, 100);

        document.getElementById('main-content').innerHTML = `
          <!-- Summary cards -->
          <div class="cards">
            <div class="card"><div class="card-value">${opens}</div><div class="card-label">Total Opens</div></div>
            <div class="card highlight"><div class="card-value">${pct(found,opens)}</div><div class="card-label">Detection Rate</div></div>
            <div class="card"><div class="card-value">${plays}</div><div class="card-label">Videos Played</div></div>
            <div class="card highlight"><div class="card-value">${pct(completes,plays)}</div><div class="card-label">Completion Rate</div></div>
            <div class="card"><div class="card-value">${uniqueIPs}</div><div class="card-label">Unique Visitors</div></div>
            <div class="card"><div class="card-value">${errors}</div><div class="card-label">Errors</div></div>
          </div>

          <!-- Breakdowns row -->
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:28px;">
            <div class="section">
              <div class="section-title" style="margin-bottom:12px">Devices</div>
              <div class="table-wrap" style="padding:16px;min-width:0;">
                ${Object.keys(deviceCounts).length ? barRows(deviceCounts, maxDevice) : '<p class="empty" style="padding:8px">No data</p>'}
              </div>
            </div>
            <div class="section">
              <div class="section-title" style="margin-bottom:12px">Browsers</div>
              <div class="table-wrap" style="padding:16px;min-width:0;">
                ${Object.keys(browserCounts).length ? barRows(browserCounts, maxBrowser) : '<p class="empty" style="padding:8px">No data</p>'}
              </div>
            </div>
            <div class="section">
              <div class="section-title" style="margin-bottom:12px">Countries</div>
              <div class="table-wrap" style="padding:16px;min-width:0;">
                ${Object.keys(countryCounts).length ? barRows(countryCounts, maxCountry) : '<p class="empty" style="padding:8px">No data</p>'}
              </div>
            </div>
          </div>

          <!-- By collection -->
          <div class="section">
            <div class="section-title" style="margin-bottom:12px">By Collection</div>
            <div class="table-wrap">
              <table>
                <thead><tr>
                  <th>Collection</th><th>Opens</th><th>Detected</th><th>Det. Rate</th><th>Videos</th><th>Completed</th><th>Comp. Rate</th>
                </tr></thead>
                <tbody>
                  ${Object.entries(colStats).sort((a,b)=>b[1].opens-a[1].opens).map(([slug,s])=>`
                    <tr>
                      <td style="font-weight:700">${colNames[slug]||slug}</td>
                      <td>${s.opens}</td>
                      <td>${s.found}</td>
                      <td style="color:#7657FC;font-weight:700">${pct(s.found,s.opens)}</td>
                      <td>${s.plays}</td>
                      <td>${s.completes}</td>
                      <td style="color:#7657FC;font-weight:700">${pct(s.completes,s.plays)}</td>
                    </tr>`).join('')}
                </tbody>
              </table>
            </div>
          </div>

          <!-- Recent activity -->
          <div class="section">
            <div class="section-title" style="margin-bottom:12px">Recent Activity <span style="font-size:12px;color:#aaa;font-weight:400">(last 100 events)</span></div>
            <div class="table-wrap">
              ${recent.length === 0
                ? '<p class="empty">No events yet.</p>'
                : `<table>
                    <thead><tr>
                      <th>Time</th><th>Event</th><th>Collection</th>
                      <th>Device</th><th>Browser</th><th>Location</th><th>IP</th>
                    </tr></thead>
                    <tbody>
                      ${recent.map(e=>`
                        <tr>
                          <td class="muted" style="white-space:nowrap">${formatDate(e.created_at)}</td>
                          <td>${eventBadge(e.event_type)}</td>
                          <td style="font-weight:700">${colNames[e.slug]||e.slug}</td>
                          <td>${devicePill(e.device_type)}</td>
                          <td class="muted">${e.browser||'—'}</td>
                          <td style="white-space:nowrap">${countryFlag(e.country)}${e.city?e.city+', ':''} ${e.country||'—'}</td>
                          <td class="muted" style="font-size:11px">${e.ip_address||'—'}</td>
                        </tr>`).join('')}
                    </tbody>
                  </table>`}
            </div>
          </div>
        `;
      }
    </script>
  </body>
</html>
