    <script>
      const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      let activeDays = 30;
      let sortCol = 'created_at', sortDir = 'desc';
      let searchQuery = '';
      let cachedEvts = [], cachedColNames = {};
      let activityLimit = 25;   // chunk size: how many sessions each "show N" / "load more" click adds
      let activityShown = 25;   // how many sessions are currently visible in the activity log
      let cachedAccounts = null;
      let accountsExpanded = false;
      let activeTab = 'activity';
      let cachedThumbs = null;   // { collectionId: { targetIndex: photo_url } }
      let cachedSlugId = null;   // { slug: collectionId }

      const ADMIN_EMAIL = 'curtmid@gmail.com';
      const RANGE_TABS = new Set(['activity', 'overview', 'projects']);

      document.getElementById('main-content').innerHTML = '<p class="empty">Checking session...</p>';
      db.auth.getSession().then(({ data, error }) => {
        if (error) {
          document.getElementById('main-content').innerHTML = '<p class="empty">Auth error: ' + error.message + '</p>';
          return;
        }
        if (!data.session) { window.location.href = '/auth.html'; return; }
        if (data.session.user.email !== ADMIN_EMAIL) { window.location.href = '/manage.html'; return; }
        const uName = data.session.user?.user_metadata?.full_name?.split(' ')[0] || data.session.user?.email?.split('@')[0] || '';
        if (uName) { const g = document.getElementById('user-greeting'); if (g) g.textContent = 'Hi, ' + uName + '!'; }
        document.getElementById('main-content').innerHTML = '<p class="empty">Session OK, loading data...</p>';
        loadAnalytics();
        loadCostData();
        loadAccounts();
        loadPrints();
      }).catch(e => {
        document.getElementById('main-content').innerHTML = '<p class="empty">JS error: ' + e.message + '</p>';
      });

      document.getElementById('logout-btn').addEventListener('click', async () => {
        await db.auth.signOut(); window.location.href = '/auth.html';
      });

      document.querySelectorAll('.range-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeDays = parseInt(btn.dataset.days);
          activityShown = activityLimit; // reset pagination when time range changes
          loadAnalytics();
        });
      });

      // Tabs: show one panel at a time; the date range only applies to the
      // scan-derived tabs (Activity / Overview / Projects).
      function showTab(name) {
        activeTab = name;
        document.querySelectorAll('#tabs .tab').forEach(function(b) { b.classList.toggle('active', b.dataset.tab === name); });
        document.querySelectorAll('.tab-body').forEach(function(el) { el.style.display = (el.dataset.tab === name) ? '' : 'none'; });
        const rb = document.getElementById('range-bar');
        if (rb) rb.style.display = RANGE_TABS.has(name) ? '' : 'none';
      }
      document.querySelectorAll('#tabs .tab').forEach(function(btn) {
        btn.addEventListener('click', function() { showTab(btn.dataset.tab); });
      });
      showTab(activeTab);

      function formatDate(iso) {
        return new Date(iso).toLocaleString(undefined, {
          month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
      }
      function pct(a, b) { return b === 0 ? '—' : Math.round((a / b) * 100) + '%'; }

      function devicePill(d) {
        const cls = 'pill-' + (d || 'Unknown');
        return `<span class="pill ${cls}">${d || 'Unknown'}</span>`;
      }
      function eventBadge(e) {
        const labels = { scan_open: 'Opened', target_found: 'Photo Found', video_play: 'Video Played', video_complete: 'Video Done', video_error: 'Error', audio_play: 'Audio Played', audio_complete: 'Audio Done' };
        return `<span class="badge badge-${e}">${labels[e] || e}</span>`;
      }
      function countryFlag(code) {
        if (!code) return '';
        const flag = code.toUpperCase().replace(/./g, c => String.fromCodePoint(0x1F1E6 - 65 + c.charCodeAt(0)));
        return '<span class="flag">' + flag + '</span>';
      }
      var COLS = [
        { key: 'created_at', label: 'Time' },
        { key: 'event_type', label: 'Event' },
        { key: 'slug',       label: 'Project' },
        { key: 'device_type',label: 'Device' },
        { key: 'browser',    label: 'Browser' },
        { key: 'country',    label: 'Location' },
        { key: 'ip_address', label: 'IP' },
        { key: 'user',       label: 'User' }
      ];

      function getUser(e) { return e.user_name || e.user_email || ''; }
      function getLocation(e) { return (e.city || '') + ' ' + (e.region || '') + ' ' + (e.country || ''); }
      function parseModel(ua) {
        if (!ua) return '—';
        // iPhone model from user agent
        var iphone = ua.match(/iPhone OS (\d+)_/);
        if (iphone) {
          // Map iOS version to approximate iPhone model
          var ios = parseInt(iphone[1]);
          if (ios >= 18) return 'iPhone 16+';
          if (ios >= 17) return 'iPhone 15+';
          if (ios >= 16) return 'iPhone 14+';
          if (ios >= 15) return 'iPhone 13+';
          if (ios >= 14) return 'iPhone 12+';
          return 'iPhone (iOS ' + ios + ')';
        }
        // iPad
        if (/iPad/.test(ua)) return 'iPad';
        // Android device
        var android = ua.match(/Android [^;]+; ([^)]+)\)/);
        if (android) {
          var model = android[1].trim();
          // Shorten common brands
          model = model.replace(/^Samsung /i, '').replace(/^SM-/i, 'Samsung ');
          return model.length > 20 ? model.substring(0, 20) + '…' : model;
        }
        if (/Windows/.test(ua)) return 'Windows PC';
        if (/Macintosh/.test(ua)) return 'Mac';
        return '—';
      }

      function buildSessions(events) {
        // Sort ascending to group consecutive events
        var sorted = events.slice().sort(function(a, b) { return a.created_at.localeCompare(b.created_at); });
        var sessions = [];
        var openMap = {}; // key -> session ref

        sorted.forEach(function(e) {
          var userKey = e.user_id || e.ip_address || 'anon';
          var key = userKey + '|' + (e.slug || '');
          var t = new Date(e.created_at).getTime();

          if (openMap[key]) {
            var sess = openMap[key];
            var lastT = new Date(sess.events[sess.events.length - 1].created_at).getTime();
            if (t - lastT <= 30 * 60 * 1000) {
              sess.events.push(e);
              return;
            }
            delete openMap[key];
          }
          var newSess = { id: sessions.length, events: [e] };
          sessions.push(newSess);
          openMap[key] = newSess;
        });

        // Sort sessions newest first
        sessions.sort(function(a, b) { return b.events[0].created_at.localeCompare(a.events[0].created_at); });
        return sessions;
      }

      function renderActivityTable() {
        var wrap = document.getElementById('activity-wrap');
        if (!wrap) return;

        var q = searchQuery.trim().toLowerCase();
        var rows = cachedEvts.filter(function(e) {
          if (!q) return true;
          return (cachedColNames[e.slug] || e.slug || '').toLowerCase().includes(q) ||
                 getUser(e).toLowerCase().includes(q) ||
                 getLocation(e).toLowerCase().includes(q) ||
                 (e.ip_address || '').toLowerCase().includes(q) ||
                 (e.event_type || '').toLowerCase().includes(q) ||
                 (e.browser || '').toLowerCase().includes(q) ||
                 (e.device_type || '').toLowerCase().includes(q);
        });

        rows.sort(function(a, b) {
          var av = sortCol === 'user' ? getUser(a) : (a[sortCol] || '');
          var bv = sortCol === 'user' ? getUser(b) : (b[sortCol] || '');
          if (av < bv) return sortDir === 'asc' ? -1 : 1;
          if (av > bv) return sortDir === 'asc' ? 1 : -1;
          return 0;
        });

        var sessions = buildSessions(rows);
        var totalSessions = sessions.length;
        if (activityShown > 0) sessions = sessions.slice(0, activityShown);

        var thead = '<thead><tr>' + COLS.map(function(c) {
          var arrow = sortCol === c.key ? (sortDir === 'asc' ? ' ↑' : ' ↓') : '';
          return '<th style="cursor:pointer;user-select:none" data-col="' + c.key + '">' + c.label + '<span style="color:#7657FC">' + arrow + '</span></th>';
        }).join('') +
        '<th>Model</th>' +
        '<th title="How often a photo was successfully detected after the scanner was opened. Low % may just mean the user opened the scanner without pointing it at a photo.">Scan Rate</th>' +
        '<th title="How often a video played all the way through, out of videos that started.">Comp. Rate</th>' +
        '<th style="width:32px"></th></tr></thead>';

        var tbody = '';
        if (sessions.length === 0) {
          tbody = '<tr><td colspan="12" class="empty">No matching events.</td></tr>';
        } else {
          sessions.forEach(function(sess) {
            var first = sess.events[0];
            var count = sess.events.length;
            var hasMore = count > 1;
            var sid = 'sess-' + sess.id;
            var loc = countryFlag(first.country) + (first.city ? first.city + ', ' : '') + (first.region ? first.region + ' ' : '') + (first.country || '—');

            var opens     = sess.events.filter(function(e) { return e.event_type === 'scan_open'; }).length;
            var found     = sess.events.filter(function(e) { return e.event_type === 'target_found'; }).length;
            var played    = sess.events.filter(function(e) { return e.event_type === 'video_play' || e.event_type === 'audio_play'; }).length;
            var completed = sess.events.filter(function(e) { return e.event_type === 'video_complete' || e.event_type === 'audio_complete'; }).length;

            var detRate  = opens   > 0 ? Math.round(found / opens * 100) + '%'     : '—';
            var compRate = played  > 0 ? Math.round(completed / played * 100) + '%' : '—';

            var detColor  = (opens > 0 && found >= opens)   ? 'color:#2b8a3e;font-weight:700' : (found > 0 ? 'color:#e67700;font-weight:700' : '');
            var compColor = (played > 0 && completed >= played) ? 'color:#7657FC;font-weight:700' : (completed > 0 ? 'color:#e67700;font-weight:700' : '');

            var foundTd    = '<td style="' + detColor  + '">' + detRate  + '</td>';
            var completedTd= '<td style="' + compColor + '">' + compRate + '</td>';

            tbody += '<tr class="session-row">';
            tbody += '<td class="muted" style="white-space:nowrap">' + formatDate(first.created_at) + '</td>';
            tbody += '<td>' + eventBadge(first.event_type) + (hasMore ? ' <span style="font-size:10px;color:#aaa;font-weight:700">+' + (count - 1) + '</span>' : '') + '</td>';
            tbody += '<td style="font-weight:600">' + (cachedColNames[first.slug] || first.slug) + '</td>';
            tbody += '<td>' + devicePill(first.device_type) + '</td>';
            tbody += '<td class="muted">' + (first.browser || '—') + '</td>';
            tbody += '<td style="white-space:nowrap">' + loc + '</td>';
            tbody += '<td class="muted" style="font-size:11px">' + (first.ip_address || '—') + '</td>';
            tbody += '<td class="muted" style="font-size:11px">' + (first.user_name || first.user_email || '—') + '</td>';
            tbody += '<td class="muted" style="font-size:11px">' + parseModel(first.user_agent) + '</td>';
            tbody += foundTd + completedTd;
            tbody += '<td>' + (hasMore ? '<button class="expand-btn" data-sid="' + sid + '">&#9658;</button>' : '') + '</td>';
            tbody += '</tr>';

            if (hasMore) {
              sess.events.slice(1).forEach(function(e) {
                var cloc = countryFlag(e.country) + (e.city ? e.city + ', ' : '') + (e.region ? e.region + ' ' : '') + (e.country || '—');
                tbody += '<tr class="child-row" data-parent="' + sid + '" style="display:none">';
                tbody += '<td class="muted" style="white-space:nowrap;padding-left:20px">' + formatDate(e.created_at) + '</td>';
                tbody += '<td>' + eventBadge(e.event_type) + '</td>';
                tbody += '<td style="font-weight:600">' + (cachedColNames[e.slug] || e.slug) + '</td>';
                tbody += '<td>' + devicePill(e.device_type) + '</td>';
                tbody += '<td class="muted">' + (e.browser || '—') + '</td>';
                tbody += '<td style="white-space:nowrap">' + cloc + '</td>';
                tbody += '<td class="muted" style="font-size:11px">' + (e.ip_address || '—') + '</td>';
                tbody += '<td class="muted" style="font-size:11px">' + (e.user_name || e.user_email || '—') + '</td>';
                tbody += '<td></td><td></td><td></td>';
                tbody += '</tr>';
              });
            }
          });

          // "Load more" row — only shown if there are more sessions behind activityShown
          if (totalSessions > activityShown) {
            var remaining = totalSessions - activityShown;
            var increment = Math.min(activityLimit, remaining);
            tbody +=
              '<tr class="loadmore-row"><td colspan="12">' +
                '<button class="loadmore-btn" id="loadmore-btn">' +
                  'Load ' + increment + ' more ▼ ' +
                  '<span style="color:#aaa;font-weight:500;font-size:11px">' +
                    '(' + activityShown + ' of ' + totalSessions + ' shown)' +
                  '</span>' +
                '</button>' +
              '</td></tr>';
          } else if (totalSessions > activityLimit) {
            // Everything is shown — give a quiet confirmation, no button
            tbody +=
              '<tr class="loadmore-row"><td colspan="12" style="color:#aaa;font-size:11px">' +
                'All ' + totalSessions + ' sessions shown' +
              '</td></tr>';
          }
        }

        wrap.innerHTML = '<table>' + thead + '<tbody>' + tbody + '</tbody></table>';

        wrap.querySelectorAll('th[data-col]').forEach(function(th) {
          th.addEventListener('click', function() {
            var col = th.dataset.col;
            if (sortCol === col) { sortDir = sortDir === 'asc' ? 'desc' : 'asc'; }
            else { sortCol = col; sortDir = 'asc'; }
            renderActivityTable();
          });
        });

        wrap.querySelectorAll('.expand-btn').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var sid = btn.dataset.sid;
            var children = wrap.querySelectorAll('[data-parent="' + sid + '"]');
            var isOpen = btn.innerHTML === '&#9660;' || btn.textContent === '▼';
            children.forEach(function(row) { row.style.display = isOpen ? 'none' : ''; });
            btn.innerHTML = isOpen ? '&#9658;' : '&#9660;';
          });
        });

        var loadMoreBtn = document.getElementById('loadmore-btn');
        if (loadMoreBtn) {
          loadMoreBtn.addEventListener('click', function() {
            activityShown += activityLimit;
            renderActivityTable();
          });
        }
      }

      function renderRow(e, colNames) {
        var loc = countryFlag(e.country) + (e.city ? e.city + ', ' : '') + (e.region ? e.region + ' ' : '') + (e.country || '—');
        return '<tr>' +
          '<td class="muted" style="white-space:nowrap">' + formatDate(e.created_at) + '</td>' +
          '<td>' + eventBadge(e.event_type) + '</td>' +
          '<td style="font-weight:600">' + (colNames[e.slug] || e.slug) + '</td>' +
          '<td>' + devicePill(e.device_type) + '</td>' +
          '<td class="muted">' + (e.browser || '—') + '</td>' +
          '<td style="white-space:nowrap">' + loc + '</td>' +
          '<td class="muted" style="font-size:11px">' + (e.ip_address || '—') + '</td>' +
          '<td class="muted" style="font-size:11px">' + (e.user_name || e.user_email || '—') + '</td>' +
          '</tr>';
      }

      function barRows(obj, maxVal) {
        return Object.entries(obj).sort((a,b) => b[1]-a[1]).map(([label, n]) => `
          <div class="bar-row">
            <div class="bar-label" title="${label}">${label}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/maxVal*100)}%"></div></div>
            <div class="bar-count">${n}</div>
          </div>`).join('');
      }

      // ── Hosting cost estimate panel ──────────────────────────────────────
      // Pulls real storage size by listing the `experiences` bucket and
      // estimates egress from this-month scan_events. Everything below is
      // calendar-month scoped (billing is monthly) and does NOT respond to
      // the range-button selector above.
      async function loadCostData() {
        const el = document.getElementById('cost-section');
        if (!el) return;
        el.innerHTML = '<div class="cost-panel"><div class="cost-loading"><div class="spinner"></div>Calculating hosting cost estimate…</div></div>';

        try {
          const now = new Date();
          const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
          const daysElapsed = now.getDate();
          const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();

          // ── Storage: walk the `experiences` bucket ──
          // Structure per CLAUDE.md: `{slug}/target.mind` + `{slug}/video_N.mp4`
          // Top-level items are slug folders (metadata === null) plus any
          // legacy root-level files.
          let totalStorageBytes = 0;
          let fileCount = 0;
          let videoBytes = 0;
          let videoCount = 0;

          const { data: topLevel, error: topErr } = await db.storage
            .from('experiences').list('', { limit: 1000 });
          if (topErr) throw new Error('storage.list root: ' + topErr.message);

          // Count any root-level files (shouldn't be many; legacy only)
          (topLevel || []).forEach(i => {
            if (i && i.metadata && i.metadata.size) {
              totalStorageBytes += i.metadata.size;
              fileCount++;
              if (/\.(mp4|mov|webm|m4v)$/i.test(i.name)) {
                videoBytes += i.metadata.size;
                videoCount++;
              }
            }
          });

          // Slug folders are items without metadata
          const slugNames = (topLevel || [])
            .filter(i => i && !i.metadata)
            .map(i => i.name);

          // List files inside each slug folder in parallel
          const slugResults = await Promise.all(slugNames.map(slug =>
            db.storage.from('experiences').list(slug, { limit: 1000 })
              .then(r => ({ slug: slug, files: (r && r.data) || [] }))
              .catch(() => ({ slug: slug, files: [] }))
          ));

          slugResults.forEach(sr => {
            sr.files.forEach(f => {
              const sz = (f && f.metadata && f.metadata.size) || 0;
              if (sz <= 0) return;
              totalStorageBytes += sz;
              fileCount++;
              if (/\.(mp4|mov|webm|m4v)$/i.test(f.name)) {
                videoBytes += sz;
                videoCount++;
              }
            });
          });

          // ── Month-to-date event counts (for egress estimate) ──
          const [playRes, openRes] = await Promise.all([
            db.from('scan_events')
              .select('*', { count: 'exact', head: true })
              .eq('event_type', 'video_play')
              .gte('created_at', monthStart),
            db.from('scan_events')
              .select('*', { count: 'exact', head: true })
              .eq('event_type', 'scan_open')
              .gte('created_at', monthStart)
          ]);
          const playCount = playRes.count || 0;
          const openCount = openRes.count || 0;

          // ── Egress estimate ──
          // Each video_play streams one video (~avg video size).
          // Each scan_open downloads the .mind file once (~5 MB assumed).
          // Fallback avg if no videos yet: 40 MB (iPhone 1080p 30s default).
          const FALLBACK_VIDEO_BYTES = 40 * 1024 * 1024;
          const AVG_MIND_BYTES = 5 * 1024 * 1024;
          const avgVideoBytes = videoCount > 0 ? videoBytes / videoCount : FALLBACK_VIDEO_BYTES;
          const egressBytes = (playCount * avgVideoBytes) + (openCount * AVG_MIND_BYTES);

          // ── Cost math: Supabase Pro plan assumptions ──
          // Verify at https://supabase.com/pricing before quoting.
          const BASE = 25;
          const INCLUDED_STORAGE_GB = 100;
          const INCLUDED_EGRESS_GB = 250;
          const STORAGE_RATE = 0.021; // $/GB/mo over the 100 GB floor
          const EGRESS_RATE = 0.09;   // $/GB over the 250 GB floor
          const GB = 1024 * 1024 * 1024;

          const storageGB = totalStorageBytes / GB;
          const egressGB = egressBytes / GB;
          // Pro-rate to end of month to give a "on track for" projection
          const projectedEgressGB = daysElapsed > 0
            ? egressGB * (daysInMonth / daysElapsed)
            : egressGB;

          const storageOverage = Math.max(0, storageGB - INCLUDED_STORAGE_GB) * STORAGE_RATE;
          const projectedEgressOverage = Math.max(0, projectedEgressGB - INCLUDED_EGRESS_GB) * EGRESS_RATE;
          const projectedBill = BASE + storageOverage + projectedEgressOverage;

          // ── Bar colors ──
          const barClass = (used, included) => {
            const p = used / included;
            if (p > 1) return 'over';
            if (p > 0.7) return 'warn';
            return '';
          };
          const storagePct = Math.min(100, (storageGB / INCLUDED_STORAGE_GB) * 100);
          const egressPct  = Math.min(100, (egressGB / INCLUDED_EGRESS_GB) * 100);

          const fmtMoney = v => '$' + v.toFixed(2);
          const fmtGB = v => v < 0.1 ? v.toFixed(3) : v.toFixed(1);
          const monthName = now.toLocaleString(undefined, { month: 'long', year: 'numeric' });
          const monthShort = now.toLocaleString(undefined, { month: 'long' });

          el.innerHTML =
            '<div class="cost-panel">' +
              '<div class="cost-panel-header">' +
                '<div class="cost-panel-title">Hosting Cost Estimate</div>' +
                '<div class="cost-panel-month">' + monthName + ' · day ' + daysElapsed + ' of ' + daysInMonth + '</div>' +
              '</div>' +
              '<div class="cost-grid">' +
                '<div>' +
                  '<div class="cost-cell-label">Storage used</div>' +
                  '<div class="cost-cell-value">' + fmtGB(storageGB) + '<span class="cost-cell-unit"> GB / ' + INCLUDED_STORAGE_GB + '</span></div>' +
                  '<div class="cost-bar-track"><div class="cost-bar-fill ' + barClass(storageGB, INCLUDED_STORAGE_GB) + '" style="width:' + storagePct + '%"></div></div>' +
                  '<div class="cost-cell-sub">' + fileCount + ' files · ' + videoCount + ' videos · avg ' + (avgVideoBytes / (1024 * 1024)).toFixed(1) + ' MB per video</div>' +
                '</div>' +
                '<div>' +
                  '<div class="cost-cell-label">Egress (est.) month-to-date</div>' +
                  '<div class="cost-cell-value">' + fmtGB(egressGB) + '<span class="cost-cell-unit"> GB / ' + INCLUDED_EGRESS_GB + '</span></div>' +
                  '<div class="cost-bar-track"><div class="cost-bar-fill ' + barClass(egressGB, INCLUDED_EGRESS_GB) + '" style="width:' + egressPct + '%"></div></div>' +
                  '<div class="cost-cell-sub">' + playCount + ' video plays · ' + openCount + ' scanner opens · on pace for ~' + fmtGB(projectedEgressGB) + ' GB by month-end</div>' +
                '</div>' +
                '<div>' +
                  '<div class="cost-cell-label">Projected ' + monthShort + ' bill</div>' +
                  '<div class="cost-cell-value highlight">' + fmtMoney(projectedBill) + '</div>' +
                  '<div class="cost-cell-sub">Base $' + BASE + ' + storage overage ' + fmtMoney(storageOverage) + ' + egress overage ' + fmtMoney(projectedEgressOverage) + '</div>' +
                '</div>' +
              '</div>' +
              '<div class="cost-footnote">' +
                'Assumes Supabase <b>Pro</b> plan: $' + BASE + '/mo includes ' + INCLUDED_STORAGE_GB + ' GB storage + ' + INCLUDED_EGRESS_GB + ' GB egress. Overages: $' + STORAGE_RATE + '/GB storage, $' + EGRESS_RATE + '/GB egress. ' +
                'Egress is <b>estimated</b> (scan_events × avg video size + scan_opens × ~5 MB .mind file) — real egress includes CDN hits and bandwidth spikes we can\'t see from the client. Real bill may differ. ' +
                'Verify pricing at <a href="https://supabase.com/pricing" target="_blank" rel="noopener">supabase.com/pricing</a>. ' +
                'To hard-cap your monthly bill, turn on the <a href="https://supabase.com/docs/guides/platform/spend-cap" target="_blank" rel="noopener">Spend Cap</a> in the Supabase dashboard.' +
              '</div>' +
            '</div>';
        } catch (e) {
          console.warn('Cost panel error:', e);
          el.innerHTML =
            '<div class="cost-panel">' +
              '<div class="cost-panel-header"><div class="cost-panel-title">Hosting Cost Estimate</div></div>' +
              '<div class="cost-error">Could not load cost estimate: ' + (e && e.message ? e.message : e) + '</div>' +
            '</div>';
        }
      }

      // ── Accounts section ─────────────────────────────────────────────────
      // Fetched once on page load via the `get_all_users` RPC (admin-only,
      // see session notes for SQL). Cached in memory so the main-content
      // rebuild triggered by the range buttons doesn't re-query Supabase.
      async function loadAccounts() {
        const wrap = document.getElementById('accounts-wrap');
        if (!wrap) return; // main-content may not be rendered yet; will retry

        // If we already have them cached, just re-render from the cache
        if (cachedAccounts !== null) {
          renderAccounts();
          return;
        }

        wrap.innerHTML = '<div class="loading-msg"><div class="spinner"></div>Loading accounts…</div>';
        try {
          const { data, error } = await db.rpc('get_all_users', { max_rows: 35 });
          if (error) throw error;
          cachedAccounts = data || [];
          renderAccounts();
        } catch (e) {
          console.error('loadAccounts error:', e);
          wrap.innerHTML =
            '<div class="empty" style="padding:20px">Could not load accounts: ' + (e.message || e) +
            '<br><span style="font-size:11px;color:#aaa">If this says the RPC does not exist, run the <code>get_all_users</code> SQL in your Supabase dashboard (see session notes).</span></div>';
        }
      }

      function renderAccounts() {
        const wrap = document.getElementById('accounts-wrap');
        if (!wrap) return;
        if (!cachedAccounts || cachedAccounts.length === 0) {
          wrap.innerHTML = '<div class="empty">No accounts yet.</div>';
          return;
        }

        const users = cachedAccounts;
        const visibleCount = accountsExpanded ? users.length : Math.min(10, users.length);
        const hiddenCount = users.length - visibleCount;

        const rowHtml = function(u) {
          const nameDisplay = u.full_name || '—';
          return '<tr>' +
            '<td class="muted" style="white-space:nowrap">' + formatDate(u.created_at) + '</td>' +
            '<td style="font-weight:600">' + escapeHtml(nameDisplay) + '</td>' +
            '<td class="muted">' + escapeHtml(u.email || '—') + '</td>' +
            '<td class="muted" style="text-align:right">' + (u.project_count || 0) + '</td>' +
            '</tr>';
        };

        var tbody = users.slice(0, visibleCount).map(rowHtml).join('');

        if (users.length > 10) {
          const label = accountsExpanded
            ? 'Show fewer ▲'
            : 'Show ' + (users.length - 10) + ' more ▼';
          tbody += '<tr class="accounts-toggle-row"><td colspan="4">' +
            '<button class="accounts-toggle" id="accounts-toggle-btn">' + label + '</button>' +
            '</td></tr>';
        }

        wrap.innerHTML =
          '<table>' +
            '<thead><tr>' +
              '<th>Created</th>' +
              '<th>Name</th>' +
              '<th>Email</th>' +
              '<th style="text-align:right">Projects</th>' +
            '</tr></thead>' +
            '<tbody>' + tbody + '</tbody>' +
          '</table>';

        const btn = document.getElementById('accounts-toggle-btn');
        if (btn) {
          btn.addEventListener('click', function() {
            accountsExpanded = !accountsExpanded;
            renderAccounts();
          });
        }
      }

      // ── Print Orders section ─────────────────────────────────────────────
      // All orders across users via the admin-only get_all_print_orders RPC
      // (RLS otherwise limits reads to the buyer's own rows). Independent of the
      // scan-analytics date range, so it lives outside #main-content and loads
      // once. A "Retry" button resubmits a failed order to Prodigi.
      let cachedPrints = null;

      const PS_CLASS = {
        pending: 'ps-amber', paid: 'ps-blue', submitting: 'ps-blue',
        submitted: 'ps-green', in_production: 'ps-green', shipped: 'ps-green', complete: 'ps-green',
        prodigi_failed: 'ps-red', payment_failed: 'ps-red', cancelled: 'ps-gray',
      };
      const PS_LABEL = {
        pending: 'Pending', paid: 'Paid', submitting: 'Submitting',
        submitted: 'Submitted', in_production: 'In production', shipped: 'Shipped', complete: 'Complete',
        prodigi_failed: 'Print failed', payment_failed: 'Payment failed', cancelled: 'Cancelled',
      };
      // Money the customer was actually charged (paid + everything past it).
      const PAID_PLUS = new Set(['paid', 'submitting', 'submitted', 'in_production', 'shipped', 'complete', 'prodigi_failed']);
      // Successfully handed to Prodigi.
      const FULFILLED = new Set(['submitted', 'in_production', 'shipped', 'complete']);
      // Paid but not fulfilled — needs a human.
      const ACTION_NEEDED = new Set(['prodigi_failed', 'paid', 'submitting']);

      function money(minor, cur) {
        if (minor == null) return '—';
        const v = minor / 100;
        const s = v.toLocaleString(undefined, { minimumFractionDigits: v % 1 ? 2 : 0, maximumFractionDigits: 2 });
        return (!cur || cur === 'USD') ? '$' + s : s + ' ' + cur;
      }
      function prodigiErr(resp) {
        if (!resp || typeof resp !== 'object') return '';
        if (resp.message) return resp.message;
        if (resp.error) return typeof resp.error === 'string' ? resp.error : JSON.stringify(resp.error);
        if (resp.outcome && resp.outcome !== 'Ok' && resp.outcome !== 'Created') return resp.outcome;
        return '';
      }

      async function loadPrints() {
        const el = document.getElementById('prints-section');
        if (!el) return;
        if (cachedPrints !== null) { renderPrints(); return; }
        el.innerHTML =
          '<div class="section"><div class="section-title" style="margin-bottom:12px">Print Orders</div>' +
          '<div class="table-wrap"><div class="loading-msg" style="padding:24px"><div class="spinner"></div>Loading print orders…</div></div></div>';
        try {
          const { data, error } = await db.rpc('get_all_print_orders', { max_rows: 200 });
          if (error) throw error;
          cachedPrints = data || [];
          renderPrints();
        } catch (e) {
          console.error('loadPrints error:', e);
          el.innerHTML =
            '<div class="section"><div class="section-title" style="margin-bottom:12px">Print Orders</div>' +
            '<div class="empty" style="padding:20px">Could not load print orders: ' + escapeHtml(e.message || String(e)) +
            '<br><span style="font-size:11px;color:#aaa">If this says the function does not exist, run <code>get_all_print_orders</code> in Supabase (<code>supabase/migrations/2026-07-14-print-orders-admin-rpc.sql</code>).</span></div></div>';
        }
      }

      function renderPrints() {
        const el = document.getElementById('prints-section');
        if (!el) return;
        const orders = cachedPrints || [];

        const total = orders.length;
        const actionNeeded = orders.filter(o => ACTION_NEEDED.has(o.status)).length;
        const fulfilled = orders.filter(o => FULFILLED.has(o.status)).length;
        const revenue = orders.filter(o => PAID_PLUS.has(o.status))
          .reduce((s, o) => s + (o.total_charged_minor || 0), 0);

        const cards =
          '<div class="cards prints-cards">' +
            '<div class="card"><div class="card-value">' + total + '</div><div class="card-label">Total Orders</div></div>' +
            '<div class="card"><div class="card-value' + (actionNeeded ? ' danger' : '') + '">' + actionNeeded + '</div><div class="card-label">Action Needed</div></div>' +
            '<div class="card"><div class="card-value">' + fulfilled + '</div><div class="card-label">Fulfilled</div></div>' +
            '<div class="card highlight"><div class="card-value">' + money(revenue, 'USD') + '</div><div class="card-label">Revenue</div></div>' +
          '</div>';

        let table;
        if (!total) {
          table = '<div class="table-wrap"><div class="empty" style="padding:20px">No print orders yet.</div></div>';
        } else {
          const rows = orders.map(o => {
            const r = o.recipient || {};
            const buyerName = r.name || '—';
            const buyerEmail = o.buyer_email || r.email || '';
            const product = (o.product_type ? o.product_type.charAt(0).toUpperCase() + o.product_type.slice(1) : '—') +
              (o.sku ? ' <span class="muted">· ' + escapeHtml(o.sku) + '</span>' : '');
            return '<tr class="print-row" data-oid="' + o.id + '">' +
              '<td style="width:22px"><span class="pd-caret">▶</span></td>' +
              '<td class="muted" style="white-space:nowrap">' + formatDate(o.created_at) + '</td>' +
              '<td style="font-weight:700">' + escapeHtml(o.project_name || '—') + '</td>' +
              '<td><div style="font-weight:600">' + escapeHtml(buyerName) + '</div>' +
                (buyerEmail ? '<div class="muted" style="font-size:10.5px">' + escapeHtml(buyerEmail) + '</div>' : '') + '</td>' +
              '<td>' + product + ' <span class="muted" style="font-size:10px">× ' + (o.copies || 1) + '</span></td>' +
              '<td style="font-weight:700;white-space:nowrap">' + money(o.total_charged_minor, o.currency) + '</td>' +
              '<td><span class="ps ' + (PS_CLASS[o.status] || 'ps-gray') + '">' + (PS_LABEL[o.status] || o.status) + '</span></td>' +
            '</tr>' +
            '<tr class="pd-row" id="pd-' + o.id + '" style="display:none"><td class="pd-detail-cell" colspan="7">' + buildPrintDetail(o) + '</td></tr>';
          }).join('');

          table =
            '<div class="table-wrap"><table>' +
              '<thead><tr><th></th><th>Date</th><th>Project</th><th>Buyer</th><th>Product</th><th>Amount</th><th>Status</th></tr></thead>' +
              '<tbody>' + rows + '</tbody>' +
            '</table></div>';
        }

        el.innerHTML =
          '<div class="section"><div class="section-title" style="margin-bottom:12px">Print Orders</div>' +
          '<p class="muted" style="font-size:12px;margin:-4px 0 12px">Click an order to edit status, add a tracking link, resubmit, or preflight its assets.</p>' +
          cards + table + '</div>';

        el.querySelectorAll('tr.print-row').forEach(row => {
          row.addEventListener('click', () => {
            const oid = row.dataset.oid;
            const detail = document.getElementById('pd-' + oid);
            if (!detail) return;
            const open = detail.style.display !== 'none';
            detail.style.display = open ? 'none' : '';
            row.classList.toggle('pd-open', !open);
          });
        });
        el.querySelectorAll('.pd-row').forEach(dr => {
          const oid = dr.id.replace('pd-', '');
          const saveB = dr.querySelector('.pd-save');
          const pfB = dr.querySelector('.pd-preflight');
          const rsB = dr.querySelector('.pd-resubmit');
          if (saveB) saveB.addEventListener('click', () => savePrintOrder(oid, dr));
          if (pfB) pfB.addEventListener('click', () => preflightPrintOrder(oid, dr));
          if (rsB) rsB.addEventListener('click', () => retryPrintOrder(oid, rsB));
        });
      }

      function escapeAttr(s) { return escapeHtml(String(s == null ? '' : s)).replace(/"/g, '&quot;'); }

      function printStatusOptions(cur) {
        return ['pending', 'paid', 'submitting', 'submitted', 'in_production', 'shipped', 'complete', 'prodigi_failed', 'payment_failed', 'cancelled']
          .map(s => '<option value="' + s + '"' + (s === cur ? ' selected' : '') + '>' + (PS_LABEL[s] || s) + '</option>').join('');
      }

      function buildPrintDetail(o) {
        const r = o.recipient || {};
        const a = r.address || {};
        const addr = [a.line1, a.line2, [a.townOrCity, a.stateOrCounty, a.postalOrZipCode].filter(Boolean).join(', '), a.countryCode]
          .filter(Boolean).map(escapeHtml).join('<br>');
        const asset = Array.isArray(o.asset_urls) && o.asset_urls[0] && o.asset_urls[0].url;
        const retryable = ACTION_NEEDED.has(o.status) && !o.prodigi_order_id;
        const errMsg = (o.status === 'prodigi_failed') ? prodigiErr(o.prodigi_response) : '';
        const pid = o.prodigi_order_id ? escapeHtml(o.prodigi_order_id) : '—';
        return '<div class="pd-grid">' +
          '<div>' +
            '<div class="pd-title">' + escapeHtml(o.project_name || o.sku || 'Order') + '</div>' +
            '<div class="muted" style="font-size:12px;margin-bottom:14px">' + escapeHtml((o.product_type || '') + ' · ' + (o.sku || '')) + ' · Qty ' + (o.copies || 1) + '</div>' +
            '<div class="pd-label">Ship to</div>' +
            '<div style="font-size:12px;line-height:1.5;margin-bottom:12px">' + escapeHtml(r.name || '—') + '<br>' + (addr || '<span class="muted">no address</span>') +
              ((r.email || o.buyer_email) ? '<br><span class="muted">' + escapeHtml(r.email || o.buyer_email) + '</span>' : '') + '</div>' +
            '<div class="pd-label">Vendor order ID</div>' +
            '<div style="font-family:monospace;font-size:12px;margin-bottom:12px">' + pid + '</div>' +
            '<div class="pd-label">Amount</div>' +
            '<div style="font-weight:700">' + money(o.total_charged_minor, o.currency) + '</div>' +
            (errMsg ? '<div class="prints-err" style="margin-top:12px">' + escapeHtml(errMsg) + '</div>' : '') +
          '</div>' +
          '<div>' +
            '<div class="pd-label">Status</div>' +
            '<select class="pd-field pd-status">' + printStatusOptions(o.status) + '</select>' +
            '<div class="pd-label" style="margin-top:12px">Tracking URL</div>' +
            '<input class="pd-field pd-tracking" value="' + escapeAttr(o.tracking_url || '') + '" placeholder="https://…">' +
            '<div class="pd-label" style="margin-top:12px">Notes</div>' +
            '<textarea class="pd-field pd-notes" rows="3" placeholder="Internal notes">' + escapeHtml(o.admin_notes || '') + '</textarea>' +
            '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px">' +
              '<button class="pd-btn pd-save">Save changes</button>' +
              '<button class="pd-btn pd-preflight">Preflight</button>' +
              (retryable ? '<button class="pd-btn pd-resubmit">Resubmit</button>' : '') +
              (asset ? '<a class="pd-btn pd-preview" href="' + encodeURI(asset) + '" target="_blank" rel="noopener">Preview asset ↗</a>' : '') +
            '</div>' +
            '<div class="pd-msg"></div>' +
          '</div>' +
        '</div>';
      }

      async function savePrintOrder(oid, dr) {
        const status = dr.querySelector('.pd-status').value;
        const tracking_url = dr.querySelector('.pd-tracking').value;
        const admin_notes = dr.querySelector('.pd-notes').value;
        const btn = dr.querySelector('.pd-save');
        const msg = dr.querySelector('.pd-msg');
        btn.disabled = true; const t = btn.textContent; btn.textContent = 'Saving…';
        try {
          const { data: { session } } = await db.auth.getSession();
          const token = session && session.access_token;
          const resp = await fetch('/api/update-print-order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ orderId: oid, status, tracking_url, admin_notes }),
          });
          const data = await resp.json().catch(() => ({}));
          if (!resp.ok) throw new Error(data.error || ('HTTP ' + resp.status));
          const o = (cachedPrints || []).find(x => x.id === oid);
          if (o) { o.status = status; o.tracking_url = tracking_url; o.admin_notes = admin_notes; }
          renderPrints();
          const d = document.getElementById('pd-' + oid);
          const row = document.querySelector('tr.print-row[data-oid="' + oid + '"]');
          if (d) { d.style.display = ''; if (row) row.classList.add('pd-open'); const m = d.querySelector('.pd-msg'); if (m) { m.textContent = 'Saved.'; m.style.color = '#2b8a3e'; } }
        } catch (e) {
          msg.textContent = 'Save failed: ' + (e.message || e); msg.style.color = '#c92a2a';
          btn.disabled = false; btn.textContent = t;
        }
      }

      async function preflightPrintOrder(oid, dr) {
        const btn = dr.querySelector('.pd-preflight');
        const msg = dr.querySelector('.pd-msg');
        btn.disabled = true; const t = btn.textContent; btn.textContent = 'Checking…';
        try {
          const { data: { session } } = await db.auth.getSession();
          const token = session && session.access_token;
          const resp = await fetch('/api/update-print-order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ orderId: oid, action: 'preflight' }),
          });
          const data = await resp.json().catch(() => ({}));
          if (!resp.ok) throw new Error(data.error || ('HTTP ' + resp.status));
          const lines = (data.results || []).map(r =>
            (r.ok ? '✓' : '✗') + ' ' + (r.contentLength ? Math.round(r.contentLength / 1024) + ' KB · ' : '') + (r.status || r.error || '')
          ).join('<br>');
          msg.innerHTML = '<span style="color:' + (data.ok ? '#2b8a3e' : '#c92a2a') + '">' + (data.ok ? 'All assets reachable' : 'Asset problem') + '</span>' +
            (lines ? '<div class="muted" style="font-size:11px;margin-top:3px">' + lines + '</div>' : (data.message ? '<div class="muted">' + escapeHtml(data.message) + '</div>' : ''));
        } catch (e) {
          msg.textContent = 'Preflight failed: ' + (e.message || e); msg.style.color = '#c92a2a';
        }
        btn.disabled = false; btn.textContent = t;
      }

      async function retryPrintOrder(orderId, btn) {
        if (!orderId) return;
        btn.disabled = true;
        const original = btn.textContent;
        btn.textContent = 'Retrying…';
        try {
          const { data: { session } } = await db.auth.getSession();
          const token = session && session.access_token;
          if (!token) throw new Error('Not signed in');
          const resp = await fetch('/api/retry-print-order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ orderId }),
          });
          const data = await resp.json().catch(() => ({}));
          if (!resp.ok) throw new Error(data.error || ('HTTP ' + resp.status));
          if (data.status === 'submitted') {
            cachedPrints = null;   // force a fresh pull so KPIs + row update
            await loadPrints();
          } else {
            btn.textContent = original;
            btn.disabled = false;
            alert('Still failed: ' + (prodigiErr(data.prodigi) || data.error || data.status || 'unknown'));
          }
        } catch (e) {
          btn.textContent = original;
          btn.disabled = false;
          alert('Retry failed: ' + (e.message || e));
        }
      }

      // ── By Photo (per-target scan counts) ────────────────────────────────
      // scan_events records target_index on 'target_found', so we can show which
      // photo in a project actually gets scanned. Counts come from an admin RPC
      // (RLS-safe); thumbnails are joined from collection_items.
      async function loadThumbs() {
        if (cachedThumbs !== null) return;
        cachedThumbs = {}; cachedSlugId = {};
        try {
          const { data: cols } = await db.from('collections').select('id, slug');
          (cols || []).forEach(c => { cachedSlugId[c.slug] = c.id; });
          const { data: items } = await db.from('collection_items').select('collection_id, target_index, photo_url');
          (items || []).forEach(it => {
            if (!cachedThumbs[it.collection_id]) cachedThumbs[it.collection_id] = {};
            if (cachedThumbs[it.collection_id][it.target_index] == null) {
              cachedThumbs[it.collection_id][it.target_index] = it.photo_url || '';
            }
          });
        } catch (e) { console.warn('loadThumbs error', e); }
      }

      async function loadByVideo() {
        const wrap = document.getElementById('byvideo-wrap');
        if (!wrap) return;
        try {
          await loadThumbs();
          const { data, error } = await db.rpc('get_target_scan_counts', { days_back: activeDays });
          if (error) throw error;
          renderByVideo(data || []);
        } catch (e) {
          console.error('loadByVideo error:', e);
          wrap.innerHTML =
            '<div class="empty" style="padding:20px">Could not load photo scans: ' + escapeHtml(e.message || String(e)) +
            '<br><span style="font-size:11px;color:#aaa">If this says the function does not exist, run <code>get_target_scan_counts</code> in Supabase (<code>supabase/migrations/2026-07-14-target-scan-counts.sql</code>).</span></div>';
        }
      }

      function renderByVideo(rows) {
        const wrap = document.getElementById('byvideo-wrap');
        if (!wrap) return;
        if (!rows.length) {
          wrap.innerHTML = '<div class="empty" style="padding:20px">No photo-level scans in this range yet.</div>';
          return;
        }
        const bySlug = {};
        rows.forEach(r => { (bySlug[r.slug] = bySlug[r.slug] || []).push(r); });
        const projects = Object.entries(bySlug).map(([slug, list]) => ({
          slug, list, total: list.reduce((s, r) => s + Number(r.found_count || 0), 0),
        })).sort((a, b) => b.total - a.total);

        const cards = projects.map(p => {
          const cid = cachedSlugId ? cachedSlugId[p.slug] : null;
          const thumbs = (cid && cachedThumbs[cid]) || {};
          const max = Math.max.apply(null, p.list.map(r => Number(r.found_count || 0)).concat([1]));
          const rowsHtml = p.list.slice()
            .sort((a, b) => Number(b.found_count || 0) - Number(a.found_count || 0))
            .map(r => {
              const ti = r.target_index;
              const count = Number(r.found_count || 0);
              const thumb = thumbs[ti];
              const img = thumb
                ? '<img class="bv-thumb" src="' + encodeURI(thumb) + '" alt="" loading="lazy">'
                : '<div class="bv-thumb"></div>';
              return '<div class="bv-row">' + img +
                '<div class="bv-meta"><div class="bv-name">Photo ' + (ti + 1) + '</div>' +
                  '<div class="bv-bartrack"><div class="bv-barfill" style="width:' + Math.round(count / max * 100) + '%"></div></div></div>' +
                '<div class="bv-count">' + count + '<span>scans</span></div>' +
              '</div>';
            }).join('');
          const name = (cachedColNames && cachedColNames[p.slug]) || p.slug;
          return '<div class="bv-card"><h4>' + escapeHtml(name) + '</h4>' + rowsHtml + '</div>';
        }).join('');

        wrap.innerHTML = '<div class="byvideo-grid">' + cards + '</div>';
      }

      async function loadAnalytics() {
        document.getElementById('main-content').innerHTML =
          '<div class="loading-msg"><div class="spinner"></div>Loading...</div>';
        try {

        // Load ALL collections (not just current user's)
        const { data: allCols } = await db.from('collections').select('slug, name, user_id');
        const colNames = Object.fromEntries((allCols || []).map(c => [c.slug, c.name || c.slug]));

        // Load events — try RPC first (includes user email), fall back to direct query
        let evts = [];
        const { data: rpcData, error: rpcError } = await db.rpc('get_events_with_users', {
          days_back: activeDays,
          max_rows: 50000
        });
        if (!rpcError && rpcData) {
          evts = rpcData;
        } else {
          // RPC not set up yet — fall back to direct scan_events query
          let q = db.from('scan_events').select('*').order('created_at', { ascending: false });
          if (activeDays > 0) {
            const since = new Date(Date.now() - activeDays * 86400000).toISOString();
            q = q.gte('created_at', since);
          }
          const { data: fallback } = await q.limit(50000);
          evts = fallback || [];
        }

        if (evts.length === 0 && activeDays !== 0) {
          document.getElementById('main-content').innerHTML =
            '<p class="empty">No events in this period yet.</p>';
          return;
        }

        // ── Summary ───────────────────────────────────────────────────────────
        const opens     = evts.filter(e => e.event_type === 'scan_open').length;
        // Plays / completions cover BOTH video and audio popcodes.
        const vPlays     = evts.filter(e => e.event_type === 'video_play').length;
        const aPlays     = evts.filter(e => e.event_type === 'audio_play').length;
        const plays      = vPlays + aPlays;
        const vCompletes = evts.filter(e => e.event_type === 'video_complete').length;
        const aCompletes = evts.filter(e => e.event_type === 'audio_complete').length;
        const completes  = vCompletes + aCompletes;
        const errors     = evts.filter(e => e.event_type === 'video_error').length;
        const uniqueIPs = new Set(evts.map(e => e.ip_address).filter(Boolean)).size;

        // Detection rate = sessions with at least one target_found / total opens
        // Group by IP+day to approximate sessions
        const sessionsWithFound = new Set(
          evts.filter(e => e.event_type === 'target_found')
              .map(e => (e.ip_address || e.id) + '|' + (e.created_at || '').slice(0, 10))
        ).size;
        const sessionOpens = new Set(
          evts.filter(e => e.event_type === 'scan_open')
              .map(e => (e.ip_address || e.id) + '|' + (e.created_at || '').slice(0, 10))
        ).size;

        // ── Breakdowns ────────────────────────────────────────────────────────
        const deviceCounts = {}, countryCounts = {}, colStats = {}, browserCounts = {};
        evts.forEach(e => {
          if (e.event_type === 'scan_open') {
            const d = e.device_type || 'Unknown';
            deviceCounts[d] = (deviceCounts[d] || 0) + 1;
            const c = e.country || 'Unknown';
            countryCounts[c] = (countryCounts[c] || 0) + 1;
            const b = e.browser || 'Unknown';
            browserCounts[b] = (browserCounts[b] || 0) + 1;
          }
          const s = e.slug;
          if (!colStats[s]) colStats[s] = { opens:0, found:0, plays:0, completes:0, aPlays:0, aCompletes:0 };
          if (e.event_type === 'scan_open')       colStats[s].opens++;
          if (e.event_type === 'target_found')    colStats[s].found++;
          if (e.event_type === 'video_play')      colStats[s].plays++;
          if (e.event_type === 'audio_play')    { colStats[s].plays++; colStats[s].aPlays++; }
          if (e.event_type === 'video_complete')  colStats[s].completes++;
          if (e.event_type === 'audio_complete'){ colStats[s].completes++; colStats[s].aCompletes++; }
        });

        const maxDevice  = Math.max(...Object.values(deviceCounts), 1);
        const maxCountry = Math.max(...Object.values(countryCounts), 1);
        const maxBrowser = Math.max(...Object.values(browserCounts), 1);

        cachedEvts = evts;
        cachedColNames = colNames;

        document.getElementById('main-content').innerHTML = `
          <!-- Activity Log (default tab) -->
          <div class="tab-body" data-tab="activity">
            <div class="section">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:12px;flex-wrap:wrap;">
                <div class="section-title">Activity Log</div>
                <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                  <div class="limit-bar">
                    <button class="limit-btn${activityLimit===25?' active':''}" data-limit="25">Show 25</button>
                    <button class="limit-btn${activityLimit===50?' active':''}" data-limit="50">Show 50</button>
                    <button class="limit-btn${activityLimit===100?' active':''}" data-limit="100">Show 100</button>
                  </div>
                  <input id="activity-search" type="search" placeholder="Search user, project, location…" style="padding:7px 14px;border-radius:20px;border:1px solid #e0ddd6;font-size:13px;font-family:inherit;outline:none;width:260px;"/>
                </div>
              </div>
              <div class="table-wrap" id="activity-wrap"></div>
            </div>
          </div>

          <!-- Overview -->
          <div class="tab-body" data-tab="overview">
            <div class="cards">
              <div class="card"><div class="card-value">${opens}</div><div class="card-label">Total Opens</div></div>
              <div class="card highlight" title="How often a photo was successfully detected after the scanner was opened."><div class="card-value">${pct(sessionsWithFound,sessionOpens)}</div><div class="card-label">Scan Rate</div></div>
              <div class="card"><div class="card-value">${plays}</div><div class="card-label">Plays${plays ? ` — ${vPlays} video · ${aPlays} audio` : ''}</div></div>
              <div class="card highlight" title="Video + audio plays that ran to the end."><div class="card-value">${pct(completes,plays)}</div><div class="card-label">Completion Rate</div></div>
              <div class="card"><div class="card-value">${uniqueIPs}</div><div class="card-label">Unique Visitors</div></div>
              <div class="card"><div class="card-value">${errors}</div><div class="card-label">Errors</div></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:28px;">
              <div class="section">
                <div class="section-title" style="margin-bottom:12px">Devices</div>
                <div class="table-wrap" style="padding:16px;min-width:0;">
                  ${Object.keys(deviceCounts).length ? barRows(deviceCounts, maxDevice) : '<p class="empty" style="padding:8px">No data</p>'}
                </div>
              </div>
              <div class="section">
                <div class="section-title" style="margin-bottom:12px">Browsers</div>
                <div class="table-wrap" style="padding:16px;min-width:0;">
                  ${Object.keys(browserCounts).length ? barRows(browserCounts, maxBrowser) : '<p class="empty" style="padding:8px">No data</p>'}
                </div>
              </div>
              <div class="section">
                <div class="section-title" style="margin-bottom:12px">Countries</div>
                <div class="table-wrap" style="padding:16px;min-width:0;">
                  ${Object.keys(countryCounts).length ? barRows(countryCounts, maxCountry) : '<p class="empty" style="padding:8px">No data</p>'}
                </div>
              </div>
            </div>
          </div>

          <!-- Projects (per-project + per-photo) -->
          <div class="tab-body" data-tab="projects">
            <div class="section">
              <div class="section-title" style="margin-bottom:12px">By Project</div>
              <div class="table-wrap">
                <table>
                  <thead><tr>
                    <th>Project</th><th>Opens</th><th>Detected</th><th title="How often a photo was successfully detected after the scanner was opened.">Scan Rate</th><th title="Video + audio plays">Plays</th><th>Completed</th><th>Comp. Rate</th>
                  </tr></thead>
                  <tbody>
                    ${Object.entries(colStats).sort((a,b)=>b[1].opens-a[1].opens).map(([slug,s])=>`
                      <tr>
                        <td style="font-weight:700">${colNames[slug]||slug}</td>
                        <td>${s.opens}</td>
                        <td>${s.found}</td>
                        <td style="color:#7657FC;font-weight:700">${pct(s.found,s.opens)}</td>
                        <td>${s.plays}${s.aPlays?` <span class="muted" style="font-size:10px">(${s.aPlays} audio)</span>`:''}</td>
                        <td>${s.completes}</td>
                        <td style="color:#7657FC;font-weight:700">${pct(s.completes,s.plays)}</td>
                      </tr>`).join('')}
                  </tbody>
                </table>
              </div>
            </div>
            <div class="section">
              <div class="section-title" style="margin-bottom:4px">By Photo</div>
              <p class="muted" style="font-size:12px;margin-bottom:12px">Which photo in each project gets scanned most (counted from photo detections).</p>
              <div id="byvideo-wrap"><div class="loading-msg" style="padding:24px"><div class="spinner"></div>Loading photo scans…</div></div>
            </div>
          </div>

          <!-- Accounts -->
          <div class="tab-body" data-tab="accounts">
            <div class="section">
              <div class="section-title" style="margin-bottom:12px">Accounts</div>
              <div class="table-wrap" id="accounts-wrap">
                <div class="loading-msg" style="padding:24px"><div class="spinner"></div>Loading accounts…</div>
              </div>
            </div>
          </div>

          <!-- Beta Feedback -->
          <div class="tab-body" data-tab="feedback">
            <div class="section">
              <div class="section-title" style="margin-bottom:12px">Beta Feedback</div>
              <div class="table-wrap" id="feedback-wrap"><div class="empty">Loading...</div></div>
            </div>
          </div>
        `;

        renderActivityTable();
        loadFeedback();
        loadAccounts();
        loadByVideo();
        showTab(activeTab);

        document.getElementById('activity-search').addEventListener('input', function() {
          searchQuery = this.value;
          renderActivityTable();
        });

        document.querySelectorAll('.limit-btn').forEach(function(btn) {
          btn.addEventListener('click', function() {
            document.querySelectorAll('.limit-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            activityLimit = parseInt(btn.dataset.limit, 10);
            activityShown = activityLimit;
            renderActivityTable();
          });
        });

        } catch(e) {
          document.getElementById('main-content').innerHTML = '<p class="empty">Error loading analytics: ' + e.message + '</p>';
        }
      }

      async function setFeedbackStatus(id, status) {
        // Chain .select() so the response includes the updated row(s).
        // If RLS blocks the write, update() alone returns 204 with no error,
        // which previously caused the UI to falsely show success on one
        // machine while the DB still had the old value on every other
        // machine. Checking data.length guards against that.
        const { data, error } = await db
          .from('beta_feedback')
          .update({ status: status })
          .eq('id', id)
          .select();

        if (error) {
          console.error('setFeedbackStatus error:', error);
          alert('Could not save status: ' + error.message);
          return;
        }
        if (!data || data.length === 0) {
          console.error('setFeedbackStatus: 0 rows updated for id=' + id +
            ' — likely an RLS policy blocking UPDATE on beta_feedback, ' +
            'or the `status` column does not exist on the table.');
          alert('Status did not save (0 rows updated). This is usually an ' +
            'RLS policy blocking writes to beta_feedback. See the browser ' +
            'console for details.');
          return;
        }

        // Update UI — toggle .active class on the three buttons in this row
        const row = document.querySelector('tr[data-feedback-id="' + id + '"]');
        if (row) {
          row.style.background = status === 'urgent' ? '#fff5f5'
            : status === 'not_urgent' ? '#fffbe6'
            : status === 'completed' ? '#f0fff4'
            : '';
          row.querySelectorAll('.status-btn').forEach(function(btn) {
            if (btn.dataset.status === status) btn.classList.add('active');
            else btn.classList.remove('active');
          });
        }
      }

      async function loadFeedback() {
        const wrap = document.getElementById('feedback-wrap');
        if (!wrap) return;
        try {
          const { data, error } = await db
            .from('beta_feedback')
            .select('*')
            .order('created_at', { ascending: false });
          if (error) throw error;
          if (!data || data.length === 0) {
            wrap.innerHTML = '<div class="empty">No feedback submitted yet.</div>';
            return;
          }
          var rows = data.map(function(f) {
            var page = (f.page_url || '—').replace('https://popcode.app', '').replace('http://localhost:3000', '') || '/';
            var device = f.user_agent ? (
              /iPhone|iPad/.test(f.user_agent) ? 'iOS' :
              /Android/.test(f.user_agent) ? 'Android' : 'Desktop'
            ) : '—';
            var status = f.status || 'new';
            var rowBg = status === 'urgent' ? '#fff5f5' : status === 'not_urgent' ? '#fffbe6' : status === 'completed' ? '#f0fff4' : '';
            var dotBtn = function(s, label) {
              var active = status === s;
              return '<button class="status-btn' + (active ? ' active' : '') +
                '" data-status="' + s + '" data-id="' + f.id + '" title="' + label + '">' +
                '<span class="status-dot status-dot-' + s + '"></span></button>';
            };
            return '<tr data-feedback-id="' + f.id + '" style="background:' + rowBg + '">' +
              '<td class="muted" style="white-space:nowrap">' + formatDate(f.created_at) + '</td>' +
              '<td style="max-width:360px;white-space:pre-wrap;word-break:break-word">' + escapeHtml(f.description) + '</td>' +
              '<td class="muted">' + escapeHtml(f.email || '—') + '</td>' +
              '<td class="muted">' + escapeHtml(page) + '</td>' +
              '<td>' + devicePill(device) + '</td>' +
              '<td style="white-space:nowrap">' +
                dotBtn('urgent', 'Urgent') +
                dotBtn('not_urgent', 'Not urgent') +
                dotBtn('completed', 'Completed') +
              '</td>' +
              '</tr>';
          }).join('');
          wrap.innerHTML = '<table>' +
            '<thead><tr><th>Time</th><th>Report</th><th>Email</th><th>Page</th><th>Device</th><th>Status</th></tr></thead>' +
            '<tbody>' + rows + '</tbody></table>';

          // Attach status button listeners
          wrap.querySelectorAll('.status-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
              setFeedbackStatus(this.dataset.id, this.dataset.status);
            });
          });
        } catch(e) {
          wrap.innerHTML = '<div class="empty">Could not load feedback: ' + e.message + '</div>';
        }
      }

      function escapeHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      // Nav overlay
      document.getElementById('nav-btn').addEventListener('click', function() {
        document.getElementById('nav-overlay').classList.add('open');
      });
      document.getElementById('nav-close-btn')?.addEventListener('click', function() {
        document.getElementById('nav-overlay').classList.remove('open');
      });
      document.getElementById('nav-overlay').addEventListener('click', function(e) {
        if (e.target === document.getElementById('nav-drawer-bg')) {
          document.getElementById('nav-overlay').classList.remove('open');
        }
      });
    </script>
  <script src="/beta-feedback.js"></script>
      <footer style="margin: 60px auto 16px; padding: 16px 16px 24px; text-align: center; font-size: 12px; color: #888; font-family: 'Inter', sans-serif;">
      <a href="/terms.html" style="color:#888; text-decoration:underline; margin: 0 8px;">Terms</a>
      <span style="color:#ccc">·</span>
      <a href="/privacy.html" style="color:#888; text-decoration:underline; margin: 0 8px;">Privacy</a>
    </footer>
  </body>
