<!DOCTYPE html>
<html>
  <head>

      crossorigin="anonymous"></script>

    <link rel="stylesheet" href="/assets/fonts.css">
    <style>
      @font-face {
        font-family: 'FilsonPro';
        src: url('/assets/fonts/FilsonProMedium/font.woff2') format('woff2'),
             url('/assets/fonts/FilsonProMedium/font.woff') format('woff');
        font-weight: 400; font-style: normal;
      }
      @font-face {
        font-family: 'FilsonPro';
        src: url('/assets/fonts/FilsonProBold/font.woff2') format('woff2'),
             url('/assets/fonts/FilsonProBold/font.woff') format('woff');
        font-weight: 700; font-style: normal;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh; background: #f9f9f9;
        font-family: 'Inter', sans-serif;
        font-weight: 400; color: #1a1a1a;
        display: flex; flex-direction: column; align-items: center;
        padding: 0 0 80px; overflow-x: hidden;
      }
      .site-header {
        width: 100vw; background: linear-gradient(135deg, #7657FC 0%, #589AF9 100%);
        padding: 24px 24px 40px; min-height: 200px;
        display: flex; align-items: flex-end; justify-content: center;
        position: relative; margin-bottom: 32px; align-self: stretch;
      }
      .top-bar {
        width: 100%; max-width: 1200px; padding: 48px 24px 0;
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 24px; gap: 12px; flex-wrap: wrap;
      }
      .top-bar h1 { font-size: 36px; font-weight: 400; color: #1a1a1a; font-family: 'CooperBT', serif; letter-spacing: 0; }
      @media (min-width: 960px) { .top-bar h1 { font-size: 42px; } }
      .back-btn {
        background: #1a1a1a;
        color: white; border: none; border-radius: 24px;
        padding: 10px 20px; font-size: 14px; font-weight: 700;
        font-family: 'Inter', sans-serif; cursor: pointer;
        text-decoration: none; white-space: nowrap;
      }
      .content { width: 100%; max-width: 1200px; padding: 0 24px; }

      .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
      @media (max-width: 560px) { .cards { grid-template-columns: repeat(2, 1fr); } }
      .card { background: white; border-radius: 16px; padding: 20px 18px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
      .card-value { font-size: 36px; font-weight: 700; color: #1a1a1a; line-height: 1; margin-bottom: 6px; }
      .card-label { font-size: 12px; color: #888; }
      .card.highlight .card-value { color: #7657FC; }

      .section { margin-bottom: 28px; }
      .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
      .section-title { font-size: 16px; font-weight: 700; }

      .table-wrap { background: white; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: auto; }
      table { width: 100%; border-collapse: collapse; min-width: 700px; }
      th { background: #f8f7f4; font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.05em; padding: 10px 10px; text-align: left; white-space: nowrap; }
      td { font-size: 11px; padding: 9px 10px; border-top: 1px solid #f0eeea; vertical-align: middle; }
      tr:hover td { background: #fafaf8; }

      .pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
      .pill-iOS { background: #e8f0fe; color: #3b5bdb; }
      .pill-Android { background: #e6f9ee; color: #2b8a3e; }
      .pill-Desktop { background: #f0f0f0; color: #666; }
      .pill-Unknown { background: #f0f0f0; color: #999; }

      .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; }
      .badge-scan_open     { background: #f0f0f0; color: #555; }
      .badge-target_found  { background: #e8f9ee; color: #2b8a3e; }
      .badge-video_play    { background: #e8f0fe; color: #3b5bdb; }
      .badge-video_complete{ background: #ede9fe; color: #7657FC; }
      .badge-video_error   { background: #ffe8e8; color: #c92a2a; }
      .badge-audio_play    { background: #e0f7f4; color: #0f8b81; }
      .badge-audio_complete{ background: #d6f0e4; color: #1f7a4d; }

      /* Print-order status pills + Retry action */
      .ps { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; }
      .ps-green { background: #e8f9ee; color: #2b8a3e; }
      .ps-blue  { background: #e8f0fe; color: #3b5bdb; }
      .ps-amber { background: #fff4e0; color: #b8860b; }
      .ps-red   { background: #ffe8e8; color: #c92a2a; }
      .ps-gray  { background: #f0f0f0; color: #888; }
      .retry-btn { padding: 4px 12px; border-radius: 14px; border: 1px solid #f0c9c9; background: #fff; font-size: 11px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; color: #c92a2a; white-space: nowrap; }
      .retry-btn:hover { background: #fff5f5; }
      .retry-btn:disabled { opacity: 0.5; cursor: default; }
      .prints-err { color: #c92a2a; font-size: 10.5px; margin-top: 3px; max-width: 280px; line-height: 1.3; }
      .card-value.danger { color: #c92a2a; }
      .prints-cards { grid-template-columns: repeat(4, 1fr); }
      @media (max-width: 720px) { .prints-cards { grid-template-columns: repeat(2, 1fr); } }

      /* Expandable print-order detail editor */
      tr.print-row { cursor: pointer; }
      .pd-caret { display: inline-block; color: #bbb; transition: transform 0.15s; font-size: 10px; }
      tr.print-row.pd-open .pd-caret { transform: rotate(90deg); color: #1a1a1a; }
      .pd-detail-cell { background: #fbfaf8; padding: 0 !important; }
      .pd-grid { padding: 18px 18px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
      @media (max-width: 720px) { .pd-grid { grid-template-columns: 1fr; } }
      .pd-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #999; margin-bottom: 4px; }
      .pd-title { font-family: 'CooperBT', Georgia, serif; font-size: 20px; line-height: 1.1; margin-bottom: 2px; }
      .pd-field { width: 100%; padding: 9px 12px; border-radius: 10px; border: 1.5px solid #e0ddd6; font-size: 13px; font-family: 'Inter', sans-serif; outline: none; background: #fff; color: #1a1a1a; }
      .pd-field:focus { border-color: #1a1a1a; }
      textarea.pd-field { resize: vertical; }
      .pd-btn { padding: 8px 14px; border-radius: 12px; border: 1px solid #e0ddd6; background: #fff; font-size: 12px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; color: #1a1a1a; text-decoration: none; display: inline-block; }
      .pd-btn.pd-save { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
      .pd-btn.pd-resubmit { color: #c92a2a; border-color: #f0c9c9; }
      .pd-btn:disabled { opacity: 0.5; cursor: default; }
      .pd-msg { font-size: 12px; margin-top: 10px; min-height: 16px; }

      /* Tabs */
      .tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 22px; border-bottom: 1px solid #ececec; }
      .tab { padding: 9px 16px; border: none; background: none; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700; color: #999; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; }
      .tab:hover { color: #1a1a1a; }
      .tab.active { color: #1a1a1a; border-bottom-color: #7657FC; }

      /* By Video (per-photo scan breakdown) */
      .byvideo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
      .bv-card { background: #fff; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); padding: 14px 16px; }
      .bv-card h4 { font-size: 13px; font-weight: 700; margin-bottom: 12px; }
      .bv-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
      .bv-thumb { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; background: #f0eeea; flex-shrink: 0; }
      .bv-meta { flex: 1; min-width: 0; }
      .bv-name { font-size: 12px; font-weight: 600; }
      .bv-bartrack { height: 6px; background: #f0eeea; border-radius: 99px; margin-top: 5px; overflow: hidden; }
      .bv-barfill { height: 100%; background: #7657FC; border-radius: 99px; }
      .bv-count { font-size: 14px; font-weight: 700; flex-shrink: 0; }
      .bv-count span { font-size: 10px; color: #aaa; font-weight: 600; display: block; text-align: right; }

      /* Flat status dots for beta feedback */
      .status-btn { background: none; border: none; cursor: pointer; padding: 3px 4px; display: inline-flex; align-items: center; justify-content: center; line-height: 0; }
      .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; opacity: 0.22; transition: opacity 0.15s; }
      .status-btn:hover .status-dot { opacity: 0.55; }
      .status-btn.active .status-dot { opacity: 1; }
      .status-dot-urgent     { background: #dc2626; }
      .status-dot-not_urgent { background: #eab308; }
      .status-dot-completed  { background: #16a34a; }

      .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
      .bar-label { font-size: 13px; width: 90px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .bar-track { flex: 1; background: #f0eeea; border-radius: 99px; height: 10px; overflow: hidden; }
      .bar-fill { height: 100%; border-radius: 99px; background: #1a1a1a; }
      .bar-count { font-size: 13px; font-weight: 700; width: 36px; text-align: right; flex-shrink: 0; }

      .range-bar { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
      .range-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #e0ddd6; background: white; font-size: 13px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; color: #555; }
      .range-btn.active { background: #1a1a1a; color: white; border-color: transparent; }

      /* Small pill buttons for the activity-log page-size toggle */
      .limit-bar { display: inline-flex; gap: 6px; }
      .limit-btn { padding: 4px 12px; border-radius: 16px; border: 1px solid #e0ddd6; background: white; font-size: 12px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; color: #555; }
      .limit-btn.active { background: #1a1a1a; color: white; border-color: transparent; }

      /* Accounts section — expand/collapse for rows 11+ */
      .accounts-toggle-row td { text-align: center; padding: 12px 10px; border-top: 1px solid #f0eeea; background: #fafaf8; }
      .accounts-toggle { background: none; border: none; color: #7657FC; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; padding: 4px 10px; }
      .accounts-toggle:hover { color: #589AF9; }

      /* Activity log — Load more row */
      .loadmore-row td { text-align: center; padding: 14px 10px; border-top: 1px solid #f0eeea; background: #fafaf8; }
      .loadmore-row:hover td { background: #fafaf8; }
      .loadmore-btn { background: none; border: none; color: #7657FC; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; padding: 6px 14px; }
      .loadmore-btn:hover { color: #589AF9; }

      /* Hosting cost panel */
      .cost-panel { background: white; border-radius: 16px; padding: 22px 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 28px; }
      .cost-panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 8px; }
      .cost-panel-title { font-size: 16px; font-weight: 700; }
      .cost-panel-month { font-size: 12px; color: #888; }
      .cost-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 16px; }
      @media (max-width: 720px) { .cost-grid { grid-template-columns: 1fr; gap: 16px; } }
      .cost-cell-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; font-weight: 700; }
      .cost-cell-value { font-size: 28px; font-weight: 700; color: #1a1a1a; line-height: 1.1; }
      .cost-cell-value.highlight { color: #7657FC; font-size: 34px; }
      .cost-cell-unit { font-size: 13px; color: #888; font-weight: 500; margin-left: 2px; }
      .cost-cell-sub { font-size: 11px; color: #888; margin-top: 6px; line-height: 1.4; }
      .cost-bar-track { height: 6px; background: #f0eeea; border-radius: 99px; margin-top: 10px; overflow: hidden; }
      .cost-bar-fill { height: 100%; border-radius: 99px; background: #1a1a1a; transition: width 0.3s; }
      .cost-bar-fill.warn { background: linear-gradient(135deg, #f59e0b 0%, #f97316 100%); }
      .cost-bar-fill.over { background: linear-gradient(135deg, #dc2626 0%, #f97316 100%); }
      .cost-footnote { font-size: 11px; color: #999; border-top: 1px solid #f0eeea; padding-top: 12px; line-height: 1.5; }
      .cost-footnote a { color: #7657FC; text-decoration: none; font-weight: 700; }
      .cost-footnote a:hover { text-decoration: underline; }
      .cost-error { color: #c92a2a; font-size: 13px; padding: 14px; background: #fff5f5; border-radius: 8px; }
      .cost-loading { color: #888; font-size: 13px; padding: 6px 0; display: flex; align-items: center; gap: 12px; }

      .loading-msg { display: flex; align-items: center; gap: 12px; color: #888; font-size: 14px; padding: 40px 0; }
      .spinner { width: 24px; height: 24px; border-radius: 50%; border: 3px solid #e8e8e8; border-top-color: #7657FC; animation: spin 0.8s linear infinite; flex-shrink: 0; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .empty { color: #aaa; font-size: 14px; text-align: center; padding: 32px; }
      .muted { color: #aaa; }
      .flag { font-size: 16px; margin-right: 4px; }
      .session-row td { background: #fafaf8; }
      .session-row:hover td { background: #f4f3f0; }
      .child-row td { background: #f8f7ff; border-left: 3px solid #e0d8ff; }
      .child-row:hover td { background: #f0eeff; }
      .expand-btn { background: none; border: none; cursor: pointer; font-size: 12px; color: #7657FC; padding: 2px 6px; line-height: 1; }
      .expand-btn:hover { color: #589AF9; }

      /* Nav overlay */
      #nav-overlay { display:none; position:fixed; inset:0; z-index:200; }
      #nav-overlay.open { display:block; }
      #nav-drawer-bg { position:absolute; inset:0; background:rgba(0,0,0,0.18); }
      #nav-drawer {
        position:absolute; top:14px; left:14px; width:264px;
        background:#ffffff; border-radius:18px;
        box-shadow:0 12px 48px rgba(0,0,0,0.18);
        padding:8px 0; opacity:0;
        transform:translateY(-8px) scale(0.97); transform-origin:top left;
        transition:opacity 0.18s ease, transform 0.18s ease;
      }
      #nav-overlay.open #nav-drawer { opacity:1; transform:translateY(0) scale(1); }
      .nav-link { display:flex; align-items:center; gap:14px; padding:11px 20px; font-size:15px; font-weight:500; color:#1a1a1a; text-decoration:none; font-family:'Inter',sans-serif; }
      .nav-link:hover { background:#f5f4f0; }
      .nav-link svg { flex-shrink:0; color:#555; }
      .nav-link.external { color:#666; font-size:14px; }
      .nav-divider { height:1px; background:#ececec; margin:8px 0; }
      .nav-close { display:none; }
    </style>
  </head>

        <button class="tab" data-tab="overview">Overview</button>
        <button class="tab" data-tab="projects">Projects</button>
