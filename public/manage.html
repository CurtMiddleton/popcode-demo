<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Popcode — My Collections</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <style>
      @font-face {
        font-family: 'FilsonPro';
        src: url('/assets/fonts/FilsonProMedium/font.woff2') format('woff2'),
             url('/assets/fonts/FilsonProMedium/font.woff') format('woff');
        font-weight: 400;
        font-style: normal;
      }
      @font-face {
        font-family: 'FilsonPro';
        src: url('/assets/fonts/FilsonProBold/font.woff2') format('woff2'),
             url('/assets/fonts/FilsonProBold/font.woff') format('woff');
        font-weight: 700;
        font-style: normal;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        background: #f2f0eb;
        font-family: 'FilsonPro', sans-serif;
        color: #1a1a1a;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0 0 80px; overflow-x: hidden;
      }
      .site-header {
        width: 100vw;
        background: linear-gradient(135deg, #7657FC 0%, #589AF9 100%);
        padding: 24px 24px 40px;
        min-height: 200px;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        position: relative;
        margin-bottom: 32px;
        align-self: stretch;
      }
      .logo-text {
        font-family: 'FilsonPro', sans-serif;
        font-weight: 700;
        font-size: 36px;
        color: white;
        letter-spacing: -0.02em;
      }

      .top-bar {
        width: 100%; max-width: 560px; padding: 0 24px;
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 28px; gap: 12px; flex-wrap: wrap;
      }
      .top-bar h1 { font-size: 26px; font-weight: 700; color: #1a1a1a; }
      .top-bar-actions { display: flex; gap: 10px; align-items: center; }

      .create-btn {
        background: linear-gradient(135deg, #7657FC 0%, #589AF9 100%); color: white;
        border: none; border-radius: 24px;
        padding: 10px 20px; font-size: 14px; font-weight: 700;
        font-family: 'FilsonPro', sans-serif;
        cursor: pointer; text-decoration: none; transition: opacity 0.2s; white-space: nowrap;
      }
      .create-btn:hover { opacity: 0.9; }

      @media (max-width: 400px) {
        .top-bar h1 { font-size: 20px; }
        .create-btn { font-size: 13px; padding: 9px 14px; }
      }

      .collections-list { width: 100%; max-width: 560px; padding: 0 24px; display: flex; flex-direction: column; gap: 16px; }

      .card {
        background: white;
        border-radius: 16px;
        padding: 16px;
        border: none;
        box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      .card-thumb {
        width: 120px;
        height: 120px;
        min-width: 120px;
        border-radius: 12px;
        background-size: cover;
        background-position: center;
        background-color: #e8e4f0;
        margin-bottom: 0;
      }
      .card-main {
        display: flex;
        gap: 16px;
        align-items: center;
        margin-bottom: 12px;
      }
      .card-info { flex: 1; }
      .card-title { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; line-height: 1.15; }
      .card-meta { font-size: 12px; color: #888; }
      .card-actions { display: flex; gap: 6px; flex-wrap: nowrap; align-items: center; }
      .btn {
        border: none; border-radius: 20px; padding: 6px 11px; font-size: 13px; font-weight: 400;
        font-family: 'FilsonPro', sans-serif;
        cursor: pointer; transition: opacity 0.15s, transform 0.1s; text-decoration: none; display: inline-block;
      }
      .btn:active { transform: scale(0.96); }
      .btn-view { background: #eeeeee; color: #333333; }
      .btn-view:hover { background: #e0e0e0; }
      .btn-copy { background: #eeeeee; color: #333333; }
      .btn-copy:hover { background: #e0e0e0; }
      .btn-rename, .btn-rename-open { background: #eeeeee; color: #333333; border: none; }
      .btn-rename:hover, .btn-rename-open:hover { background: #e0e0e0; }
      .btn-delete {
        background: #666666; color: white; border-radius: 50%;
        width: 32px; height: 32px; padding: 0;
        display: flex; align-items: center; justify-content: center;
        font-size: 15px; margin-left: auto;
      }
      .btn-delete:hover { background: #333; }
      .btn-delete:disabled { opacity: 0.5; cursor: not-allowed; }
      .rename-form { display: none; margin-bottom: 12px; gap: 8px; flex-wrap: wrap; }
      .rename-form input {
        flex: 1; min-width: 0; padding: 9px 14px; border-radius: 10px;
        border: 1px solid #e8e8e8;
        font-size: 15px; color: #1a1a1a; outline: none;
        font-family: 'FilsonPro', sans-serif;
      }
      .rename-form button { padding: 9px 16px; border-radius: 10px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'FilsonPro', sans-serif; }
      .rename-save { background: #6b3fa0; color: white; }
      .rename-cancel { background: #eeeeee; color: #333333; }

      .empty-state {
        width: 100%; max-width: 560px; text-align: center; padding: 60px 24px;
        background: white; border-radius: 20px; border: 2px dashed #e8e8e8;
      }
      .empty-state p { font-size: 16px; color: #888; margin-bottom: 20px; line-height: 1.6; }
      .empty-state a {
        background: #6b3fa0; color: white; border-radius: 24px;
        padding: 12px 28px; font-size: 15px; font-weight: 700; text-decoration: none;
        transition: background 0.2s; display: inline-block;
      }
      .empty-state a:hover { background: #5a3388; }

      .loading-msg { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 40px 0; opacity: 0.7; }
      .spinner {
        width: 36px; height: 36px; border-radius: 50%;
        border: 3px solid #e8e8e8; border-top-color: #6b3fa0;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .loading-msg span { font-size: 14px; color: #888; }

      .error-banner {
        width: 100%; max-width: 560px; background: #fff0f0;
        border: 1px solid #ffcccc; border-radius: 12px;
        padding: 16px 20px; font-size: 14px; margin-bottom: 20px; line-height: 1.5; color: #cc3333;
      }

      .toast {
        position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.75); color: white; padding: 10px 22px;
        border-radius: 24px; font-size: 14px; font-weight: 600;
        opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 999; white-space: nowrap;
      }
      .toast.show { opacity: 1; }
    </style>
  </head>
  <body>
    <header class="site-header">
      <img src="/assets/Popcode_logo.rev.svg" alt="Popcode" style="height:80px;"/>
      <button id="logout-btn" style="position:absolute;right:20px;top:20px;background:#78A7FF;color:white;border:none;border-radius:20px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:'FilsonPro',sans-serif;">Sign Out</button>
    </header>

    <div class="top-bar">
      <h1>My Collections</h1>
      <div class="top-bar-actions">
        <a class="create-btn" href="/analytics.html" style="background:#1a1a1a;">Analytics</a>
        <a class="create-btn" href="/create.html">+ Create New</a>
      </div>
    </div>

    <div id="content" class="collections-list">
      <div class="loading-msg"><div class="spinner"></div><span>Loading collections...</span></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      let currentUser = null;
      db.auth.getSession().then(async ({ data }) => {
        if (!data.session) {
          window.location.href = '/auth.html';
        } else {
          currentUser = data.session.user;
          // Claim any collections created before auth was added (user_id = null)
          await db.from('collections').update({ user_id: currentUser.id }).is('user_id', null);
          loadCollections();
        }
      });

      document.getElementById('logout-btn').addEventListener('click', async () => {
        await db.auth.signOut();
        window.location.href = '/auth.html';
      });

      function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2200);
      }

      function formatDate(iso) {
        if (!iso) return 'Unknown date';
        const d = new Date(iso);
        return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
      }

      async function loadCollections() {
        const content = document.getElementById('content');
        try {
          const { data: collections, error } = await db
            .from('collections')
            .select('id, slug, name, created_at')
            .eq('user_id', currentUser.id)
            .order('created_at', { ascending: false });

          if (error) throw error;

          if (!collections || collections.length === 0) {
            content.innerHTML = '';
            content.appendChild(buildEmptyState());
            return;
          }

          const ids = collections.map(c => c.id);
          const { data: items, error: itemsError } = await db
            .from('collection_items')
            .select('collection_id, photo_url, target_index')
            .in('collection_id', ids)
            .order('target_index');

          if (itemsError) throw itemsError;

          const countMap = {};
          const photoMap = {};
          (items || []).forEach(item => {
            countMap[item.collection_id] = (countMap[item.collection_id] || 0) + 1;
            if (!photoMap[item.collection_id] && item.photo_url) {
              photoMap[item.collection_id] = item.photo_url;
            }
          });

          content.innerHTML = '';
          collections.forEach(col => {
            const pageCount = countMap[col.id] || 0;
            content.appendChild(buildCard(col, pageCount, photoMap[col.id] || null));
          });

        } catch (err) {
          content.innerHTML = '';
          const banner = document.createElement('div');
          banner.className = 'error-banner';
          banner.textContent = 'Failed to load collections: ' + (err.message || 'Unknown error');
          content.appendChild(banner);
          const retryBtn = document.createElement('button');
          retryBtn.className = 'btn btn-view';
          retryBtn.textContent = 'Retry';
          retryBtn.style.cssText = 'background:#eeeeee;color:#333333;margin-top:4px;';
          retryBtn.addEventListener('click', loadCollections);
          content.appendChild(retryBtn);
        }
      }

      function buildEmptyState() {
        const div = document.createElement('div');
        div.className = 'empty-state';
        div.innerHTML = `
          <p>No collections yet.<br>Create your first one.</p>
          <a href="/create.html">+ Create Collection</a>
        `;
        return div;
      }

      function buildCard(col, pageCount, thumbUrl) {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.id = col.id;

        const title = col.name || 'Untitled';
        const viewUrl = `https://popcode.app/${col.slug}`;
        const shortUrl = `popcode.app/${col.slug}`;

        card.innerHTML = `
          <div class="card-main">
            ${thumbUrl ? `<div class="card-thumb" style="background-image:url('${escapeHtml(thumbUrl)}')"></div>` : '<div class="card-thumb"></div>'}
            <div class="card-info">
              <div class="card-title">${escapeHtml(title)}</div>
              <div class="card-meta">Created ${formatDate(col.created_at)} &nbsp;•&nbsp; ${pageCount} page${pageCount !== 1 ? 's' : ''}</div>
            </div>
          </div>
          <div class="rename-form" id="rename-form-${col.id}">
            <input type="text" id="rename-input-${col.id}" value="${escapeHtml(title)}" maxlength="80" placeholder="Collection name"/>
            <button class="rename-save" id="rename-save-${col.id}">Save</button>
            <button class="rename-cancel" id="rename-cancel-${col.id}">Cancel</button>
          </div>
          <div class="card-actions">
            <a class="btn btn-view" href="${escapeHtml(viewUrl)}" target="_blank" rel="noopener">View</a>
            <button class="btn btn-copy" data-url="${escapeHtml(viewUrl)}">Copy Link</button>
            <a class="btn btn-rename" href="/edit.html?id=${escapeHtml(col.slug)}">Edit</a>
            <button class="btn btn-rename-open">Rename</button>
            <button class="btn btn-delete" data-slug="${escapeHtml(col.slug)}" data-title="${escapeHtml(title)}"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
          </div>
        `;

        card.querySelector('.btn-copy').addEventListener('click', function() {
          navigator.clipboard.writeText(this.dataset.url).then(() => {
            showToast('Link copied!');
          }).catch(() => {
            prompt('Copy this link:', this.dataset.url);
          });
        });

        card.querySelector('.btn-rename-open').addEventListener('click', function() {
          const form = card.querySelector(`#rename-form-${col.id}`);
          form.style.display = form.style.display === 'flex' ? 'none' : 'flex';
          if (form.style.display === 'flex') card.querySelector(`#rename-input-${col.id}`).focus();
        });

        card.querySelector(`#rename-cancel-${col.id}`).addEventListener('click', () => {
          card.querySelector(`#rename-form-${col.id}`).style.display = 'none';
        });

        card.querySelector(`#rename-save-${col.id}`).addEventListener('click', async () => {
          const newName = card.querySelector(`#rename-input-${col.id}`).value.trim() || null;
          const saveBtn = card.querySelector(`#rename-save-${col.id}`);
          saveBtn.disabled = true;
          saveBtn.textContent = 'Saving...';
          const { error } = await db.from('collections').update({ name: newName }).eq('id', col.id);
          if (error) {
            showToast('Rename failed: ' + error.message);
          } else {
            card.querySelector('.card-title').textContent = newName || 'Untitled';
            card.querySelector('.btn-delete').dataset.title = newName || 'Untitled';
            card.querySelector(`#rename-form-${col.id}`).style.display = 'none';
            showToast('Renamed!');
          }
          saveBtn.disabled = false;
          saveBtn.textContent = 'Save';
        });

        card.querySelector('.btn-delete').addEventListener('click', function() {
          const slug = this.dataset.slug;
          const name = this.dataset.title;
          confirmDelete(card, col.id, slug, name, this);
        });

        return card;
      }

      async function confirmDelete(card, collectionId, slug, title, btn) {
        const confirmed = window.confirm(`Delete "${title}"?\n\nThis will permanently remove the collection, all its items, and all uploaded files. This cannot be undone.`);
        if (!confirmed) return;

        btn.disabled = true;
        btn.textContent = 'Deleting...';

        try {
          const filesToDelete = [`${slug}/target.mind`];

          const { data: items, error: fetchItemsError } = await db
            .from('collection_items')
            .select('target_index')
            .eq('collection_id', collectionId);

          if (fetchItemsError) throw new Error('Could not fetch collection items: ' + fetchItemsError.message);

          (items || []).forEach(item => {
            filesToDelete.push(`${slug}/video_${item.target_index}.mp4`);
          });

          const { data: storageFiles } = await db.storage.from('experiences').list(slug);
          if (storageFiles) {
            storageFiles.forEach(f => {
              const path = `${slug}/${f.name}`;
              if (!filesToDelete.includes(path)) filesToDelete.push(path);
            });
          }

          const { error: deleteItemsError } = await db
            .from('collection_items').delete().eq('collection_id', collectionId);
          if (deleteItemsError) throw new Error('Could not delete collection items: ' + deleteItemsError.message);

          const { error: deleteColError, count: deleteCount } = await db
            .from('collections').delete({ count: 'exact' }).eq('id', collectionId).eq('user_id', currentUser.id);
          if (deleteColError) throw new Error('Could not delete collection record: ' + deleteColError.message);
          if (deleteCount === 0) throw new Error('Delete was blocked — you may not own this collection.');

          if (filesToDelete.length > 0) {
            const { error: storageError } = await db.storage.from('experiences').remove(filesToDelete);
            if (storageError) console.warn('Storage delete warning:', storageError.message);
          }

          card.style.transition = 'opacity 0.3s, transform 0.3s';
          card.style.opacity = '0';
          card.style.transform = 'scale(0.95)';
          setTimeout(() => {
            card.remove();
            const remaining = document.querySelectorAll('.card');
            if (remaining.length === 0) {
              document.getElementById('content').appendChild(buildEmptyState());
            }
          }, 300);

          showToast('Collection deleted.');

        } catch (err) {
          btn.disabled = false;
          btn.textContent = 'Delete';
          alert('Delete failed: ' + err.message);
        }
      }

      function escapeHtml(str) {
        const d = document.createElement('div');
        d.appendChild(document.createTextNode(str));
        return d.innerHTML;
      }
    </script>
  </body>
</html>
