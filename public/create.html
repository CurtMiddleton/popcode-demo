<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Popcode — Create</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      @font-face {
        font-family: 'FilsonPro';
        src: url('/assets/fonts/FilsonProMedium/font.woff2') format('woff2'),
             url('/assets/fonts/FilsonProMedium/font.woff') format('woff');
        font-weight: 400;
        font-style: normal;
      }
      @font-face {
        font-family: 'FilsonPro';
        src: url('/assets/fonts/FilsonProBold/font.woff2') format('woff2'),
             url('/assets/fonts/FilsonProBold/font.woff') format('woff');
        font-weight: 700;
        font-style: normal;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        background: #f2f0eb;
        font-family: 'FilsonPro', sans-serif;
        color: #1a1a1a;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0 0 60px; overflow-x: hidden;
      }
      .site-header {
        width: 100vw;
        background: linear-gradient(135deg, #7657FC 0%, #589AF9 100%);
        padding: 24px 24px 40px;
        min-height: 200px;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        position: relative;
        margin-bottom: 32px;
        align-self: stretch;
      }
      .logo-text {
        font-family: 'FilsonPro', sans-serif;
        font-weight: 700;
        font-size: 36px;
        color: white;
        letter-spacing: -0.02em;
      }
      .page-top-bar { width: 100%; max-width: 360px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 12px; }
      h1 { font-size: 26px; font-weight: 700; color: #1a1a1a; text-align: left; line-height: 0.95; }
      .my-collections-btn { background: linear-gradient(135deg, #7657FC 0%, #589AF9 100%); color: white; border: none; border-radius: 24px; padding: 10px 20px; font-size: 14px; font-weight: 700; font-family: 'FilsonPro', sans-serif; cursor: pointer; text-decoration: none; white-space: nowrap; }
      .my-collections-btn:hover { opacity: 0.9; }
      .subtitle { font-size: 14px; text-align: left; color: #888; margin-bottom: 28px; max-width: 360px; line-height: 1.5; }
      .field-label { font-size: 15px; font-weight: 700; margin-bottom: 10px; width: 100%; max-width: 360px; text-align: center; color: #1a1a1a; }
      input[type="text"] {
        width: 100%; max-width: 360px; padding: 14px 16px; border-radius: 12px;
        border: 1px solid #e8e8e8; font-size: 16px; color: #1a1a1a; margin-bottom: 32px; outline: none;
        background: white; font-family: 'FilsonPro', sans-serif;
      }
      .pages { width: 100%; max-width: 360px; }
      .page { margin-bottom: 28px; position: relative; display: flex; flex-direction: column; align-items: center; }
      .page-header { display: flex; align-items: center; justify-content: flex-start; position: relative; margin-bottom: 16px; width: 284px; }
      .page-label { background: #1a1a1a; color: white; border-radius: 50%; width: 28px; height: 28px; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
      .remove-page-btn { position: absolute; right: 0; background: #1a1a1a; border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
      .remove-page-btn:hover { background: #333; }
      .upload-row { display: flex; gap: 24px; justify-content: flex-start; }

      .upload-btn {
        display: flex; flex-direction: column; align-items: center; gap: 10px;
        background: white; border-radius: 10px; width: 130px; height: 110px;
        justify-content: center; cursor: pointer; border: 1px solid #e8e8e8;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: transform 0.15s;
        position: relative; overflow: hidden;
      }
      .upload-btn:active { transform: scale(0.95); }
      .upload-btn input[type="file"] { position: absolute; top: 0; right: 0; bottom: 0; left: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
      .upload-btn img.icon { width: 40px; height: 40px; }
      .upload-btn .btn-label { font-size: 11px; color: #888; font-weight: 600; text-align: center; padding: 0 8px; }
      .upload-btn.selected { background: #f0ecf8; border-color: #d0c0e8; }
      .upload-btn.selected img.icon { display: none; }
      .upload-btn.selected .btn-label { display: none; }
      .upload-btn .preview-img { display: none; position: absolute; top: 0; right: 0; bottom: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
      .upload-btn.selected .preview-img { display: block; }
      /* Play triangle overlay on selected video thumbnails */
      .play-overlay {
        display: none; position: absolute; top: 50%; left: 50%;
        transform: translate(-44%, -50%);
        width: 0; height: 0; pointer-events: none; z-index: 1;
        border-style: solid; border-width: 11px 0 11px 20px;
        border-color: transparent transparent transparent rgba(255,255,255,0.92);
        filter: drop-shadow(0 1px 4px rgba(0,0,0,0.5));
      }
      .upload-btn.selected .play-overlay { display: block; }
      .file-name { font-size: 11px; color: #555; font-weight: 600; text-align: center; margin-top: 8px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .file-size { font-size: 10px; color: #888; font-weight: 500; text-align: center; max-width: 120px; }
      .file-size.warn { color: #d97706; font-weight: 700; }
      .upload-wrapper { display: flex; flex-direction: column; align-items: center; }
      .video-msg { display: none; max-width: 120px; margin-top: 6px; text-align: center; }
      .compress-status { font-size: 10px; color: #555; font-weight: 600; line-height: 1.4; }
      .compress-bar-wrap { background: #e8e8e8; border-radius: 99px; height: 4px; margin: 4px 0; }
      .compress-bar { height: 100%; background: #6b3fa0; border-radius: 99px; transition: width 0.2s; width: 0%; }
      .video-msg-banner { background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; padding: 8px 10px; font-size: 10px; color: #555; line-height: 1.5; }
      .video-msg-banner a { color: #6b3fa0; font-weight: 700; text-decoration: underline; }
      .compressed-badge { font-size: 10px; color: #16a34a; font-weight: 700; }


      .add-page-btn { width: 100%; max-width: 360px; padding: 16px; border-radius: 30px; border: none; background: #eeeeee; color: #333333; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 16px; transition: background 0.2s; font-family: 'FilsonPro', sans-serif; }
      .add-page-btn:hover { background: #e0e0e0; }
      .create-btn { width: 100%; max-width: 360px; padding: 16px; border-radius: 30px; border: none; background: linear-gradient(135deg, #7657FC 0%, #589AF9 100%); color: white; font-size: 16px; font-weight: 700; cursor: pointer; transition: opacity 0.3s, box-shadow 0.3s; font-family: 'FilsonPro', sans-serif; opacity: 0.6; }
      .create-btn:hover { background: #5a3388; opacity: 1; }
      .create-btn:disabled { opacity: 0.4; cursor: not-allowed; }
      .create-btn.ready { opacity: 1; box-shadow: 0 0 0 0 rgba(107,63,160,0.4); animation: pulse-ring 1.8s ease-out infinite; }
      @keyframes pulse-ring {
        0%   { box-shadow: 0 0 0 0 rgba(107,63,160,0.4); }
        70%  { box-shadow: 0 0 0 10px rgba(107,63,160,0); }
        100% { box-shadow: 0 0 0 0 rgba(107,63,160,0); }
      }
      .divider { width: 100%; max-width: 360px; border: none; border-top: 1px solid #e8e8e8; margin: 16px 0; }
      .manage-btn { width: 100%; max-width: 360px; padding: 16px; border-radius: 30px; border: none; background: #eeeeee; color: #333333; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s; text-decoration: none; display: block; text-align: center; font-family: 'FilsonPro', sans-serif; }
      .manage-btn:hover { background: #e0e0e0; }

      #progress { display: none; width: 100%; max-width: 360px; margin-top: 24px; text-align: center; }
      .progress-bar-wrap { background: #e8e8e8; border-radius: 99px; height: 14px; margin: 14px 0; overflow: hidden; }
      .progress-bar { height: 100%; background: #6b3fa0; border-radius: 99px; transition: width 0.3s; width: 0%; }
      #progress-label { font-size: 18px; font-weight: 700; color: #1a1a1a; }
      #progress-label.error { color: #cc3333; font-weight: 700; }
      #try-again-btn { display: none; margin-top: 14px; background: #eeeeee; color: #333333; border: none; border-radius: 24px; padding: 10px 24px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s; font-family: 'FilsonPro', sans-serif; }
      #try-again-btn:hover { background: #e0e0e0; }

      #result { display: none; width: 100%; max-width: 360px; margin-top: 24px; background: white; border-radius: 16px; padding: 24px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
      #result h3 { font-size: 18px; margin-bottom: 8px; color: #1a1a1a; }
      #result p { font-size: 13px; color: #888; margin-bottom: 16px; }
      #result-url { background: #f2f0eb; border-radius: 10px; padding: 10px 14px; font-size: 12px; word-break: break-all; color: #333; margin-bottom: 12px; }
      #copy-btn { background: #6b3fa0; color: white; border: none; border-radius: 20px; padding: 10px 24px; font-size: 14px; cursor: pointer; font-weight: 600; margin-bottom: 20px; font-family: 'FilsonPro', sans-serif; }

      /* Nav overlay */
      #nav-overlay { display:none; position:fixed; top:0; right:0; bottom:0; left:0; background:linear-gradient(160deg,#5bc8f5 0%,#7c3aed 100%); z-index:200; flex-direction:column; align-items:center; justify-content:center; }
      #nav-drawer { display:flex; flex-direction:column; align-items:center; gap:4px; width:100%; padding:0 24px; }
      .nav-link { display:block; padding:16px 24px; font-size:26px; font-weight:700; color:white; text-decoration:none; font-family:'FilsonPro',sans-serif; text-align:center; opacity:0.95; }
      .nav-link:hover { opacity:1; }
      .nav-link.external { opacity:0.7; font-size:18px; }
      .nav-divider { height:1px; background:rgba(255,255,255,0.25); margin:12px 0; width:120px; }
      .nav-close { position:absolute; top:24px; right:24px; background:none; border:none; color:white; cursor:pointer; padding:4px; }
    </style>
  </head>
  <body>
    <header class="site-header">
      <button id="nav-btn" style="position:absolute;left:20px;top:20px;background:none;border:none;cursor:pointer;padding:4px;" aria-label="Menu">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <img src="/assets/Popcode_logo.rev.svg" alt="Popcode" style="height:80px;"/>
      <div style="position:absolute;right:20px;top:20px;display:flex;align-items:center;gap:10px;">

        <button id="logout-btn" style="background:#78A7FF;color:white;border:none;border-radius:20px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:'FilsonPro',sans-serif;">Sign Out</button>

      </button>

    <div class="page-top-bar">
      <h1>Create a Project</h1>
    </div>
    <p class="subtitle">Add photo + video pairs. Anyone who scans a photo will see its matching video.</p>

    <div class="field-label">Project Name</div>
    <input type="text" id="name-input" placeholder="" />

    <div class="pages" id="pages"></div>

    <button class="add-page-btn" id="add-page-btn">+ Add Popcode</button>
    <button class="create-btn" id="create-btn">Create Project</button>


    <div id="progress">
      <div id="progress-label">Starting...</div>
      <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
      <button id="try-again-btn">Try Again</button>
    </div>

    <div id="result">
      <h3>Your project is live!</h3>
      <p>Share this link — anyone can scan any photo to watch its video.</p>
      <div id="result-url"></div>
      <button id="copy-btn">Copy Link</button>
    </div>

    <script>
      const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      // Auth check
      let currentUser = null;
      db.auth.getSession().then(({ data }) => {
        if (!data.session) {
          window.location.href = '/auth.html';
        } else {
          currentUser = data.session.user;
          const uName = data.session.user?.user_metadata?.full_name?.split(' ')[0] || data.session.user?.email?.split('@')[0] || '';
          if (uName) { const g = document.getElementById('user-greeting'); if (g) g.textContent = 'Hi, ' + uName + '!'; }
        }
      });

      document.getElementById('logout-btn').addEventListener('click', async () => {
        await db.auth.signOut();
        window.location.href = '/auth.html';
      });

      const MAX_VIDEO_MB = 200;
      const MAX_PHOTO_MB = 10;

      let pageCount = 0;
      const pairs = {};

      function formatFileSize(bytes) {
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
      }

      function addPage() {
        pageCount++;
        const n = pageCount;
        pairs[n] = { photo: null, video: null };
        const page = document.createElement('div');
        page.className = 'page';
        page.id = `page-${n}`;
        page.innerHTML = `
          <div class="page-header">
            <div class="page-label">${n}</div>
            <button class="remove-page-btn" onclick="removePage(${n})" title="Remove page"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>
          </div>
          <div class="upload-row">
            <div class="upload-wrapper">
              <label class="upload-btn" id="photo-btn-${n}">
                <input type="file" accept="image/*" onchange="handleFile(this,'photo',${n}).catch(e=>console.error(e))"/>
                <img class="icon" src="/assets/photo.png" alt="Photo"/>
                <img class="preview-img" id="photo-preview-${n}"/>
                <span class="btn-label">Photo to scan</span>
              </label>
              <div class="file-name" id="photo-name-${n}"></div>
              <div class="file-size" id="photo-size-${n}"></div>
            </div>
            <div class="upload-wrapper">
              <label class="upload-btn" id="video-btn-${n}">
                <input type="file" accept="video/*" onchange="handleFile(this,'video',${n}).catch(e=>console.error(e))"/>
                <img class="icon" src="/assets/video.png" alt="Video"/>
                <img class="preview-img" id="video-preview-${n}"/>
                <span class="play-overlay"></span>
                <span class="btn-label">Plays on scan</span>
              </label>
              <div class="file-name" id="video-name-${n}"></div>
              <div class="file-size" id="video-size-${n}"></div>
              <div class="video-msg" id="video-msg-${n}"></div>
            </div>
          </div>
        `;
        document.getElementById('pages').appendChild(page);
        renumberPages();
      }

      function canCompressVideo() {
        try {
          const canvas = document.createElement('canvas');
          if (typeof canvas.captureStream !== 'function') return false;
          if (typeof MediaRecorder === 'undefined') return false;
          const types = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm'];
          return types.some(t => MediaRecorder.isTypeSupported(t));
        } catch (e) { return false; }
      }

      function compressVideo(file, onProgress) {
        const types = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm'];
        const mimeType = types.find(t => MediaRecorder.isTypeSupported(t));
        return new Promise((resolve, reject) => {
          const video = document.createElement('video');
          const srcUrl = URL.createObjectURL(file);
          video.src = srcUrl;
          video.muted = true;
          video.playsInline = true;
          video.onloadedmetadata = () => {
            const MAX_DIM = 1280;
            const scale = Math.min(1, MAX_DIM / Math.max(video.videoWidth || 1, video.videoHeight || 1));
            const w = Math.max(2, Math.round(video.videoWidth * scale / 2) * 2);
            const h = Math.max(2, Math.round(video.videoHeight * scale / 2) * 2);
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            const stream = canvas.captureStream(30);
            const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 2500000 });
            const chunks = [];
            recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
            recorder.onstop = () => { URL.revokeObjectURL(srcUrl); resolve(new Blob(chunks, { type: mimeType.split(';')[0] })); };
            recorder.onerror = e => { URL.revokeObjectURL(srcUrl); reject(e.error || new Error('Compression error')); };
            let animId;
            const draw = () => {
              if (!video.ended && !video.paused) {
                ctx.drawImage(video, 0, 0, w, h);
                onProgress && onProgress(video.currentTime / (video.duration || 1));
                animId = requestAnimationFrame(draw);
              }
            };
            video.onended = () => { cancelAnimationFrame(animId); recorder.stop(); };
            recorder.start(200);
            video.play().then(draw).catch(reject);
          };
          video.onerror = () => reject(new Error('Could not load video for compression'));
          video.load();
        });
      }

      async function handleFile(input, type, n) {
        const file = input.files[0];
        if (!file) return;

        const sizeMB = file.size / (1024 * 1024);
        const limitMB = type === 'video' ? MAX_VIDEO_MB : MAX_PHOTO_MB;

        if (sizeMB > limitMB) {
          if (type === 'video') {
            if (canCompressVideo()) {
              const go = confirm(`This video is ${sizeMB.toFixed(1)} MB — over the ${limitMB} MB limit.\n\nWould you like to compress it? It may take a few minutes.\n\nTap OK to compress, or Cancel to choose a different video.`);
              if (!go) { input.value = ''; return; }
              // Show compression progress
              const msgEl = document.getElementById(`video-msg-${n}`);
              const btn = document.getElementById(`video-btn-${n}`);
              msgEl.style.display = 'block';
              msgEl.innerHTML = `<div class="compress-status">Compressing… 0%</div><div class="compress-bar-wrap"><div class="compress-bar" id="cbar-${n}"></div></div>`;
              btn.style.pointerEvents = 'none';
              let compressed;
              try {
                compressed = await compressVideo(file, p => {
                  document.getElementById(`cbar-${n}`).style.width = Math.round(p * 100) + '%';
                  msgEl.querySelector('.compress-status').textContent = `Compressing… ${Math.round(p * 100)}%`;
                });
              } catch (e) { compressed = null; }
              btn.style.pointerEvents = '';
              const compressedMB = compressed ? compressed.size / (1024 * 1024) : Infinity;
              if (compressed && compressedMB <= limitMB) {
                const compressedFile = new File([compressed], file.name.replace(/\.[^.]+$/, '.webm'), { type: compressed.type });
                msgEl.innerHTML = `<div class="compressed-badge">✓ Compressed to ${compressedMB.toFixed(1)} MB</div>`;
                input.value = '';
                pairs[n][type] = compressedFile;
                btn.classList.add('selected');
                document.getElementById(`video-name-${n}`).textContent = compressedFile.name.length > 18 ? compressedFile.name.substring(0,18)+'…' : compressedFile.name;
                const sizeEl = document.getElementById(`video-size-${n}`);
                sizeEl.textContent = formatFileSize(compressedFile.size);
                sizeEl.className = 'file-size';
                const videoEl = document.createElement('video');
                videoEl.src = URL.createObjectURL(compressedFile);
                videoEl.muted = true; videoEl.playsInline = true; videoEl.currentTime = 0.5;
                videoEl.addEventListener('seeked', () => {
                  const c = document.createElement('canvas'); c.width = 130; c.height = 110;
                  c.getContext('2d').drawImage(videoEl, 0, 0, 130, 110);
                  document.getElementById(`video-preview-${n}`).src = c.toDataURL('image/jpeg');
                });
                videoEl.load();
                return;
              } else {
                msgEl.innerHTML = `<div class="video-msg-banner">Still too large (${compressedMB < Infinity ? compressedMB.toFixed(0) : sizeMB.toFixed(0)} MB). Try <a href="https://clideo.com/compress-video" target="_blank" rel="noopener">clideo.com</a> to compress further.</div>`;
                input.value = ''; return;
              }
            } else {
              // iOS Safari — no captureStream support
              const msgEl = document.getElementById(`video-msg-${n}`);
              msgEl.style.display = 'block';
              msgEl.innerHTML = `<div class="video-msg-banner">${sizeMB.toFixed(1)} MB — over limit. Compress free at <a href="https://clideo.com/compress-video" target="_blank" rel="noopener">clideo.com</a></div>`;
              input.value = ''; return;
            }
          } else {
            alert(`This photo is ${sizeMB.toFixed(1)} MB, which exceeds the ${limitMB} MB limit. Please choose a smaller photo.`);
            input.value = ''; return;
          }
        }

        const msgEl = document.getElementById(`video-msg-${n}`);
        if (msgEl) { msgEl.style.display = 'none'; msgEl.innerHTML = ''; }

        pairs[n][type] = file;
        const btn = document.getElementById(`${type}-btn-${n}`);
        btn.classList.add('selected');
        const shortName = file.name.length > 18 ? file.name.substring(0,18)+'…' : file.name;
        document.getElementById(`${type}-name-${n}`).textContent = shortName;
        const sizeEl = document.getElementById(`${type}-size-${n}`);
        sizeEl.textContent = formatFileSize(file.size);
        sizeEl.className = 'file-size' + (sizeMB > limitMB * 0.8 ? ' warn' : '');

        if (type === 'photo') {
          document.getElementById(`photo-preview-${n}`).src = URL.createObjectURL(file);
        } else {
          const videoEl = document.createElement('video');
          videoEl.src = URL.createObjectURL(file);
          videoEl.muted = true;
          videoEl.playsInline = true;
          videoEl.currentTime = 0.5;
          videoEl.addEventListener('seeked', () => {
            const canvas = document.createElement('canvas');
            canvas.width = 130;
            canvas.height = 110;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(videoEl, 0, 0, 130, 110);
            document.getElementById(`video-preview-${n}`).src = canvas.toDataURL('image/jpeg');
          });
          videoEl.load();
        }
        checkReady();
      }

      function checkReady() {
        const hasComplete = Object.values(pairs).some(p => p.photo && p.video);
        document.getElementById('create-btn').classList.toggle('ready', hasComplete);
      }

      function removePage(n) {
        const page = document.getElementById(`page-${n}`);
        if (page) page.remove();
        delete pairs[n];
        checkReady();
        renumberPages();
      }

      function renumberPages() {
        document.querySelectorAll('#pages .page-label').forEach((label, i) => {
          label.textContent = i + 1;
        });
      }

      document.getElementById('add-page-btn').addEventListener('click', addPage);
      addPage();

      function setProgress(label, pct, isError) {
        const labelEl = document.getElementById('progress-label');
        labelEl.textContent = label;
        labelEl.className = isError ? 'error' : '';
        document.getElementById('progress-bar').style.width = pct + '%';
      }

      function showError(msg) {
        setProgress(msg, 0, true);
        document.getElementById('create-btn').disabled = false;
        document.getElementById('try-again-btn').style.display = 'inline-block';
      }

      function resetProgress() {
        setProgress('Starting...', 0, false);
        document.getElementById('try-again-btn').style.display = 'none';
        document.getElementById('progress').style.display = 'none';
      }

      document.getElementById('try-again-btn').addEventListener('click', () => {
        resetProgress();
        document.getElementById('create-btn').disabled = false;
      });

      function randomSlug() {
        return Math.random().toString(36).substring(2, 10);
      }

      document.getElementById('create-btn').addEventListener('click', async () => {
        const readyPairs = Object.values(pairs).filter(p => p.photo && p.video);
        if (readyPairs.length === 0) {
          alert('Add at least one page with both a photo and video.');
          return;
        }

        for (let i = 0; i < readyPairs.length; i++) {
          const photoMB = readyPairs[i].photo.size / (1024 * 1024);
          const videoMB = readyPairs[i].video.size / (1024 * 1024);
          if (photoMB > MAX_PHOTO_MB) {
            alert(`Page ${i+1}: Photo "${readyPairs[i].photo.name}" is ${photoMB.toFixed(1)} MB (limit: ${MAX_PHOTO_MB} MB). Please replace it with a smaller file.`);
            return;
          }
          if (videoMB > MAX_VIDEO_MB) {
            alert(`Page ${i+1}: Video "${readyPairs[i].video.name}" is ${videoMB.toFixed(1)} MB (limit: ${MAX_VIDEO_MB} MB). Please replace it with a smaller file.`);
            return;
          }
        }

        if (typeof MINDAR === 'undefined' || !MINDAR.IMAGE || !MINDAR.IMAGE.Compiler) {
          alert('MindAR compiler not loaded yet. Please wait a moment and try again.');
          return;
        }

        const createBtn = document.getElementById('create-btn');
        createBtn.disabled = true;
        createBtn.classList.remove('ready');
        document.getElementById('try-again-btn').style.display = 'none';
        document.getElementById('progress').style.display = 'block';
        document.getElementById('result').style.display = 'none';

        const slug = randomSlug();

        let images;
        try {
          setProgress('Loading photos...', 2);
          images = [];
          for (const pair of readyPairs) {
            const img = new Image();
            img.src = URL.createObjectURL(pair.photo);
            await new Promise((resolve, reject) => {
              img.onload = resolve;
              img.onerror = () => reject(new Error(`Could not load photo "${pair.photo.name}". Make sure it is a valid image file.`));
            });
            // Resize to max 640px before compilation to prevent iOS memory crash
            const MAX_COMPILE_DIM = 640;
            if (img.naturalWidth > MAX_COMPILE_DIM || img.naturalHeight > MAX_COMPILE_DIM) {
              const scale = Math.min(MAX_COMPILE_DIM / img.naturalWidth, MAX_COMPILE_DIM / img.naturalHeight);
              const rc = document.createElement('canvas');
              rc.width = Math.round(img.naturalWidth * scale);
              rc.height = Math.round(img.naturalHeight * scale);
              rc.getContext('2d').drawImage(img, 0, 0, rc.width, rc.height);
              const resized = new Image();
              resized.src = rc.toDataURL('image/jpeg', 0.92);
              await new Promise(r => resized.onload = r);
              images.push(resized);
            } else {
              images.push(img);
            }
          }
        } catch (err) {
          showError('Step 1 failed — ' + err.message);
          return;
        }

        let mindBlob;
        try {
          setProgress('Compiling image targets...', 5);
          const compiler = new MINDAR.IMAGE.Compiler();
          await compiler.compileImageTargets(images, (progress) => {
            setProgress(`Compiling image targets... ${Math.round(progress)}%`, 5 + progress * 0.45);
          });
          const mindBuffer = await compiler.exportData();
          mindBlob = new Blob([mindBuffer]);
        } catch (err) {
          showError('Step 2 failed (image target compilation) — ' + (err.message || 'Compilation error. Check that your photos are clear, flat images.'));
          return;
        }

        let mindUrl;
        try {
          setProgress('Uploading image targets...', 55);
          const { error: mindError } = await db.storage
            .from('experiences')
            .upload(`${slug}/target.mind`, mindBlob, { contentType: 'application/octet-stream' });
          if (mindError) throw mindError;
          mindUrl = db.storage.from('experiences').getPublicUrl(`${slug}/target.mind`).data.publicUrl + `?v=${Date.now()}`;
        } catch (err) {
          showError('Step 3 failed (uploading image targets) — ' + (err.message || 'Upload error. Check your internet connection and try again.'));
          return;
        }

        const videoUrls = [], photoUrls = [];
        try {
          for (let i = 0; i < readyPairs.length; i++) {
            setProgress(`Uploading page ${i+1} of ${readyPairs.length}...`, 60 + (i / readyPairs.length) * 25);
            if (readyPairs[i].video.size === 0) {
              throw new Error(`Video ${i+1} ("${readyPairs[i].video.name}") is empty — it may have expired. Please remove and re-add it.`);
            }
            const { error: videoError } = await db.storage
              .from('experiences')
              .upload(`${slug}/video_${i}.mp4`, readyPairs[i].video, { contentType: readyPairs[i].video.type || 'video/mp4' });
            if (videoError) throw new Error(`Video ${i+1} ("${readyPairs[i].video.name}"): ${videoError.message}`);
            videoUrls.push(db.storage.from('experiences').getPublicUrl(`${slug}/video_${i}.mp4`).data.publicUrl);

            const photoExt = readyPairs[i].photo.name.split('.').pop() || 'jpg';
            const { error: photoError } = await db.storage
              .from('experiences')
              .upload(`${slug}/photo_${i}.${photoExt}`, readyPairs[i].photo, { contentType: readyPairs[i].photo.type || 'image/jpeg' });
            if (photoError) throw new Error(`Photo ${i+1}: ${photoError.message}`);
            photoUrls.push(db.storage.from('experiences').getPublicUrl(`${slug}/photo_${i}.${photoExt}`).data.publicUrl);
          }
        } catch (err) {
          showError('Step 4 failed (uploading files) — ' + (err.message || 'Upload error. Check your internet connection and try again.'));
          return;
        }

        let collection;
        try {
          setProgress('Saving project...', 90);
          const name = document.getElementById('name-input').value.trim() || null;
          const { data, error: colError } = await db
            .from('collections')
            .insert({ slug, name, mind_file_url: mindUrl, user_id: currentUser.id })
            .select().single();
          if (colError) throw colError;
          collection = data;
        } catch (err) {
          showError('Step 5 failed (saving project) — ' + (err.message || 'Database error. Your files were uploaded but the project record could not be saved.'));
          return;
        }

        try {
          const items = readyPairs.map((_, i) => ({
            collection_id: collection.id,
            target_index: i,
            video_url: videoUrls[i],
            photo_url: photoUrls[i]
          }));
          const { error: itemsError } = await db.from('collection_items').insert(items);
          if (itemsError) throw itemsError;
        } catch (err) {
          showError('Step 6 failed (saving page items) — ' + (err.message || 'Database error. The project was created but page items could not be saved.'));
          return;
        }

        setProgress('Done!', 100);
        const viewUrl = `https://popcode.app/${slug}`;
        const shortUrl = `popcode.app/${slug}`;
        document.getElementById('result-url').innerHTML = `<a href="${viewUrl}" target="_blank" rel="noopener" style="color:#6b3fa0;text-decoration:none;font-weight:600;">${shortUrl}</a>`;
        document.getElementById('result').style.display = 'block';
        document.getElementById('copy-btn').onclick = () => {
          navigator.clipboard.writeText(viewUrl);
          document.getElementById('copy-btn').textContent = 'Copied!';
        };

      });

      // Nav overlay
      document.getElementById('nav-btn').addEventListener('click', function() {
        document.getElementById('nav-overlay').style.display = 'flex';
      });
      document.getElementById('nav-close-btn').addEventListener('click', function() {
        document.getElementById('nav-overlay').style.display = 'none';
      });
      document.getElementById('nav-overlay').addEventListener('click', function(e) {
        if (e.target === document.getElementById('nav-overlay')) {
          document.getElementById('nav-overlay').style.display = 'none';
        }
      });
    </script>
  </body>
</html>
