<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Popcode — Create Collection</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: sans-serif; background: #f5f5f7; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
      .logo { font-size: 28px; font-weight: bold; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 32px; }
      .card { background: white; border-radius: 20px; padding: 32px; width: 100%; max-width: 520px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
      h1 { font-size: 22px; margin-bottom: 8px; color: #111; }
      p.subtitle { color: #666; font-size: 15px; margin-bottom: 28px; }

      .name-field { margin-bottom: 24px; }
      .name-field label { font-size: 14px; font-weight: 600; color: #333; display: block; margin-bottom: 8px; }
      .name-field input { width: 100%; padding: 12px 16px; border: 2px solid #eee; border-radius: 10px; font-size: 15px; outline: none; transition: border-color 0.2s; }
      .name-field input:focus { border-color: #a78bfa; }

      .pair { border: 2px solid #eee; border-radius: 14px; padding: 20px; margin-bottom: 16px; position: relative; }
      .pair-header { font-size: 13px; font-weight: 700; color: #a78bfa; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 14px; }
      .pair-row { display: flex; gap: 12px; }
      .upload-box { flex: 1; border: 2px dashed #ddd; border-radius: 10px; padding: 16px 10px; text-align: center; cursor: pointer; position: relative; transition: border-color 0.2s; }
      .upload-box:hover { border-color: #a78bfa; }
      .upload-box.has-file { border-color: #a78bfa; border-style: solid; background: #faf5ff; }
      .upload-box input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
      .upload-box .icon { font-size: 24px; margin-bottom: 4px; }
      .upload-box .label { font-size: 12px; font-weight: 600; color: #555; }
      .upload-box .sub { font-size: 11px; color: #999; margin-top: 2px; }
      .upload-box.has-file .label { color: #7c3aed; }
      .remove-btn { position: absolute; top: 12px; right: 14px; background: none; border: none; color: #ccc; font-size: 18px; cursor: pointer; line-height: 1; }
      .remove-btn:hover { color: #f87171; }

      #add-btn { width: 100%; padding: 14px; background: white; border: 2px dashed #a78bfa; color: #7c3aed; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 20px; transition: background 0.2s; }
      #add-btn:hover { background: #faf5ff; }

      #create-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #60a5fa, #a78bfa); color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
      #create-btn:disabled { opacity: 0.5; cursor: not-allowed; }

      #progress { display: none; margin-top: 24px; text-align: center; }
      .progress-bar-wrap { background: #eee; border-radius: 99px; height: 8px; margin: 12px 0; overflow: hidden; }
      .progress-bar { height: 100%; background: linear-gradient(135deg, #60a5fa, #a78bfa); border-radius: 99px; transition: width 0.3s; width: 0%; }
      #progress-label { font-size: 14px; color: #666; }

      #result { display: none; margin-top: 24px; background: #faf5ff; border: 2px solid #a78bfa; border-radius: 12px; padding: 20px; text-align: center; }
      #result h3 { color: #7c3aed; margin-bottom: 8px; }
      #result p { font-size: 13px; color: #666; margin-bottom: 12px; }
      #result-url { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 10px 14px; font-size: 13px; word-break: break-all; color: #333; margin-bottom: 12px; }
      #copy-btn { background: #7c3aed; color: white; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; cursor: pointer; font-weight: 600; }
      #qr-container { margin-top: 16px; }
      #qr-container p { margin-bottom: 8px; }
      #qr-canvas { border-radius: 12px; }
    </style>
  </head>
  <body>
    <div class="logo">popcode</div>
    <div class="card">
      <h1>Create a Collection</h1>
      <p class="subtitle">Add photo + video pairs. Anyone who scans a photo will see its video.</p>

      <div class="name-field">
        <label>Collection Name (optional)</label>
        <input type="text" id="name-input" placeholder="e.g. Moose Scout Book"/>
      </div>

      <div id="pairs-container"></div>

      <button id="add-btn">+ Add Page</button>
      <button id="create-btn">Create Collection</button>

      <div id="progress">
        <div id="progress-label">Starting...</div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </div>

      <div id="result">
        <h3>Your collection is live!</h3>
        <p>Share this link — anyone can scan any photo to watch its video.</p>
        <div id="result-url"></div>
        <button id="copy-btn">Copy Link</button>
        <div id="qr-container">
          <p>Scan to open on your phone — or print this QR code for your book:</p>
          <canvas id="qr-canvas"></canvas>
        </div>
      </div>
    </div>

    <script>
      const SUPABASE_URL = 'https://mrwpkhsluzokytpvmwqk.supabase.co';
      const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yd3BraHNsdXpva3l0cHZtd3FrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTA2MDksImV4cCI6MjA5MTE2NjYwOX0.YMfuRpKvcmfoJ75Gxhf7ekoCaeDfR0Dsz_9Beg5ULAI';
      const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      let pairs = [];
      let pairCount = 0;

      function addPair() {
        const index = pairCount++;
        const pair = { index, photoFile: null, videoFile: null };
        pairs.push(pair);

        const div = document.createElement('div');
        div.className = 'pair';
        div.dataset.index = index;
        div.innerHTML = `
          <div class="pair-header">Page ${pairs.length}</div>
          <button class="remove-btn" onclick="removePair(${index})">✕</button>
          <div class="pair-row">
            <div class="upload-box" id="photo-box-${index}">
              <input type="file" accept="image/*" onchange="handlePhoto(${index}, this)"/>
              <div class="icon">🖼️</div>
              <div class="label">Trigger Photo</div>
              <div class="sub">Photo to scan</div>
            </div>
            <div class="upload-box" id="video-box-${index}">
              <input type="file" accept="video/*" onchange="handleVideo(${index}, this)"/>
              <div class="icon">🎬</div>
              <div class="label">Video</div>
              <div class="sub">Plays on scan</div>
            </div>
          </div>
        `;
        document.getElementById('pairs-container').appendChild(div);
        updateHeaders();
      }

      function removePair(index) {
        pairs = pairs.filter(p => p.index !== index);
        document.querySelector(`.pair[data-index="${index}"]`).remove();
        updateHeaders();
      }

      function updateHeaders() {
        document.querySelectorAll('.pair').forEach((el, i) => {
          el.querySelector('.pair-header').textContent = `Page ${i + 1}`;
        });
      }

      function handlePhoto(index, input) {
        const pair = pairs.find(p => p.index === index);
        if (pair) {
          pair.photoFile = input.files[0];
          const box = document.getElementById(`photo-box-${index}`);
          box.classList.add('has-file');
          box.querySelector('.label').textContent = input.files[0].name;
        }
      }

      function handleVideo(index, input) {
        const pair = pairs.find(p => p.index === index);
        if (pair) {
          pair.videoFile = input.files[0];
          const box = document.getElementById(`video-box-${index}`);
          box.classList.add('has-file');
          box.querySelector('.label').textContent = input.files[0].name;
        }
      }

      document.getElementById('add-btn').addEventListener('click', addPair);

      function setProgress(label, pct) {
        document.getElementById('progress-label').textContent = label;
        document.getElementById('progress-bar').style.width = pct + '%';
      }

      function randomSlug() {
        return Math.random().toString(36).substring(2, 10);
      }

      document.getElementById('create-btn').addEventListener('click', async () => {
        const readyPairs = pairs.filter(p => p.photoFile && p.videoFile);
        if (readyPairs.length === 0) {
          alert('Add at least one page with both a photo and video.');
          return;
        }

        document.getElementById('create-btn').disabled = true;
        document.getElementById('progress').style.display = 'block';
        document.getElementById('result').style.display = 'none';

        try {
          const slug = randomSlug();

          // Step 1: Compile all images into one .mind file
          setProgress('Compiling image targets...', 5);
          const images = [];
          for (const pair of readyPairs) {
            const img = new Image();
            img.src = URL.createObjectURL(pair.photoFile);
            await new Promise(resolve => img.onload = resolve);
            images.push(img);
          }

          const compiler = new MINDAR.IMAGE.Compiler();
          await compiler.compileImageTargets(images, (progress) => {
            setProgress(`Compiling image targets... ${Math.round(progress)}%`, 5 + progress * 0.45);
          });
          const mindBuffer = await compiler.exportData();
          const mindBlob = new Blob([mindBuffer]);

          // Step 2: Upload .mind file
          setProgress('Uploading image targets...', 55);
          const { error: mindError } = await db.storage
            .from('experiences')
            .upload(`${slug}/target.mind`, mindBlob, { contentType: 'application/octet-stream' });
          if (mindError) throw mindError;

          const mindUrl = db.storage.from('experiences').getPublicUrl(`${slug}/target.mind`).data.publicUrl;

          // Step 3: Upload videos
          const videoUrls = [];
          for (let i = 0; i < readyPairs.length; i++) {
            setProgress(`Uploading video ${i + 1} of ${readyPairs.length}...`, 60 + (i / readyPairs.length) * 25);
            const { error: videoError } = await db.storage
              .from('experiences')
              .upload(`${slug}/video_${i}.mp4`, readyPairs[i].videoFile, { contentType: readyPairs[i].videoFile.type });
            if (videoError) throw videoError;
            videoUrls.push(db.storage.from('experiences').getPublicUrl(`${slug}/video_${i}.mp4`).data.publicUrl);
          }

          // Step 4: Save to database
          setProgress('Saving collection...', 90);
          const name = document.getElementById('name-input').value || null;
          const { data: collection, error: colError } = await db
            .from('collections')
            .insert({ slug, name, mind_file_url: mindUrl })
            .select()
            .single();
          if (colError) throw colError;

          const items = readyPairs.map((_, i) => ({
            collection_id: collection.id,
            target_index: i,
            video_url: videoUrls[i]
          }));
          const { error: itemsError } = await db.from('collection_items').insert(items);
          if (itemsError) throw itemsError;

          // Done
          setProgress('Done!', 100);
          const viewUrl = `${location.origin}/view.html?id=${slug}`;
          document.getElementById('result-url').textContent = viewUrl;
          document.getElementById('result').style.display = 'block';

          QRCode.toCanvas(document.getElementById('qr-canvas'), viewUrl, { width: 200, margin: 2 });

          document.getElementById('copy-btn').onclick = () => {
            navigator.clipboard.writeText(viewUrl);
            document.getElementById('copy-btn').textContent = 'Copied!';
          };

        } catch (err) {
          setProgress('Error: ' + err.message, 0);
          document.getElementById('create-btn').disabled = false;
        }
      });

      // Start with one pair
      addPair();
    </script>
  </body>
</html>
