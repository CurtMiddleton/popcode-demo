<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Popcode — Create</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        background: linear-gradient(160deg, #5bc8f5 0%, #7c3aed 100%);
        font-family: sans-serif;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 48px 24px 60px;
      }
      .logo {
        font-size: 30px;
        font-weight: 900;
        letter-spacing: -1px;
        margin-bottom: 24px;
      }
      h1 {
        font-size: 22px;
        font-weight: 800;
        margin-bottom: 8px;
        text-align: center;
      }
      .subtitle {
        font-size: 14px;
        text-align: center;
        opacity: 0.85;
        margin-bottom: 28px;
        max-width: 280px;
        line-height: 1.5;
      }
      .field-label {
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 10px;
        width: 100%;
        max-width: 360px;
        text-align: center;
      }
      input[type="text"] {
        width: 100%;
        max-width: 360px;
        padding: 14px 16px;
        border-radius: 12px;
        border: none;
        font-size: 16px;
        color: #333;
        margin-bottom: 32px;
        outline: none;
      }
      .pages {
        width: 100%;
        max-width: 360px;
      }
      .page {
        margin-bottom: 28px;
      }
      .page-label {
        font-size: 16px;
        font-weight: 700;
        text-align: center;
        margin-bottom: 16px;
      }
      .upload-row {
        display: flex;
        gap: 24px;
        justify-content: center;
      }
      .upload-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        background: white;
        border-radius: 50%;
        width: 120px;
        height: 120px;
        justify-content: center;
        cursor: pointer;
        border: none;
        box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        transition: transform 0.15s;
      }
      .upload-btn:active { transform: scale(0.95); }
      .upload-btn img {
        width: 48px;
        height: 48px;
      }
      .upload-btn span {
        font-size: 12px;
        color: #555;
        font-weight: 600;
        text-align: center;
        padding: 0 8px;
      }
      .add-page-btn {
        width: 100%;
        max-width: 360px;
        padding: 16px;
        border-radius: 30px;
        border: none;
        background: #3d2b8e;
        color: white;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        margin-bottom: 16px;
        transition: background 0.2s;
      }
      .add-page-btn:hover { background: #4e38a8; }
      .create-btn {
        width: 100%;
        max-width: 360px;
        padding: 18px;
        border-radius: 30px;
        border: none;
        background: rgba(100, 220, 230, 0.5);
        color: white;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.2s;
      }
      .create-btn:hover { background: rgba(100, 220, 230, 0.7); }
    </style>
  </head>
  <body>
    <div class="logo">popcode</div>
    <h1>Create a Collection</h1>
    <p class="subtitle">Add photo + video pairs. Anyone who scans a photo will see its matching video.</p>

    <div class="field-label">Collection Name (optional)</div>
    <input type="text" placeholder="My Memories" />

    <div class="pages" id="pages">
      <div class="page">
        <div class="page-label">Page 1</div>
        <div class="upload-row">
          <button class="upload-btn">
            <img src="/assets/photo.png" alt="Photo"/>
            <span>Photo to scan</span>
          </button>
          <button class="upload-btn">
            <img src="/assets/video.png" alt="Video"/>
            <span>Plays on scan</span>
          </button>
        </div>
      </div>
    </div>

    <button class="add-page-btn" id="add-page-btn">+ Add Page</button>
    <button class="create-btn">Create Collection</button>

    <script>
      let pageCount = 1;
      document.getElementById('add-page-btn').addEventListener('click', () => {
        pageCount++;
        const pages = document.getElementById('pages');
        const page = document.createElement('div');
        page.className = 'page';
        page.innerHTML = `
          <div class="page-label">Page ${pageCount}</div>
          <div class="upload-row">
            <button class="upload-btn">
              <img src="/assets/photo.png" alt="Photo"/>
              <span>Photo to scan</span>
            </button>
            <button class="upload-btn">
              <img src="/assets/video.png" alt="Video"/>
              <span>Plays on scan</span>
            </button>
          </div>
        `;
        pages.appendChild(page);
      });
    </script>
  </body>
</html>
