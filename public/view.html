      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: black; overflow: hidden; overflow-x: hidden; }
      a-scene { width: 100vw; height: 100vh; }
      canvas { width: 100vw !important; height: 100vh !important; }

      #loading {
        position: fixed; top: 0; right: 0; bottom: 0; left: 0;
        background: linear-gradient(160deg, #5bc8f5 0%, #7c3aed 100%);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; z-index: 9999;
        font-family: 'FilsonPro', sans-serif;
      }
      #loading img.splash-logo { height: 100px; margin-bottom: 32px; }
      .spinner {
        width: 36px; height: 36px; border-radius: 50%;
        border: 3px solid rgba(255,255,255,0.3);
        border-top-color: white;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      #loading-text { color: white; font-size: 14px; margin-top: 16px; opacity: 0.75; }

      #start-screen {
        display: none; position: fixed; top: 0; right: 0; bottom: 0; left: 0;
        background: linear-gradient(160deg, #5bc8f5 0%, #7c3aed 100%);
        flex-direction: column; align-items: center;
        justify-content: center; gap: 0; z-index: 9999;
        font-family: 'FilsonPro', sans-serif;
        padding-bottom: 60px;
      }
      #start-screen img.splash-logo { height: 100px; margin-bottom: 10px; }
      #tagline {
        font-family: 'CooperBT', serif;
        font-weight: 300;
        font-size: 32px;
        color: white;
        line-height: 1.125;
        text-align: center;
        opacity: 0.92;
        margin-bottom: 70px;
      }
      #start-btn {
        padding: 20px 48px; font-size: 20px; border-radius: 999px;
        border: none; background: white; color: #6b3fa0;
        font-family: 'FilsonPro', sans-serif; font-weight: bold; cursor: pointer;
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      }
      #cta-group {
        position: absolute; bottom: 12%; left: 0; right: 0;
        display: flex; flex-direction: column; align-items: center; gap: 16px;
      }
      #create-btn {
        padding: 14px 36px; font-size: 16px; border-radius: 30px;
        border: 1px solid rgba(255,255,255,0.7); background: transparent; color: white;
        font-family: 'FilsonPro', sans-serif; font-weight: bold; cursor: pointer;
        text-decoration: none; display: inline-block; text-align: center;
      }
      #create-btn:hover { background: rgba(255,255,255,0.1); }
      #signin-link {
        font-size: 14px; color: rgba(255,255,255,0.75);
        font-family: 'FilsonPro', sans-serif; text-decoration: none;
      }
      #signin-link:hover { color: white; }

      #scanner { display: none; position: fixed; top: 0; right: 0; bottom: 0; left: 0; z-index: 999; pointer-events: none; }
      .corner {
        position: absolute; width: 36px; height: 36px;
        border-color: white; border-style: solid; opacity: 0;
        transition: border-color 0.3s ease, top 0.5s ease, left 0.5s ease,
                    right 0.5s ease, bottom 0.5s ease, width 0.5s ease,
                    height 0.5s ease, filter 0.3s ease, opacity 0.3s ease;
      }
      .corner.tl { top: 50%; left: 50%; margin-top: -24px; margin-left: -24px; border-width: 4px 0 0 4px; }
      .corner.tr { top: 50%; right: 50%; margin-top: -24px; margin-right: -24px; border-width: 4px 4px 0 0; }
      .corner.bl { bottom: 50%; left: 50%; margin-bottom: -24px; margin-left: -24px; border-width: 0 0 4px 4px; }
      .corner.br { bottom: 50%; right: 50%; margin-bottom: -24px; margin-right: -24px; border-width: 0 4px 4px 0; }
      .corner.expanded { border-color: #a78bfa; filter: drop-shadow(0 0 10px #a78bfa); width: 50px; height: 50px; opacity: 1; }
      .corner.expanded.tl { top: 24px; left: 24px; margin: 0; border-width: 6px 0 0 6px; }
      .corner.expanded.tr { top: 24px; right: 24px; margin: 0; border-width: 6px 6px 0 0; }
      .corner.expanded.bl { bottom: 24px; left: 24px; margin: 0; border-width: 0 0 6px 6px; }
      .corner.expanded.br { bottom: 24px; right: 24px; margin: 0; border-width: 0 6px 6px 0; }

      #fullscreen-video { display: none; position: fixed; top: 0; right: 0; bottom: 0; left: 0; z-index: 9000; background: black; }
      #fullscreen-video video { width: 100%; height: 100%; object-fit: cover; }

      #fade-overlay {
        display: none; position: fixed; top: 0; right: 0; bottom: 0; left: 0;
        background: black; z-index: 9100; opacity: 0;
        transition: opacity 1s ease; pointer-events: none;
      }
      #close-btn {
        position: absolute; top: 20px; right: 20px; z-index: 9001;
        background: rgba(110,110,110,0.85); color: white; border: none;
        border-radius: 50%; width: 44px; height: 44px;
        font-size: 22px; display: none;
        align-items: center; justify-content: center; cursor: pointer;
      }
      #home-btn {
        position: fixed; top: 20px; left: 20px; z-index: 1000;
        background: rgba(0,0,0,0.55); color: white; border: none;
        border-radius: 50%; width: 44px; height: 44px; font-size: 20px;
        display: none; align-items: center; justify-content: center;
        cursor: pointer; text-decoration: none;
      }
      #scan-hint {
        display: none; position: fixed; bottom: 48px; left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.55); color: white;
        font-family: 'FilsonPro', sans-serif; font-size: 15px; font-weight: 600;
        padding: 10px 22px; border-radius: 24px;
        pointer-events: none; z-index: 1000;
        white-space: nowrap;
      }
      #reload-hint {
        display: none; position: fixed; bottom: 12px; left: 50%;
        transform: translateX(-50%);
        font-family: 'FilsonPro', sans-serif; font-size: 13px; color: rgba(255,255,255,0.85);
        z-index: 1000; white-space: nowrap; cursor: pointer;
        background: rgba(0,0,0,0.55); border: none; padding: 8px 20px;
        border-radius: 24px; text-decoration: underline;
      }
      #error-screen {
        display: none; position: fixed; top: 0; right: 0; bottom: 0; left: 0; background: black;
        color: white; font-family: 'FilsonPro', sans-serif;
        align-items: center; justify-content: center;
        flex-direction: column; text-align: center; padding: 40px; z-index: 99999;
      }
      #error-screen h2 { margin-bottom: 12px; }
      #error-screen p { color: #999; font-size: 14px; }

      /* Portrait-only lock for phones. iOS Safari blocks programmatic
         orientation locking on the web, so we cover the page with an
         overlay whenever a phone is held in landscape. Limited to small
         screens (max-height: 500px) so iPads in landscape aren't affected. */
      #orientation-lock {
        display: none;
      }
      @media (orientation: landscape) and (max-height: 500px) {
        #orientation-lock {
          display: flex;
          position: fixed; top: 0; right: 0; bottom: 0; left: 0;
          background: linear-gradient(160deg, #5bc8f5 0%, #7c3aed 100%);
          color: white;
          font-family: 'FilsonPro', sans-serif;
          align-items: center; justify-content: center;
          flex-direction: column; text-align: center; padding: 20px;
          z-index: 100000;
        }
        #orientation-lock .phone-ill {
          width: 90px; height: auto; margin-bottom: 18px;
          animation: phone-rotate 2.4s ease-in-out infinite;
          transform-origin: center center;
        }
        #orientation-lock h2 {
          font-size: 28px;
          font-weight: 700;
          margin: 0 0 6px;
          line-height: 1.15;
        }
        #orientation-lock p {
          font-size: 15px;
          color: rgba(255,255,255,0.8);
          margin: 0;
        }
        @keyframes phone-rotate {
          0%, 30%   { transform: rotate(-90deg); }
          65%, 100% { transform: rotate(0deg); }
        }
      }
    </style>
  </head>
  <body>
    <div id="orientation-lock">
      <svg class="phone-ill" viewBox="0 0 80 140" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="6" y="4" width="68" height="132" rx="14" ry="14"/>
        <line x1="32" y1="16" x2="48" y2="16"/>
        <circle cx="40" cy="122" r="4"/>
      </svg>
      <h2>Turn phone upright<br/>to scan</h2>
      <p>Rotate back once a video plays.</p>
    </div>
    <div id="loading">
      <img class="splash-logo" src="/assets/Popcode_logo.rev.svg" alt="Popcode"/>
      <div class="spinner"></div>
      <div id="loading-text">Loading experience...</div>
    </div>
    <div id="start-screen">
      <img class="splash-logo" src="/assets/Popcode_logo.rev.svg" alt="Popcode"/>
      <div id="tagline">Your Stories.<br>Brought to Life.</div>
      <button id="start-btn">Tap to Scan</button>
      <div id="cta-group">
        <a id="create-btn" href="/create.html">Create your own Popcode</a>
        <a id="signin-link" href="/manage.html">Already have an account? <span style="text-decoration:underline;">Sign in</span></a>
      </div>
    </div>
    <div id="error-screen"><h2>Experience not found</h2><p>This link may be invalid or expired.</p></div>

    <button id="home-btn">&#8592;</button>
    <div id="scan-hint">Point your camera at a Popcoded photo</div>
    <button id="reload-hint">Having trouble? Tap to reload</button>
    <div id="scanner">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>

<div id="fade-overlay"></div>
    <div id="fullscreen-video">
<video id="fullvideo" playsinline webkit-playsinline muted></video>
      <button id="close-btn">✕</button>
    </div>

    <script>
      const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      const params = new URLSearchParams(location.search);
      const id = params.get('id') || location.pathname.replace(/^\/|\/$/g, '');

      // ── Analytics ────────────────────────────────────────────────────────────
      function getDeviceInfo() {
        const ua = navigator.userAgent;
        const device = /iPad|iPhone|iPod/.test(ua) ? 'iOS' :
                       /Android/.test(ua) ? 'Android' : 'Desktop';
        const browser = /CriOS/.test(ua) ? 'Chrome iOS' :
                        /FxiOS/.test(ua) ? 'Firefox iOS' :
                        /EdgiOS/.test(ua) ? 'Edge iOS' :
                        (/Safari/.test(ua) && /Apple/.test(navigator.vendor)) ? 'Safari' :
                        /Chrome/.test(ua) ? 'Chrome' :
                        /Firefox/.test(ua) ? 'Firefox' : 'Other';
        return { device, browser };
      }
      async function logEvent(eventType, targetIndex = null) {
        if (!id) return;
        try {
          const { device, browser } = getDeviceInfo();
          const session = (await db.auth.getSession()).data.session;
          await fetch('/api/log-event', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              slug: id, event_type: eventType,
              target_index: targetIndex,
              device_type: device, browser,
              user_id: session?.user?.id ?? null
            })
          });
        } catch(e) {} // never let analytics break the app
      }

      if (!id) { showError(); } else { loadCollection(id); }

      function showError() {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error-screen').style.display = 'flex';
      }

      async function loadCollection(id) {
        let mindUrl, videoMap = {};

        const { data: col } = await db.from('collections').select('*').eq('slug', id).single();

        if (col) {
          // Save to recent views localStorage
          try {
            const views = JSON.parse(localStorage.getItem('popcode_views') || '{}');
            views[id] = { name: col.name || id, last_viewed: new Date().toISOString() };
            localStorage.setItem('popcode_views', JSON.stringify(views));
          } catch(e) {}
          mindUrl = col.mind_file_url;
          const { data: items } = await db.from('collection_items')
            .select('*').eq('collection_id', col.id).order('target_index');
          (items || []).forEach(item => { videoMap[item.target_index] = item.video_url; });
          if (!mindUrl || Object.keys(videoMap).length === 0) { showError(); return; }
        } else {
          const { data: exp } = await db.from('experiences').select('*').eq('slug', id).single();
          if (!exp) { showError(); return; }
          mindUrl = exp.mind_file_url;
          videoMap[0] = exp.video_url;
        }

        const scene = document.createElement('a-scene');
        scene.setAttribute('mindar-image', `imageTargetSrc: ${mindUrl}; autoStart: false; warmupTolerance: 2; missTolerance: 10;`);
        scene.setAttribute('embedded', '');
        scene.setAttribute('vr-mode-ui', 'enabled: false');
        scene.setAttribute('device-orientation-permission-ui', 'enabled: false');

        const camera = document.createElement('a-camera');
        camera.setAttribute('position', '0 0 0');
        camera.setAttribute('look-controls', 'enabled: false');
        scene.appendChild(camera);

        Object.keys(videoMap).forEach(idx => {
          const target = document.createElement('a-entity');
          target.setAttribute('mindar-image-target', `targetIndex: ${idx}`);
          target.addEventListener('targetFound', () => {
            if (!videoActive) {
              logEvent('target_found', parseInt(idx));
              triggerVideo(videoMap[idx]);
            }
          });
          target.addEventListener('targetLost', () => {
            if (triggerTimer) {
              clearTimeout(triggerTimer);
              triggerTimer = null;
              document.querySelectorAll('.corner').forEach(c => c.classList.remove('expanded'));
            }
          });
          scene.appendChild(target);
        });

        document.body.appendChild(scene);
        arScene = scene;

        scene.addEventListener('arError', () => {
          document.getElementById('loading').style.display = 'none';
          showError();
        });

        document.getElementById('loading').style.display = 'none';
        document.getElementById('start-screen').style.display = 'flex';
        logEvent('scan_open');

        document.getElementById('start-btn').addEventListener('click', () => {
          // Start MindAR from within the user-gesture click handler. iOS 18
          // Safari requires a user gesture for camera access; autoStart:true
          // triggered getUserMedia without a gesture and hung the main thread.
          const mindar = scene.systems['mindar-image-system'];
          if (mindar && typeof mindar.start === 'function') {
            mindar.start();
          }
          document.getElementById('start-screen').style.display = 'none';
          document.getElementById('scanner').style.display = 'block';
          document.getElementById('scan-hint').style.display = 'block';
          document.getElementById('home-btn').style.display = 'flex';
          startReloadHintTimer();
        });
      }

      const fullVid = document.getElementById('fullvideo');
      const fullScreen = document.getElementById('fullscreen-video');
      const closeBtn = document.getElementById('close-btn');
      const scanner = document.getElementById('scanner');
      let videoActive = false;
      let triggerTimer = null;
      let reloadHintTimer = null;
      let arScene = null; // set inside loadCollection; used by triggerVideo/returnToScanner

      const reloadHintBtn = document.getElementById('reload-hint');
      reloadHintBtn.addEventListener('click', () => location.reload());

      function startReloadHintTimer() {
        clearTimeout(reloadHintTimer);
        reloadHintBtn.style.display = 'none';
        reloadHintTimer = setTimeout(() => {
          if (!videoActive) reloadHintBtn.style.display = 'block';
        }, 10000);
      }
      function clearReloadHint() {
        clearTimeout(reloadHintTimer);
        reloadHintBtn.style.display = 'none';
      }

      function showVideoError(msg) {
        videoActive = false;
        fullScreen.style.display = 'none';
        closeBtn.style.display = 'none';
        scanner.style.display = 'block';
        document.querySelectorAll('.corner').forEach(c => c.classList.remove('expanded'));
        const hint = document.getElementById('scan-hint');
        hint.textContent = msg;
        hint.style.display = 'block';
        setTimeout(() => { hint.textContent = 'Point your camera at a Popcoded photo'; }, 4000);
      }

      function triggerVideo(url) {
        if (!url) { showVideoError('No video found for this photo'); return; }
        videoActive = true;
        clearReloadHint();
        document.getElementById('scan-hint').style.display = 'none';
        document.querySelectorAll('.corner').forEach(c => c.classList.add('expanded'));
        triggerTimer = setTimeout(() => {
          triggerTimer = null;
          // Stop MindAR's camera before playing the video. On iOS 16 Safari,
          // getUserMedia and <video> playback can't share the media session,
          // so the video freezes on the first frame unless the camera is
          // released first. Re-started from returnToScanner() on close.
          try {
            const mindar = arScene && arScene.systems && arScene.systems['mindar-image-system'];
            if (mindar && typeof mindar.stop === 'function') mindar.stop();
          } catch(e) {}
          fullVid.src = url;
          fullVid.load();
          scanner.style.display = 'none';
          document.getElementById('home-btn').style.display = 'none';
          fullScreen.style.display = 'block';
          closeBtn.style.display = 'flex';
          fullVid.muted = true;
fullVid.play()
  .then(() => {
    fullVid.muted = false;
    logEvent('video_play');
  })
  .catch(err => { logEvent('video_error'); showVideoError('Video failed to play — tap X and try again'); });
        }, 900);
      }

      // ── Fullscreen helpers (hides browser chrome for landscape videos) ─────
      function tryGoFullscreen() {
        const el = fullScreen;
        try {
          if (el.requestFullscreen) el.requestFullscreen();
          else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
          else if (fullVid.webkitEnterFullscreen) fullVid.webkitEnterFullscreen();
        } catch(e) {}
      }
      function tryExitFullscreen() {
        try {
          if (document.exitFullscreen && document.fullscreenElement) document.exitFullscreen();
          else if (document.webkitExitFullscreen && document.webkitFullscreenElement) document.webkitExitFullscreen();
        } catch(e) {}
      }
      // If user exits fullscreen via browser controls, return to scanner
      document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement && videoActive) returnToScanner();
      });
      document.addEventListener('webkitfullscreenchange', () => {
        if (!document.webkitFullscreenElement && videoActive) returnToScanner();
      });
      // iOS native video fullscreen exit
      fullVid.addEventListener('webkitendfullscreen', () => {
        if (videoActive) returnToScanner();
      });
      // Request fullscreen when video is landscape
      fullVid.addEventListener('loadedmetadata', () => {
        if (fullVid.videoWidth > fullVid.videoHeight) tryGoFullscreen();
      });

      fullVid.addEventListener('error', () => {
        const src = fullVid.src || '';
        if (!src || src === location.href) return; // fired by src='' cleanup, ignore
        showVideoError('Video could not load — check your connection');
      });

      function returnToScanner() {
        videoActive = false;
        if (triggerTimer) { clearTimeout(triggerTimer); triggerTimer = null; }
        tryExitFullscreen();
        fullVid.pause();
        fullVid.src = '';
        fullScreen.style.display = 'none';
        closeBtn.style.display = 'none';
        document.querySelectorAll('.corner').forEach(c => c.classList.remove('expanded'));
        scanner.style.display = 'block';
        document.getElementById('scan-hint').style.display = 'block';
        document.getElementById('home-btn').style.display = 'flex';
        // Restart MindAR's camera so the user can scan the next photo.
        try {
          const mindar = arScene && arScene.systems && arScene.systems['mindar-image-system'];
          if (mindar && typeof mindar.start === 'function') mindar.start();
        } catch(e) {}
        startReloadHintTimer();
      }

      fullVid.addEventListener('ended', () => {
        logEvent('video_complete');
        const fade = document.getElementById('fade-overlay');
        fade.style.display = 'block';
        setTimeout(() => fade.style.opacity = '1', 10);
        setTimeout(() => {
          videoActive = false;
          fullScreen.style.display = 'none';
          fullVid.src = '';
          closeBtn.style.display = 'none';
          document.querySelectorAll('.corner').forEach(c => c.classList.remove('expanded'));
          document.getElementById('start-screen').style.display = 'flex';
          fade.style.opacity = '0';
          setTimeout(() => fade.style.display = 'none', 1000);
        }, 1000);
      });

      closeBtn.addEventListener('click', returnToScanner);

      document.getElementById('home-btn').addEventListener('click', () => {
        returnToScanner();
        document.getElementById('scanner').style.display = 'none';
        document.getElementById('scan-hint').style.display = 'none';
        document.getElementById('home-btn').style.display = 'none';
        document.getElementById('start-screen').style.display = 'flex';
      });
    </script>
  </body>
</html>
