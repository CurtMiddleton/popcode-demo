<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <script
      src="https://browser.sentry-cdn.com/10.59.0/bundle.min.js"
      integrity="sha384-V80tE+22zYqM17YuWTi3GmAl/uJSKuAi5ov4G1Y6Zyw9wvVwwv9zree5oYNbB5Rn"
      crossorigin="anonymous"></script>
    <script src="/sentry-init.js"></script>
    <link rel="icon" href="/assets/popcode_icon.svg" type="image/svg+xml">
    <title>Popcode — Order Placed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <link rel="stylesheet" href="/assets/fonts.css">
    <style>
      * { box-sizing:border-box; margin:0; padding:0; }
      body { min-height:100vh; background:#fafafb; font-family:'Inter',sans-serif; color:#1a1a1a; display:flex; flex-direction:column; }
      .content { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 24px; }
      .box { background:#fff; border-radius:24px; padding:48px 40px; max-width:440px; width:100%; text-align:center; box-shadow:0 10px 40px rgba(20,20,50,0.08); }
      .check { width:58px; height:58px; border-radius:50%; background:linear-gradient(135deg,#589AF9 0%,#2dc0f7 100%); display:flex; align-items:center; justify-content:center; margin:0 auto 22px; box-shadow:0 6px 18px rgba(45,192,247,0.26); }
      h1 { font-family:'CooperBT', Georgia, serif; font-weight:400; font-size:31px; line-height:1.15; letter-spacing:-0.01em; margin-bottom:12px; }
      p { color:#6b7280; font-size:15px; line-height:1.6; margin:0 auto; max-width:330px; }
      .status { display:inline-block; margin-top:20px; padding:7px 16px; border-radius:999px; font-size:13px; font-weight:500; letter-spacing:0.01em; background:#eef4ff; color:#3f66b0; }
      .btn { display:inline-block; margin-top:28px; padding:13px 30px; border-radius:999px; font-size:15px; font-weight:600; color:#fff; text-decoration:none; background:linear-gradient(135deg,#589AF9 0%,#2dc0f7 100%); box-shadow:0 6px 18px rgba(45,192,247,0.26); transition:opacity .15s ease; }
      .btn:hover { opacity:.92; }
      .muted { color:#9aa0aa; font-size:12.5px; margin-top:16px; letter-spacing:0.02em; }
    </style>
  </head>
  <body>
    <script src="/nav.js"></script>
    <main class="content">
      <div class="box">
        <div class="check">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h1>Thanks — payment received!</h1>
        <p>Your print order is on its way to production. We'll email you when it ships.</p>
        <div class="status" id="status">Finalizing…</div>
        <div>
          <a class="btn" href="/manage.html">Back to My Popcodes</a>
        </div>
        <div class="muted" id="ref"></div>
      </div>
    </main>

    <script>
      const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      const sessionId = new URLSearchParams(location.search).get('session_id');

      const LABELS = {
        pending: 'Finalizing payment…',
        paid: 'Payment confirmed — submitting to print',
        submitted: 'Submitted to print',
        in_production: 'In production',
        shipped: 'Shipped',
        complete: 'Complete',
        prodigi_failed: 'Payment received — we hit a snag submitting to print; our team is on it.',
        payment_failed: 'Payment did not complete.',
      };

      function showStatus(status, prodigiOrderId) {
        document.getElementById('status').textContent = LABELS[status] || status || 'Order placed';
        if (prodigiOrderId) document.getElementById('ref').textContent = 'Order ref: ' + prodigiOrderId;
      }

      // Drive finalization from the success page (independent of the webhook).
      async function finalize(token) {
        const resp = await fetch('/api/finalize-order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ sessionId }),
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Finalize failed');
        return data;
      }

      db.auth.getSession().then(async ({ data }) => {
        if (!sessionId) { showStatus('submitted'); return; }
        const token = data.session?.access_token;
        if (!token) { showStatus('submitted'); return; }
        try {
          const result = await finalize(token);
          showStatus(result.status, result.prodigi_order_id);
        } catch (e) {
          // Fall back to reading the row (the webhook may finalize it instead).
          const { data: row } = await db.from('print_orders')
            .select('status, prodigi_order_id').eq('stripe_session_id', sessionId).maybeSingle();
          if (row) showStatus(row.status, row.prodigi_order_id);
          else showStatus('submitted');
        }
      });
    </script>
  </body>
</html>
