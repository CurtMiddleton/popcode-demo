<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>A-Frame version probe</title>
    <style>
      body { font-family: -apple-system, system-ui, sans-serif; background: #111; color: #eee; padding: 16px; margin: 0; font-size: 14px; }
      h1 { font-size: 18px; margin: 0 0 12px; }
      .row { padding: 10px 12px; margin-bottom: 8px; border-radius: 8px; background: #222; border-left: 4px solid #555; word-break: break-word; }
      .row.ok { border-left-color: #4c4; }
      .row.err { border-left-color: #f44; }
      .row.pending { border-left-color: #fc4; }
      .label { font-weight: bold; }
      .detail { font-size: 11px; color: #aaa; margin-top: 4px; font-family: monospace; }
    </style>
  </head>
  <body>
    <h1>A-Frame version probe (iOS 18)</h1>
    <p style="font-size:11px;color:#888;">Each row loads an A-Frame version in an iframe and reports whether <code>window.AFRAME</code> is set after load. Iframes isolate so they can't pollute each other.</p>
    <div id="results"></div>

    <script>
      const results = document.getElementById('results');
      function addRow(label) {
        const row = document.createElement('div');
        row.className = 'row pending';
        row.innerHTML = '<div class="label">' + label + '</div><div class="detail">pending…</div>';
        results.appendChild(row);
        return row;
      }
      function updateRow(row, status, detail) {
        row.className = 'row ' + status;
        row.querySelector('.detail').textContent = detail;
      }

      // Test a given A-Frame URL in an isolated iframe.
      // Returns the iframe so the caller can also run in-frame tests on it.
      function testAframeUrl(label, url, onReady) {
        const row = addRow(label);
        updateRow(row, 'pending', 'loading ' + url);
        const iframe = document.createElement('iframe');
        iframe.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;border:0;';
        iframe.srcdoc = '<!DOCTYPE html><html><head><meta charset="utf-8"><script src="' + url + '"><' + '/script></head><body><script>parent.postMessage({label:' + JSON.stringify(label) + ',AFRAME:typeof window.AFRAME,version:(window.AFRAME&&window.AFRAME.version)||null},"*");<' + '/script></body></html>';
        const handler = (e) => {
          if (!e.data || e.data.label !== label) return;
          window.removeEventListener('message', handler);
          if (e.data.AFRAME === 'undefined') {
            updateRow(row, 'err', 'AFRAME=undefined — url does not serve A-Frame');
          } else {
            updateRow(row, 'ok', 'AFRAME=' + e.data.AFRAME + ', version=' + e.data.version);
          }
          if (onReady) onReady(row, iframe, e.data);
        };
        window.addEventListener('message', handler);
        setTimeout(() => {
          window.removeEventListener('message', handler);
          if (row.className.indexOf('pending') !== -1) {
            updateRow(row, 'err', 'TIMEOUT: no load within 10s');
          }
        }, 10000);
        document.body.appendChild(iframe);
        return iframe;
      }

      // Probe a bunch of known versions + CDNs
      testAframeUrl('A-Frame 1.4.2 via aframe.io (prod current)',
        'https://aframe.io/releases/1.4.2/aframe.min.js');
      testAframeUrl('A-Frame 1.5.0 via aframe.io',
        'https://aframe.io/releases/1.5.0/aframe.min.js');
      testAframeUrl('A-Frame 1.6.0 via aframe.io',
        'https://aframe.io/releases/1.6.0/aframe.min.js');
      testAframeUrl('A-Frame 1.7.0 via aframe.io',
        'https://aframe.io/releases/1.7.0/aframe.min.js');
      testAframeUrl('A-Frame 1.7.1 via aframe.io',
        'https://aframe.io/releases/1.7.1/aframe.min.js');
      testAframeUrl('A-Frame 1.4.2 via jsdelivr',
        'https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe-master.min.js');
      testAframeUrl('A-Frame 1.5.0 via jsdelivr',
        'https://cdn.jsdelivr.net/npm/aframe@1.5.0/dist/aframe-master.min.js');
      testAframeUrl('A-Frame 1.6.0 via jsdelivr',
        'https://cdn.jsdelivr.net/npm/aframe@1.6.0/dist/aframe-master.min.js');
      testAframeUrl('A-Frame 1.7.0 via jsdelivr',
        'https://cdn.jsdelivr.net/npm/aframe@1.7.0/dist/aframe-master.min.js');
      testAframeUrl('A-Frame 1.7.1 via jsdelivr',
        'https://cdn.jsdelivr.net/npm/aframe@1.7.1/dist/aframe-master.min.js');
    </script>
  </body>
</html>
