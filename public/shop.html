<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <!-- Sentry error monitoring (errors-only; init in /sentry-init.js) -->
    <script
      src="https://browser.sentry-cdn.com/10.59.0/bundle.min.js"
      integrity="sha384-V80tE+22zYqM17YuWTi3GmAl/uJSKuAi5ov4G1Y6Zyw9wvVwwv9zree5oYNbB5Rn"
      crossorigin="anonymous"></script>
    <script src="/sentry-init.js"></script>
    <link rel="icon" href="/assets/popcode_icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/assets/Popcode_logo.png">
    <title>Popcode — Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <link rel="stylesheet" href="/assets/fonts.css">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh; background: #ffffff; font-family: 'Inter', sans-serif;
        font-weight: 400; color: #1a1a1a; display: flex; flex-direction: column;
        align-items: center; padding: 0 0 80px; overflow-x: hidden;
      }

      /* White top nav bar (gradient logo, black nav, cart + profile) — matches manage.html */
      .site-header {
        position: sticky; top: 0; z-index: 50;
        width: 100vw;
        background: #ffffff;
        padding: 0 28px; height: 100px; display: flex; align-items: center; gap: 0;
        margin: 0; align-self: stretch;
      }
      /* Soft gray shelf below the white nav (starts at 100px, fades down + out). */
      .site-header::after {
        content: ''; position: absolute; left: 0; right: 0; top: 100%; height: 72px; pointer-events: none;
        background: linear-gradient(to bottom, #e6e6e6 0%, rgba(230,230,230,0) 100%);
        -webkit-mask-image: linear-gradient(to right, transparent 0%, #000 16%, #000 84%, transparent 100%);
        mask-image: linear-gradient(to right, transparent 0%, #000 16%, #000 84%, transparent 100%);
      }
      .brand { display: flex; align-items: center; flex-shrink: 0; margin-left: 52px; }
      .brand img { height: 32px; display: block; }
      .nav-inline { display: flex; align-items: center; gap: 6px; margin-left: 170px; }
      .nav-inline a {
        color: #8a8a8a; text-decoration: none; font-family: 'Inter', sans-serif;
        font-size: 14px; font-weight: 600; padding: 8px 12px; border-radius: 8px;
        white-space: nowrap; transition: color 0.15s;
      }
      .nav-inline a:hover { color: #1a1a1a; }
      .nav-inline a.active { color: #1a1a1a; }
      .header-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }
      @media (max-width: 1040px) { .nav-inline { margin-left: 40px; } }
      .hicon {
        position: relative; display: flex; align-items: center; justify-content: center;
        width: 42px; height: 42px; border-radius: 50%; background: none; border: none;
        cursor: pointer; text-decoration: none; color: #1a1a1a; transition: background 0.15s;
      }
      .hicon:hover { background: #f3f2ef; }
      .hicon.profile-btn { background: #f0eeea; }
      .hicon.profile-btn:hover { background: #e7e4dd; }
      .cart-badge {
        position: absolute; top: 4px; right: 4px; min-width: 16px; height: 16px; padding: 0 4px;
        border-radius: 999px; background: #ff3b6b; color: #fff; font-size: 10px; font-weight: 700;
        display: flex; align-items: center; justify-content: center; line-height: 1;
      }
      .hamburger { display: none; }
      @media (max-width: 760px) {
        .site-header { padding: 0 18px; gap: 14px; }
        .nav-inline { display: none; }
        .hamburger { display: flex; }
      }

      .wrap { width: 100%; max-width: 1040px; margin: 0 auto; padding: 80px 28px 140px; }
      h1 { font-family: 'CooperBT', Georgia, serif; font-size: 44px; font-weight: 400; margin-bottom: 40px; letter-spacing: -0.01em; }
      .sub { color: #656565; font-size: 16px; line-height: 1.5; max-width: 560px; margin-bottom: 80px; }
      @media (max-width: 680px) { h1 { font-size: 30px; margin-bottom: 24px; } .wrap { padding-top: 48px; } .sub { margin-bottom: 48px; } }

      /* Product grid — matches order.html's Shop Products (big Popsa-style tiles) */
      .cat-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:44px; margin-top:0; }
      @media (max-width:680px){ .cat-grid { grid-template-columns:1fr; gap:32px; } }
      .cat-card { background:#fff; border-radius:24px; padding:30px; box-shadow:0 2px 14px rgba(0,0,0,0.06); cursor:pointer; border:1px solid #eee; transition:transform .12s, box-shadow .15s, border-color .15s; text-align:left; }
      .cat-card:hover { transform:translateY(-3px); box-shadow:0 12px 32px rgba(0,0,0,0.12); border-color:#e3dffb; }
      .cat-thumb { width:100%; height:400px; border-radius:16px; background:#f2f2f2; display:flex; align-items:center; justify-content:center; overflow:hidden; margin-bottom:28px; }
      .cat-thumb img { max-width:98%; max-height:98%; object-fit:contain; display:block; }
      .cat-name { font-family:'CooperBT', Georgia, serif; font-size:31px; font-weight:400; letter-spacing:-0.01em; }
      .cat-badge { display:inline-block; font-size:11px; font-weight:700; color:#fff; background:linear-gradient(135deg,#7657FC,#589AF9); border-radius:999px; padding:2px 9px; margin-left:10px; vertical-align:middle; position:relative; top:-4px; font-family:'Inter',sans-serif; }
      .cat-desc { color:#777; font-size:15px; margin:10px 0 22px; line-height:1.55; }
      .cat-from { font-size:16px; font-weight:600; color:#1a1a1a; }

      /* Nav drawer (mobile) */
      #nav-overlay { display: none; position: fixed; inset: 0; z-index: 200; }
      #nav-overlay.open { display: block; }
      #nav-drawer-bg { position: absolute; inset: 0; background: rgba(0,0,0,0.18); }
      #nav-drawer {
        position: absolute; top: 14px; left: 14px; width: 264px; background: #fff;
        border-radius: 18px; box-shadow: 0 12px 48px rgba(0,0,0,0.18); padding: 8px 0;
        opacity: 0; transform: translateY(-8px) scale(0.97); transform-origin: top left;
        transition: opacity 0.18s ease, transform 0.18s ease;
      }
      #nav-overlay.open #nav-drawer { opacity: 1; transform: translateY(0) scale(1); }
      .nav-link { display: flex; align-items: center; gap: 14px; padding: 11px 20px; font-size: 15px; font-weight: 500; color: #1a1a1a; text-decoration: none; font-family: 'Inter', sans-serif; }
      .nav-link:hover { background: #f5f4f0; }
      .nav-link svg { flex-shrink: 0; color: #555; }
      .nav-link.external { color: #666; font-size: 14px; }
      .nav-divider { height: 1px; background: #ececec; margin: 8px 0; }

      /* Popcode picker overlay (for print products that need a photo) */
      .pk-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: flex-end; justify-content: center; z-index: 300; }
      .pk-overlay.open { display: flex; }
      .pk-sheet { background: #fff; width: 100%; max-width: 560px; border-radius: 18px 18px 0 0; padding: 22px; max-height: 82vh; overflow-y: auto; }
      .pk-sheet h2 { font-family: 'CooperBT', serif; font-size: 24px; margin-bottom: 4px; }
      .pk-sub { color: #8a857d; font-size: 14px; margin-bottom: 16px; }
      .pk-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(96px,1fr)); gap: 12px; }
      .pk-item { border: none; background: none; cursor: pointer; padding: 0; text-align: center; font-family: inherit; }
      .pk-thumb { width: 100%; aspect-ratio: 1; border-radius: 10px; background: #e8e4f0 center/cover; }
      .pk-name { font-size: 12px; color: #444; margin-top: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .pk-close { float: right; border: none; background: none; font-size: 24px; cursor: pointer; color: #999; line-height: 1; }
      .pk-empty { color: #8a857d; font-size: 14px; padding: 10px 0 4px; }
    </style>
  </head>
  <body>
    <header class="site-header">
      <a href="/manage.html" class="brand"><img src="/assets/Popcode_logo.png" alt="Popcode"/></a>
      <nav class="nav-inline" id="nav-inline">
        <a href="/manage.html">My Popcodes</a>
        <a href="/manage.html?tab=designs">My Designs</a>
        <a href="/shop.html" class="active">Shop</a>
        <a href="/views.html">Past Views</a>
        <a href="/howto.html">How It Works</a>
      </nav>
      <div class="header-right">
        <a class="hicon cart-btn" href="/shop.html" title="Cart" aria-label="Cart">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="cart-badge" id="cart-badge" style="display:none;">0</span>
        </a>
        <a class="hicon profile-btn" href="/account.html" title="My Account" aria-label="My Account">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </a>
        <button id="nav-btn" class="hicon hamburger" aria-label="Menu">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
    </header>

    <div id="nav-overlay">
      <div id="nav-drawer-bg"></div>
      <div id="nav-drawer">
        <a class="nav-link" href="/manage.html">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
          My Popcodes
        </a>
        <a class="nav-link" href="/manage.html?tab=designs">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          My Designs
        </a>
        <a class="nav-link" href="/shop.html">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          Shop
        </a>
        <a class="nav-link" href="/create.html">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          New Popcode
        </a>
        <a class="nav-link" href="/views.html">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Past Views
        </a>
        <a class="nav-link" href="/account.html">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          My Account
        </a>
        <a class="nav-link" href="/howto.html">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          How It Works
        </a>
        <div class="nav-divider"></div>
        <a class="nav-link external" href="https://popcodeapp.com" target="_blank">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          popcodeapp.com
        </a>
      </div>
    </div>

    <div class="wrap">
      <h1>Shop</h1>
      <div class="sub">Pick a product to design and bring it to life by linking video or audio to its photos.</div>
      <div class="cat-grid" id="cat-grid"></div>
    </div>

    <div class="pk-overlay" id="pk-overlay">
      <div class="pk-sheet">
        <button class="pk-close" id="pk-close">&times;</button>
        <h2 id="pk-title">Choose a photo</h2>
        <div class="pk-sub" id="pk-sub">Pick one of your Popcodes to print.</div>
        <div class="pk-grid" id="pk-grid"></div>
      </div>
    </div>

    <script>
      const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      let currentUser = null, popcodes = [];

      // Products. Photo Book is the hero (builds from scratch → book.html).
      // The print products need a photo, so they open a picker of the user's
      // Popcodes → order.html with the chosen category pre-selected. Photo-product
      // thumbnails are the real Prodigi product mockups shown as-is.
      const PRODUCTS = [
        { id: 'book',   name: 'Photo Book',    desc: 'Lay-flat hardcover photo book — scannable pages come to life.', badge: 'New', kind: 'build', mockup: '/assets/mockups/book.jpg' },
        { id: 'print',  name: 'Prints',        desc: 'Museum-quality enhanced matte fine-art prints.',                kind: 'photo', type: 'print',  mockup: '/assets/mockups/print.jpg' },
        { id: 'tile',   name: 'Photo Tiles',   desc: 'Framed, ready-to-hang tiles — great on their own or clustered.', kind: 'photo', type: 'tile',   mockup: '/assets/mockups/tile.jpg' },
        { id: 'canvas', name: 'Canvas',        desc: 'Gallery-style stretched canvas with mirror-wrapped edges.',      kind: 'photo', type: 'canvas', mockup: '/assets/mockups/canvas.jpg' },
        { id: 'framed', name: 'Framed Prints', desc: 'Fine-art print in a classic black frame behind perspex glaze.',  kind: 'photo', type: 'framed', mockup: '/assets/mockups/framed.jpg' },
      ];

      db.auth.getSession().then(async ({ data }) => {
        if (!data.session) { window.location.href = '/auth.html'; return; }
        currentUser = data.session.user;
        renderProducts();
        loadPopcodes();
      });

      document.getElementById('nav-btn').addEventListener('click', () => document.getElementById('nav-overlay').classList.add('open'));
      document.getElementById('nav-overlay').addEventListener('click', (e) => { if (e.target === document.getElementById('nav-drawer-bg')) document.getElementById('nav-overlay').classList.remove('open'); });

      function renderProducts() {
        const grid = document.getElementById('cat-grid');
        grid.innerHTML = '';
        PRODUCTS.forEach(p => {
          const card = document.createElement('div');
          card.className = 'cat-card';
          const badge = p.badge ? `<span class="cat-badge">${p.badge}</span>` : '';
          const cta = p.id === 'book' ? 'Start your book' : 'See more details and pricing';
          card.innerHTML =
            `<div class="cat-thumb"><img src="${p.mockup}" alt="${p.name}" loading="lazy"></div>` +
            `<div class="cat-name">${p.name}${badge}</div>` +
            `<div class="cat-desc">${p.desc}</div>` +
            `<div class="cat-from">${cta} &rarr;</div>`;
          card.addEventListener('click', () => chooseProduct(p));
          grid.appendChild(card);
        });
      }

      function chooseProduct(p) {
        if (p.kind === 'build') { window.location.href = '/book.html'; return; }
        openPicker(p);
      }

      async function loadPopcodes() {
        const { data } = await db.from('collections')
          .select('id, slug, name, kind').eq('user_id', currentUser.id)
          .order('created_at', { ascending: false });
        popcodes = (data || []).filter(c => !['book','print','tile','canvas','calendar'].includes(c.kind));
        if (popcodes.length) {
          const ids = popcodes.map(c => c.id);
          const { data: items } = await db.from('collection_items')
            .select('collection_id, photo_url, target_index').in('collection_id', ids).order('target_index');
          const thumb = {};
          (items || []).forEach(it => { if (!thumb[it.collection_id] && it.photo_url) thumb[it.collection_id] = it.photo_url; });
          popcodes.forEach(c => c.thumb = thumb[c.id] || null);
        }
      }

      function openPicker(p) {
        document.getElementById('pk-title').textContent = 'Choose a photo to print';
        document.getElementById('pk-sub').textContent = `Pick one of your Popcodes to order ${p.name.toLowerCase()}.`;
        const g = document.getElementById('pk-grid');
        g.innerHTML = '';
        if (!popcodes.length) {
          g.innerHTML = `<div class="pk-empty">You have no Popcodes yet. <a href="/create.html">Create one first</a>, then order prints of it.</div>`;
        } else {
          popcodes.forEach(c => {
            const b = document.createElement('button');
            b.className = 'pk-item';
            b.innerHTML = `<div class="pk-thumb" style="${c.thumb ? `background-image:url('${c.thumb}')` : ''}"></div><div class="pk-name">${c.name || c.slug}</div>`;
            b.addEventListener('click', () => {
              const q = '/order.html?id=' + encodeURIComponent(c.slug) + (p.type ? '&type=' + p.type : '');
              window.location.href = q;
            });
            g.appendChild(b);
          });
        }
        document.getElementById('pk-overlay').classList.add('open');
      }

      document.getElementById('pk-close').addEventListener('click', () => document.getElementById('pk-overlay').classList.remove('open'));
      document.getElementById('pk-overlay').addEventListener('click', (e) => { if (e.target.id === 'pk-overlay') e.currentTarget.classList.remove('open'); });
    </script>
    <script src="/beta-feedback.js"></script>
  </body>
</html>
