<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>MindAR Version Test</title>
    <style>
      body { font-family: -apple-system, system-ui, sans-serif; background: #111; color: #eee; padding: 16px; margin: 0; font-size: 14px; }
      h1 { font-size: 18px; margin: 0 0 12px; }
      .row { padding: 10px 12px; margin-bottom: 8px; border-radius: 8px; background: #222; border-left: 4px solid #555; word-break: break-word; }
      .row.ok { border-left-color: #4c4; }
      .row.err { border-left-color: #f44; }
      .row.pending { border-left-color: #fc4; }
      .label { font-weight: bold; }
      .detail { font-size: 11px; color: #aaa; margin-top: 4px; font-family: monospace; }
    </style>
  </head>
  <body>
    <h1>MindAR version test (iOS 18 compat)</h1>
    <div id="results"></div>

    <script>
      const results = document.getElementById('results');
      function addRow(label) {
        const row = document.createElement('div');
        row.className = 'row pending';
        row.innerHTML = '<div class="label">' + label + '</div><div class="detail">pending…</div>';
        results.appendChild(row);
        return row;
      }
      function updateRow(row, status, detail) {
        row.className = 'row ' + status;
        row.querySelector('.detail').textContent = detail;
      }

      // Load A-Frame 1.5.0 (newer than 1.4.2 used in production)
      const rowAframe = addRow('Load A-Frame 1.5.0');
      const aframeScript = document.createElement('script');
      aframeScript.src = 'https://aframe.io/releases/1.5.0/aframe.min.js';
      aframeScript.onload = () => updateRow(rowAframe, 'ok', 'loaded, AFRAME=' + typeof window.AFRAME);
      aframeScript.onerror = () => updateRow(rowAframe, 'err', 'FAILED');
      document.head.appendChild(aframeScript);

      // Load MindAR 1.2.5 (newer than 1.2.2 used in production)
      const rowMindar = addRow('Load MindAR 1.2.5 (after A-Frame)');
      aframeScript.addEventListener('load', () => {
        const m = document.createElement('script');
        m.src = 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js';
        m.onload = () => updateRow(rowMindar, 'ok', 'loaded');
        m.onerror = () => updateRow(rowMindar, 'err', 'FAILED');
        document.head.appendChild(m);
      });

      // Load supabase and fetch egrbne2j's .mind URL
      const rowSupa = addRow('Load Supabase + resolve egrbne2j mind_file_url');
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
      s.onload = () => {
        const db = window.supabase.createClient(
          'https://mrwpkhsluzokytpvmwqk.supabase.co',
          'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yd3BraHNsdXpva3l0cHZtd3FrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTA2MDksImV4cCI6MjA5MTE2NjYwOX0.YMfuRpKvcmfoJ75Gxhf7ekoCaeDfR0Dsz_9Beg5ULAI'
        );
        db.from('collections').select('mind_file_url').eq('slug', 'egrbne2j').single()
          .then(({ data, error }) => {
            if (error || !data) {
              updateRow(rowSupa, 'err', 'query failed: ' + (error?.message || 'empty'));
              return;
            }
            window.__mindUrl = data.mind_file_url;
            updateRow(rowSupa, 'ok', 'got mind_file_url');
            tryScene();
          });
      };
      document.head.appendChild(s);

      // Create a-scene with NEW MindAR version and real egrbne2j .mind file
      const rowScene = addRow('Create <a-scene> with NEW MindAR (15s timeout)');

      function tryScene() {
        // Wait for A-Frame + new MindAR to be ready
        const waitReady = () => {
          if (!window.AFRAME || !window.AFRAME.components['mindar-image'] || !window.__mindUrl) {
            return setTimeout(waitReady, 100);
          }
          doScene();
        };
        waitReady();
      }

      function doScene() {
        const start = performance.now();
        const scene = document.createElement('a-scene');
        scene.setAttribute('mindar-image', 'imageTargetSrc: ' + window.__mindUrl + '; autoStart: false;');
        scene.setAttribute('embedded', '');
        scene.setAttribute('vr-mode-ui', 'enabled: false');
        scene.setAttribute('device-orientation-permission-ui', 'enabled: false');
        scene.style.position = 'fixed'; scene.style.top = '-9999px'; scene.style.left = '-9999px';
        scene.style.width = '1px'; scene.style.height = '1px';

        const t = setTimeout(() => {
          updateRow(rowScene, 'err', 'TIMEOUT: arReady did not fire in 15s');
        }, 15000);

        scene.addEventListener('arReady', () => {
          clearTimeout(t);
          const ms = Math.round(performance.now() - start);
          updateRow(rowScene, 'ok', 'arReady fired in ' + ms + 'ms — UPGRADE FIXES IT');
        });
        scene.addEventListener('arError', (e) => {
          clearTimeout(t);
          updateRow(rowScene, 'err', 'arError: ' + (e?.detail?.message || 'unknown'));
        });

        try {
          document.body.appendChild(scene);
          updateRow(rowScene, 'pending', 'scene appended, waiting for arReady…');
        } catch (e) {
          clearTimeout(t);
          updateRow(rowScene, 'err', 'appendChild threw: ' + e.message);
        }
      }
    </script>
  </body>
</html>
