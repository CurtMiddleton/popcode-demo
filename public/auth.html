<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Popcode — Sign In</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        background: linear-gradient(160deg, #5bc8f5 0%, #7c3aed 100%);
        font-family: sans-serif;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 24px;
      }
      .logo { margin-bottom: 32px; }
      .logo img { height: 120px; }
      .card {
        width: 100%;
        max-width: 360px;
        background: rgba(255,255,255,0.15);
        border-radius: 20px;
        padding: 32px 28px;
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.25);
      }
      h1 { font-size: 22px; font-weight: 800; margin-bottom: 24px; text-align: center; }
      .field { margin-bottom: 16px; }
      label { font-size: 13px; font-weight: 600; opacity: 0.85; display: block; margin-bottom: 6px; }
      input[type="email"], input[type="password"] {
        width: 100%; padding: 13px 16px; border-radius: 12px; border: none;
        font-size: 15px; color: #333; outline: none;
      }
      .submit-btn {
        width: 100%; padding: 15px; border-radius: 30px; border: none;
        background: #3d2b8e; color: white; font-size: 16px; font-weight: 700;
        cursor: pointer; margin-top: 8px; transition: background 0.2s;
      }
      .submit-btn:hover { background: #4e38a8; }
      .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .toggle {
        margin-top: 20px; text-align: center; font-size: 13px; opacity: 0.85;
      }
      .toggle a { color: white; font-weight: 700; cursor: pointer; text-decoration: underline; }
      .forgot { text-align: right; margin-top: -8px; margin-bottom: 16px; }
      .forgot a { font-size: 12px; color: white; opacity: 0.75; cursor: pointer; text-decoration: underline; }
      .forgot a:hover { opacity: 1; }
      .error-msg {
        display: none; background: rgba(220,38,38,0.3); border: 1px solid rgba(220,38,38,0.5);
        border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px;
        line-height: 1.5;
      }
      .success-msg {
        display: none; background: rgba(34,197,94,0.3); border: 1px solid rgba(34,197,94,0.5);
        border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="logo"><img src="/assets/Popcode_logo.rev.svg" alt="Popcode"/></div>
    <div class="card">
      <h1 id="form-title">Sign In</h1>
      <div class="error-msg" id="error-msg"></div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" placeholder="you@example.com"/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="Password"/>
      </div>
      <div class="forgot" id="forgot-wrap">
        <a id="forgot-link">Forgot password?</a>
      </div>
      <button class="submit-btn" id="submit-btn">Sign In</button>
      <div class="toggle">
        <span id="toggle-text">Don't have an account?</span>
        <a id="toggle-link">Create one</a>
      </div>
      <div class="success-msg" id="success-msg"></div>
    </div>

    <script>
      const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      // Redirect if already signed in
      db.auth.getSession().then(({ data }) => {
        if (data.session) window.location.href = '/manage.html';
      });

      let isSignUp = false;

      document.getElementById('toggle-link').addEventListener('click', () => {
        isSignUp = !isSignUp;
        document.getElementById('form-title').textContent = isSignUp ? 'Create Account' : 'Sign In';
        document.getElementById('submit-btn').textContent = isSignUp ? 'Create Account' : 'Sign In';
        document.getElementById('toggle-text').textContent = isSignUp ? 'Already have an account?' : "Don't have an account?";
        document.getElementById('toggle-link').textContent = isSignUp ? 'Sign in' : 'Create one';
        document.getElementById('password').autocomplete = isSignUp ? 'new-password' : 'current-password';
        document.getElementById('forgot-wrap').style.display = isSignUp ? 'none' : 'block';
        hideError();
      });

      document.getElementById('forgot-link').addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        if (!email) {
          showError('Enter your email address above first.');
          return;
        }
        const { error } = await db.auth.resetPasswordForEmail(email, {
          redirectTo: 'https://popcode-demo.vercel.app/reset.html'
        });
        if (error) {
          showError(error.message);
        } else {
          hideError();
          const s = document.getElementById('success-msg');
          s.textContent = 'Reset link sent — check your email.';
          s.style.display = 'block';
        }
      });

      function showError(msg) {
        const el = document.getElementById('error-msg');
        el.textContent = msg;
        el.style.display = 'block';
      }
      function hideError() {
        document.getElementById('error-msg').style.display = 'none';
      }

      document.getElementById('submit-btn').addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        hideError();

        if (!email || !password) {
          showError('Please enter your email and password.');
          return;
        }

        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = isSignUp ? 'Creating account...' : 'Signing in...';

        let error;
        if (isSignUp) {
          ({ error } = await db.auth.signUp({ email, password }));
          if (!error) {
            showError('Check your email for a confirmation link, then sign in.');
            btn.disabled = false;
            btn.textContent = 'Create Account';
            return;
          }
        } else {
          ({ error } = await db.auth.signInWithPassword({ email, password }));
        }

        if (error) {
          showError(error.message);
          btn.disabled = false;
          btn.textContent = isSignUp ? 'Create Account' : 'Sign In';
        } else {
          window.location.href = '/manage.html';
        }
      });

      // Allow Enter key to submit
      document.addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('submit-btn').click();
      });
    </script>
  </body>
</html>
