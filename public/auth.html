<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Popcode — Sign In</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <style>
      @font-face {
        font-family: 'FilsonPro';
        src: url('/assets/fonts/FilsonProMedium/font.woff2') format('woff2'),
             url('/assets/fonts/FilsonProMedium/font.woff') format('woff');
        font-weight: 400;
        font-style: normal;
      }
      @font-face {
        font-family: 'FilsonPro';
        src: url('/assets/fonts/FilsonProBold/font.woff2') format('woff2'),
             url('/assets/fonts/FilsonProBold/font.woff') format('woff');
        font-weight: 700;
        font-style: normal;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        background: #f2f0eb;
        font-family: 'FilsonPro', sans-serif;
        color: #1a1a1a;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0 24px 80px;
      }
      .site-header {
        width: 100%;
        background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
        padding: 28px 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        margin-bottom: 32px;
        align-self: stretch;
      }
      .logo-text {
        font-family: 'FilsonPro', sans-serif;
        font-weight: 700;
        font-size: 36px;
        color: white;
        letter-spacing: -0.02em;
      }
      .card {
        width: 100%;
        max-width: 360px;
        background: white;
        border-radius: 20px;
        padding: 32px 28px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        border: 1px solid #e8e8e8;
      }
      h1 { font-size: 22px; font-weight: 700; margin-bottom: 24px; text-align: center; color: #1a1a1a; }
      .field { margin-bottom: 16px; }
      label { font-size: 13px; font-weight: 700; color: #555; display: block; margin-bottom: 6px; }
      input[type="email"], input[type="password"] {
        width: 100%; padding: 13px 16px; border-radius: 12px;
        border: 1px solid #e8e8e8;
        font-size: 15px; color: #1a1a1a; outline: none;
        font-family: 'FilsonPro', sans-serif;
        background: #fafaf8;
      }
      .submit-btn {
        width: 100%; padding: 15px; border-radius: 30px; border: none;
        background: #6b3fa0; color: white; font-size: 16px; font-weight: 700;
        font-family: 'FilsonPro', sans-serif;
        cursor: pointer; margin-top: 8px; transition: background 0.2s;
      }
      .submit-btn:hover { background: #5a3388; }
      .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .toggle {
        margin-top: 20px; text-align: center; font-size: 13px; color: #888;
      }
      .toggle a { color: #6b3fa0; font-weight: 700; cursor: pointer; text-decoration: underline; }
      .forgot { text-align: right; margin-top: -8px; margin-bottom: 16px; }
      .forgot a { font-size: 12px; color: #888; cursor: pointer; text-decoration: underline; }
      .forgot a:hover { color: #6b3fa0; }
      .error-msg {
        display: none; background: #fff0f0; border: 1px solid #ffcccc;
        border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px;
        line-height: 1.5; color: #cc3333;
      }
      .success-msg {
        display: none; background: #f0fff4; border: 1px solid #bbf7d0;
        border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px;
        line-height: 1.5; color: #16a34a;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <span class="logo-text">popcode</span>
    </header>
    <div class="card">
      <h1 id="form-title">Sign In</h1>
      <div class="error-msg" id="error-msg"></div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" placeholder="you@example.com"/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="Password"/>
      </div>
      <div class="forgot" id="forgot-wrap">
        <a id="forgot-link">Forgot password?</a>
      </div>
      <button class="submit-btn" id="submit-btn">Sign In</button>
      <div class="toggle">
        <span id="toggle-text">Don't have an account?</span>
        <a id="toggle-link">Create one</a>
      </div>
      <div class="success-msg" id="success-msg"></div>
    </div>

    <script>
      const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      // Redirect if already signed in
      db.auth.getSession().then(({ data }) => {
        if (data.session) window.location.href = '/manage.html';
      });

      let isSignUp = false;

      document.getElementById('toggle-link').addEventListener('click', () => {
        isSignUp = !isSignUp;
        document.getElementById('form-title').textContent = isSignUp ? 'Create Account' : 'Sign In';
        document.getElementById('submit-btn').textContent = isSignUp ? 'Create Account' : 'Sign In';
        document.getElementById('toggle-text').textContent = isSignUp ? 'Already have an account?' : "Don't have an account?";
        document.getElementById('toggle-link').textContent = isSignUp ? 'Sign in' : 'Create one';
        document.getElementById('password').autocomplete = isSignUp ? 'new-password' : 'current-password';
        document.getElementById('forgot-wrap').style.display = isSignUp ? 'none' : 'block';
        hideError();
      });

      document.getElementById('forgot-link').addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        if (!email) {
          showError('Enter your email address above first.');
          return;
        }
        const { error } = await db.auth.resetPasswordForEmail(email, {
          redirectTo: 'https://popcode-demo.vercel.app/reset.html'
        });
        if (error) {
          showError(error.message);
        } else {
          hideError();
          const s = document.getElementById('success-msg');
          s.textContent = 'Reset link sent — check your email.';
          s.style.display = 'block';
        }
      });

      function showError(msg) {
        const el = document.getElementById('error-msg');
        el.textContent = msg;
        el.style.display = 'block';
      }
      function hideError() {
        document.getElementById('error-msg').style.display = 'none';
      }

      document.getElementById('submit-btn').addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        hideError();

        if (!email || !password) {
          showError('Please enter your email and password.');
          return;
        }

        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = isSignUp ? 'Creating account...' : 'Signing in...';

        let error;
        if (isSignUp) {
          ({ error } = await db.auth.signUp({ email, password }));
          if (!error) {
            showError('Check your email for a confirmation link, then sign in.');
            btn.disabled = false;
            btn.textContent = 'Create Account';
            return;
          }
        } else {
          ({ error } = await db.auth.signInWithPassword({ email, password }));
        }

        if (error) {
          showError(error.message);
          btn.disabled = false;
          btn.textContent = isSignUp ? 'Create Account' : 'Sign In';
        } else {
          window.location.href = '/manage.html';
        }
      });

      // Allow Enter key to submit
      document.addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('submit-btn').click();
      });
    </script>
  </body>
</html>
