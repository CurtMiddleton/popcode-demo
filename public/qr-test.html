<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Popcode Styled QR</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        background: linear-gradient(160deg, #5bc8f5 0%, #7c3aed 100%);
        font-family: sans-serif;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 24px 60px;
        gap: 20px;
      }
      .logo img { height: 80px; }
      h1 { font-size: 20px; font-weight: 800; }
      .subtitle { font-size: 13px; opacity: 0.8; text-align: center; max-width: 300px; line-height: 1.5; }
      .controls { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 340px; }
      .controls input { padding: 12px 16px; border-radius: 12px; border: none; font-size: 14px; color: #333; outline: none; }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        width: 100%;
        max-width: 500px;
      }
      .card {
        background: rgba(255,255,255,0.1);
        border-radius: 16px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .card h3 { font-size: 12px; font-weight: 700; text-align: center; opacity: 0.9; }
      .card canvas { box-shadow: 0 4px 20px rgba(0,0,0,0.3); border-radius: 12px; }
      .dl-btn { font-size: 12px; padding: 6px 14px; border-radius: 20px; border: none; background: rgba(255,255,255,0.2); color: white; cursor: pointer; font-weight: 600; }
      .dl-btn:hover { background: rgba(255,255,255,0.35); }
      .note { font-size: 11px; opacity: 0.65; text-align: center; max-width: 300px; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div class="logo"><img src="/assets/Popcode_logo.rev.svg" alt="popcode"/></div>
    <h1>Styled QR Code</h1>
    <p class="subtitle">Same data as a standard QR code — any phone camera can read it — but looks like Popcode.</p>

    <div class="controls">
      <input type="text" id="url-input" placeholder="URL to encode" value="https://popcode-demo.vercel.app/view.html?id=abc123"/>
    </div>

    <div class="grid" id="grid"></div>
    <p class="note">All variations scan with any phone camera. No app needed.</p>

    <script>
      function getQRMatrix(text) {
        const qr = qrcode(0, 'M');
        qr.addData(text);
        qr.make();
        const size = qr.getModuleCount();
        const matrix = [];
        for (let r = 0; r < size; r++) {
          matrix[r] = [];
          for (let c = 0; c < size; c++) {
            matrix[r][c] = qr.isDark(r, c);
          }
        }
        return matrix;
      }

      // Style 1: Rounded dots, black on white
      function drawStyle1(canvas, matrix) {
        const s = canvas.width;
        const n = matrix.length;
        const cell = s / (n + 4);
        const offset = cell * 2;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0,0,s,s);
        const r = cell * 0.45;
        for (let row = 0; row < n; row++) {
          for (let col = 0; col < n; col++) {
            if (!matrix[row][col]) continue;
            const x = offset + col * cell + cell/2;
            const y = offset + row * cell + cell/2;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI*2);
            ctx.fillStyle = '#111';
            ctx.fill();
          }
        }
      }

      // Style 2: Rounded dots, white on black
      function drawStyle2(canvas, matrix) {
        const s = canvas.width;
        const n = matrix.length;
        const cell = s / (n + 4);
        const offset = cell * 2;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#111'; ctx.fillRect(0,0,s,s);
        const r = cell * 0.42;
        for (let row = 0; row < n; row++) {
          for (let col = 0; col < n; col++) {
            if (!matrix[row][col]) continue;
            const x = offset + col * cell + cell/2;
            const y = offset + row * cell + cell/2;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI*2);
            ctx.fillStyle = '#fff';
            ctx.fill();
          }
        }
      }

      // Style 3: Rounded squares, white on black
      function drawStyle3(canvas, matrix) {
        const s = canvas.width;
        const n = matrix.length;
        const cell = s / (n + 4);
        const offset = cell * 2;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#111'; ctx.fillRect(0,0,s,s);
        const pad = cell * 0.12;
        const radius = cell * 0.25;
        for (let row = 0; row < n; row++) {
          for (let col = 0; col < n; col++) {
            if (!matrix[row][col]) continue;
            const x = offset + col * cell + pad;
            const y = offset + row * cell + pad;
            const w = cell - pad*2;
            ctx.beginPath();
            ctx.roundRect(x, y, w, w, radius);
            ctx.fillStyle = '#fff';
            ctx.fill();
          }
        }
      }

      // Style 4: Dots in a circle, white on black
      // Finder patterns (corners) are always preserved for scannability
      function drawStyle4(canvas, matrix) {
        const s = canvas.width;
        const n = matrix.length;
        const cell = s / (n + 4);
        const offset = cell * 2;
        const ctx = canvas.getContext('2d');

        // Circular black background
        ctx.fillStyle = '#fff'; ctx.fillRect(0,0,s,s);
        ctx.beginPath();
        ctx.arc(s/2, s/2, s/2 - 4, 0, Math.PI*2);
        ctx.fillStyle = '#111'; ctx.fill();

        // Finder pattern zones: top-left, top-right, bottom-left (rows/cols 0-8)
        function isFinderZone(row, col) {
          return (row < 9 && col < 9) ||
                 (row < 9 && col >= n - 8) ||
                 (row >= n - 8 && col < 9);
        }

        const r = cell * 0.42;
        for (let row = 0; row < n; row++) {
          for (let col = 0; col < n; col++) {
            if (!matrix[row][col]) continue;
            const x = offset + col * cell + cell/2;
            const y = offset + row * cell + cell/2;
            const outsideCircle = Math.hypot(x - s/2, y - s/2) > s/2 - cell*0.5;
            // Always draw finder pattern cells; skip others outside circle
            if (outsideCircle && !isFinderZone(row, col)) continue;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI*2);
            ctx.fillStyle = '#fff';
            ctx.fill();
          }
        }
      }

      const styles = [
        { fn: drawStyle1, label: 'Round Dots — Light' },
        { fn: drawStyle2, label: 'Round Dots — Dark' },
        { fn: drawStyle3, label: 'Rounded Squares — Dark' },
        { fn: drawStyle4, label: 'Circle Shape — Dark' },
      ];

      function renderAll() {
        const url = document.getElementById('url-input').value || 'https://popcode-demo.vercel.app';
        let matrix;
        try { matrix = getQRMatrix(url); } catch(e) { return; }

        const grid = document.getElementById('grid');
        grid.innerHTML = '';

        styles.forEach((style, i) => {
          const card = document.createElement('div');
          card.className = 'card';
          const canvas = document.createElement('canvas');
          canvas.width = 240; canvas.height = 240;
          canvas.style.width = '160px'; canvas.style.height = '160px';
          style.fn(canvas, matrix);
          const label = document.createElement('h3');
          label.textContent = style.label;
          const btn = document.createElement('button');
          btn.className = 'dl-btn';
          btn.textContent = 'Download';
          btn.onclick = () => {
            const a = document.createElement('a');
            a.download = `popcode-qr-style${i+1}.png`;
            a.href = canvas.toDataURL();
            a.click();
          };
          card.appendChild(canvas);
          card.appendChild(label);
          card.appendChild(btn);
          grid.appendChild(card);
        });
      }

      document.getElementById('url-input').addEventListener('input', renderAll);
      renderAll();
    </script>
  </body>
</html>
