<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mockup C — Frosted | Popcode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(160deg, #f0f4ff 0%, #faf5ff 100%);
      color: #1e1b4b;
      min-height: 100vh;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 24px 0;
      max-width: 560px;
      margin: 0 auto;
    }

    .logo {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: #6366f1;
      letter-spacing: -0.03em;
    }

    .sign-out {
      font-size: 13px;
      color: #a5b4fc;
      text-decoration: none;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.15s;
    }

    .sign-out:hover {
      color: #818cf8;
    }

    /* Main */
    .main {
      max-width: 560px;
      margin: 0 auto;
      padding: 52px 24px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 800;
      color: #1e1b4b;
      letter-spacing: -0.5px;
    }

    .btn-create {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(99, 102, 241, 0.3);
      color: #4f46e5;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }

    .btn-create:hover {
      background: rgba(255, 255, 255, 0.9);
      border-color: rgba(99, 102, 241, 0.5);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
    }

    .btn-create .plus {
      font-size: 18px;
      line-height: 1;
    }

    /* Cards */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.08);
      overflow: hidden;
      transition: box-shadow 0.2s, transform 0.15s;
    }

    .card:hover {
      box-shadow: 0 12px 40px rgba(99, 102, 241, 0.14);
      transform: translateY(-2px);
    }

    .card-thumbnail {
      height: 120px;
      width: 100%;
      background: linear-gradient(135deg, #e0e7ff, #ddd6fe);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Subtle shimmer overlay on thumbnail */
    .card-thumbnail::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 100%);
    }

    .card-thumbnail-icon {
      font-size: 32px;
      opacity: 0.45;
      position: relative;
      z-index: 1;
    }

    .card-body {
      padding: 16px 20px 20px;
    }

    .card-title {
      font-size: 17px;
      font-weight: 700;
      color: #1e1b4b;
      margin-bottom: 4px;
    }

    .card-meta {
      font-size: 12px;
      color: #818cf8;
      margin-bottom: 16px;
    }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 7px 15px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
    }

    .btn:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .btn-view {
      background: #4f46e5;
      color: #ffffff;
      box-shadow: 0 2px 8px rgba(79, 70, 229, 0.3);
    }

    .btn-view:hover {
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.8);
      color: #4338ca;
      border: 1px solid rgba(99, 102, 241, 0.15);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .btn-delete {
      background: rgba(254, 226, 226, 0.8);
      color: #dc2626;
      border: 1px solid rgba(239, 68, 68, 0.15);
      margin-left: auto;
    }

    /* Rename form (hidden by default, shown on card 2 as example) */
    .rename-form {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(99, 102, 241, 0.1);
    }

    .rename-input {
      flex: 1;
      padding: 9px 14px;
      border: 1px solid rgba(99, 102, 241, 0.25);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      color: #1e1b4b;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .rename-input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
    }

    .btn-save {
      padding: 9px 18px;
      background: #4f46e5;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(79, 70, 229, 0.25);
    }

    .btn-cancel {
      padding: 9px 12px;
      background: none;
      color: #a5b4fc;
      border: none;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
    }

    /* Footer */
    .footer {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 24px 56px;
      text-align: center;
    }

    .footer-note {
      font-size: 11px;
      color: #c7d2fe;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <header class="header">
    <span class="logo">popcode</span>
    <button class="sign-out">Sign out</button>
  </header>

  <main class="main">
    <div class="page-header">
      <h1 class="page-title">My Projects</h1>
      <a href="#" class="btn-create">
        <span class="plus">+</span> Create New
      </a>
    </div>

    <div class="cards">

      <!-- Card 1: Summer Vacation -->
      <div class="card">
        <div class="card-thumbnail">
          <span class="card-thumbnail-icon">🏖</span>
        </div>
        <div class="card-body">
          <div class="card-title">Summer Vacation</div>
          <div class="card-meta">6 pages &middot; Created Mar 12, 2026</div>
          <div class="card-actions">
            <a href="#" class="btn btn-view">View</a>
            <button class="btn btn-secondary">Copy Link</button>
            <button class="btn btn-secondary">Rename</button>
            <button class="btn btn-delete">Delete</button>
          </div>
        </div>
      </div>

      <!-- Card 2: Baby's First Year — with rename form visible -->
      <div class="card">
        <div class="card-thumbnail" style="background: linear-gradient(135deg, #ccfbf1, #a5f3fc);">
          <span class="card-thumbnail-icon">👶</span>
        </div>
        <div class="card-body">
          <div class="card-title">Baby's First Year</div>
          <div class="card-meta">12 pages &middot; Created Jan 4, 2026</div>
          <div class="card-actions">
            <a href="#" class="btn btn-view">View</a>
            <button class="btn btn-secondary">Copy Link</button>
            <button class="btn btn-secondary" style="background: rgba(237,233,254,0.9); color: #4f46e5; border-color: rgba(99,102,241,0.3);">Rename</button>
            <button class="btn btn-delete">Delete</button>
          </div>
          <!-- Rename form (shown as active state example) -->
          <div class="rename-form">
            <input class="rename-input" type="text" value="Baby's First Year" />
            <button class="btn-save">Save</button>
            <button class="btn-cancel">Cancel</button>
          </div>
        </div>
      </div>

      <!-- Card 3: Wedding Day -->
      <div class="card">
        <div class="card-thumbnail" style="background: linear-gradient(135deg, #fce7f3, #e0e7ff);">
          <span class="card-thumbnail-icon">💍</span>
        </div>
        <div class="card-body">
          <div class="card-title">Wedding Day</div>
          <div class="card-meta">8 pages &middot; Created Sep 28, 2025</div>
          <div class="card-actions">
            <a href="#" class="btn btn-view">View</a>
            <button class="btn btn-secondary">Copy Link</button>
            <button class="btn btn-secondary">Rename</button>
            <button class="btn btn-delete">Delete</button>
          </div>
        </div>
      </div>

    </div>
  </main>

  <footer class="footer">
    <p class="footer-note">Design Concept C</p>
  </footer>

</body>
</html>
