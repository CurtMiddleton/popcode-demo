<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Popcode — Augmented Reality Experiences</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        background: linear-gradient(160deg, #5bc8f5 0%, #7c3aed 100%);
        font-family: sans-serif;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 24px 60px;
        text-align: center;
      }
      .logo { margin-bottom: 32px; }
      .logo img { height: 120px; }
      h1 { font-size: 26px; font-weight: 800; margin-bottom: 12px; }
      .subtitle {
        font-size: 16px; opacity: 0.85; margin-bottom: 48px;
        max-width: 300px; line-height: 1.6;
      }
      .actions { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 320px; }
      .btn-primary {
        width: 100%; padding: 18px; border-radius: 30px; border: none;
        background: white; color: #6b3fa0; font-size: 17px; font-weight: 800;
        cursor: pointer; text-decoration: none; display: block;
        box-shadow: 0 8px 32px rgba(0,0,0,0.2); transition: transform 0.15s, box-shadow 0.15s;
      }
      .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(0,0,0,0.25); }
      .btn-secondary {
        width: 100%; padding: 18px; border-radius: 30px;
        border: 2px solid rgba(255,255,255,0.6);
        background: rgba(255,255,255,0.15); color: white;
        font-size: 17px; font-weight: 700;
        cursor: pointer; text-decoration: none; display: block;
        transition: background 0.2s;
      }
      .btn-secondary:hover { background: rgba(255,255,255,0.25); }
      .divider {
        width: 100%; max-width: 320px;
        border: none; border-top: 1px solid rgba(255,255,255,0.25);
        margin: 8px 0;
      }
      .signin-link { font-size: 14px; opacity: 0.8; margin-top: 8px; }
      .signin-link a { color: white; font-weight: 700; text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="logo"><img src="/assets/Popcode_logo.rev.svg" alt="Popcode"/></div>
    <h1>Bring photos to life</h1>
    <p class="subtitle">Link any photo to a video. Share the link. Point. Play.</p>

    <div class="actions">
      <a href="/create.html" class="btn-primary">Create a Collection</a>
      <hr class="divider"/>
      <a href="/manage.html" class="btn-secondary">My Collections</a>
    </div>

    <p class="signin-link" style="margin-top:32px;">
      Already have an account? <a href="/auth.html">Sign in</a>
    </p>
  </body>
</html>
