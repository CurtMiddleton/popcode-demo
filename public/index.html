<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Popcode</title>
    <style>
      @font-face {
        font-family: 'FilsonPro';
        src: url('/assets/fonts/FilsonProMedium/font.woff2') format('woff2'),
             url('/assets/fonts/FilsonProMedium/font.woff') format('woff');
        font-weight: 400; font-style: normal;
      }
      @font-face {
        font-family: 'FilsonPro';
        src: url('/assets/fonts/FilsonProBold/font.woff2') format('woff2'),
             url('/assets/fonts/FilsonProBold/font.woff') format('woff');
        font-weight: 700; font-style: normal;
      }
      @font-face {
        font-family: 'CooperBT';
        src: url('/assets/fonts/CooperBT-Light.ttf') format('truetype');
        font-weight: 300; font-style: normal;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        min-height: 100vh;
      }
      body {
        background: linear-gradient(160deg, #5bc8f5 0%, #7c3aed 100%);
        font-family: 'FilsonPro', sans-serif;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 30px 24px 60px;
        text-align: center;
        min-height: 100vh;
      }

      .logo { height: 100px; margin-bottom: 20px; }

      .tagline {
        font-family: 'CooperBT', serif;
        font-weight: 300;
        font-size: 32px;
        color: white;
        line-height: 1.125;
        margin-bottom: 40px;
        opacity: 0.92;
      }

      /* Code entry */
      .code-label {
        font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.85);
        margin-bottom: 12px;
      }
      .code-row { display: flex; gap: 10px; width: 100%; max-width: 280px; margin-bottom: 36px; align-items: center; }
      .code-input {
        flex: 1; padding: 14px 16px; border-radius: 10px;
        border: none; background: white;
        font-size: 18px; font-weight: 700; letter-spacing: 0.06em;
        color: #3a1a7a; font-family: 'FilsonPro', sans-serif;
        text-transform: lowercase; outline: none;
      }
      .code-input::placeholder { color: #bbb; font-weight: 400; letter-spacing: 0; font-size: 15px; }
      .code-go-btn {
        width: 52px; height: 52px; border-radius: 50%; border: none; flex-shrink: 0;
        background: rgba(60, 20, 120, 0.6);
        color: white; font-size: 15px; font-weight: 700;
        font-family: 'FilsonPro', sans-serif;
        cursor: pointer; transition: background 0.2s;
        display: flex; align-items: center; justify-content: center;
      }
      .code-go-btn:hover { background: rgba(60, 20, 120, 0.8); }
      .code-error {
        display: none; font-size: 13px; color: rgba(255,200,200,0.9);
        margin-top: -28px; margin-bottom: 20px; font-weight: 700;
      }

      /* Buttons */
      .btn-outline {
        width: 100%; max-width: 320px; padding: 18px; border-radius: 30px;
        border: 1.5px solid rgba(255,255,255,0.8);
        background: transparent; color: white;
        font-size: 17px; font-weight: 700;
        font-family: 'FilsonPro', sans-serif;
        cursor: pointer; text-decoration: none; display: block;
        transition: background 0.2s; margin-bottom: 24px;
      }
      .btn-outline:hover { background: rgba(255,255,255,0.1); }

      .signin-link {
        font-size: 14px; color: rgba(255,255,255,0.75);
        font-family: 'FilsonPro', sans-serif;
        text-decoration: none;
      }
      .signin-link span { text-decoration: underline; }
    </style>
  </head>
  <body>
    <img src="/assets/Popcode_logo.rev.svg" alt="Popcode" class="logo"/>

    <div class="tagline">Your Stories.<br>Brought to Life.</div>

    <div class="code-label">Have a code? Enter it here.</div>
    <div class="code-row">
      <input class="code-input" id="code-input" type="text" placeholder="e.g. egrbne2j" maxlength="20"
             autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
      <button class="code-go-btn" id="code-go-btn">Go!</button>
    </div>
    <div class="code-error" id="code-error">Please enter a code.</div>

    <a href="/create.html" class="btn-outline">Create your own Popcode</a>

    <a href="/manage.html" class="signin-link">Already have an account? <span>Sign in</span></a>

    <script>
      function goToCode() {
        const code = document.getElementById('code-input').value.trim().toLowerCase();
        if (!code) {
          document.getElementById('code-error').style.display = 'block';
          return;
        }
        document.getElementById('code-error').style.display = 'none';
        window.location.href = '/' + code;
      }
      document.getElementById('code-go-btn').addEventListener('click', goToCode);
      document.getElementById('code-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') goToCode();
      });
    </script>
  </body>
</html>
