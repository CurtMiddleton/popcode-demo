<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Popcode — Augmented Reality Experiences</title>
    <style>
      @font-face {
        font-family: 'FilsonPro';
        src: url('/assets/fonts/FilsonProMedium/font.woff2') format('woff2'),
             url('/assets/fonts/FilsonProMedium/font.woff') format('woff');
        font-weight: 400; font-style: normal;
      }
      @font-face {
        font-family: 'FilsonPro';
        src: url('/assets/fonts/FilsonProBold/font.woff2') format('woff2'),
             url('/assets/fonts/FilsonProBold/font.woff') format('woff');
        font-weight: 700; font-style: normal;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        background: #f2f0eb;
        font-family: 'FilsonPro', sans-serif;
        color: #1a1a1a;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0 0 60px;
        text-align: center;
      }
      .site-header {
        width: 100vw;
        background: linear-gradient(135deg, #7657FC 0%, #589AF9 100%);
        padding: 24px 24px 40px;
        min-height: 200px;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        position: relative;
        margin-bottom: 40px;
        align-self: stretch;
      }
      h1 { font-size: 26px; font-weight: 700; margin-bottom: 12px; color: #1a1a1a; }
      .subtitle {
        font-size: 16px; color: #888; margin-bottom: 32px;
        max-width: 300px; line-height: 1.6;
      }

      /* Code entry section */
      .code-section {
        width: 100%; max-width: 320px; padding: 0 24px;
        margin-bottom: 36px;
      }
      .code-label {
        font-size: 13px; font-weight: 700; color: #888;
        text-transform: uppercase; letter-spacing: 0.06em;
        margin-bottom: 10px;
      }
      .code-row {
        display: flex; gap: 8px;
      }
      .code-input {
        flex: 1; padding: 15px 16px; border-radius: 16px;
        border: 1.5px solid #e0ddd6; background: white;
        font-size: 20px; font-weight: 700; letter-spacing: 0.08em;
        color: #1a1a1a; font-family: 'FilsonPro', sans-serif;
        text-transform: lowercase; outline: none;
        transition: border-color 0.2s;
      }
      .code-input:focus { border-color: #7657FC; }
      .code-input::placeholder { color: #ccc; font-weight: 400; letter-spacing: 0; font-size: 15px; }
      .code-go-btn {
        padding: 15px 20px; border-radius: 16px; border: none;
        background: linear-gradient(135deg, #7657FC 0%, #589AF9 100%);
        color: white; font-size: 16px; font-weight: 700;
        font-family: 'FilsonPro', sans-serif;
        cursor: pointer; transition: opacity 0.2s; white-space: nowrap;
      }
      .code-go-btn:hover { opacity: 0.9; }
      .code-error {
        display: none; font-size: 13px; color: #cc3333;
        margin-top: 8px; font-weight: 700;
      }

      .divider-row {
        width: 100%; max-width: 320px; padding: 0 24px;
        display: flex; align-items: center; gap: 12px;
        margin-bottom: 28px; color: #bbb; font-size: 13px;
      }
      .divider-row::before, .divider-row::after {
        content: ''; flex: 1; border-top: 1px solid #e0ddd6;
      }

      .actions { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 320px; padding: 0 24px; }
      .btn-primary {
        width: 100%; padding: 18px; border-radius: 30px; border: none;
        background: linear-gradient(135deg, #7657FC 0%, #589AF9 100%);
        color: white; font-size: 17px; font-weight: 700;
        font-family: 'FilsonPro', sans-serif;
        cursor: pointer; text-decoration: none; display: block;
        box-shadow: 0 4px 20px rgba(107,63,160,0.3); transition: opacity 0.2s;
      }
      .btn-primary:hover { opacity: 0.9; }
      .btn-secondary {
        width: 100%; padding: 18px; border-radius: 30px;
        border: 1px solid #1a1a1a;
        background: transparent; color: #1a1a1a;
        font-size: 17px; font-weight: 700;
        font-family: 'FilsonPro', sans-serif;
        cursor: pointer; text-decoration: none; display: block;
        transition: background 0.2s;
      }
      .btn-secondary:hover { background: rgba(0,0,0,0.05); }
      .divider { width: 100%; border: none; border-top: 1px solid #e8e8e8; margin: 4px 0; }
      .signin-link { font-size: 14px; color: #888; margin-top: 20px; }
      .signin-link a { color: #6b3fa0; font-weight: 700; text-decoration: underline; }
    </style>
  </head>
  <body>
    <header class="site-header">
      <img src="/assets/Popcode_logo.rev.svg" alt="Popcode" style="height:80px;"/>
    </header>
    <h1>Bring your stories to life</h1>
    <p class="subtitle">Link any photo to a video. Share the link. Point. Play.</p>

    <div class="code-section">
      <div class="code-label">Have a code? Enter it here</div>
      <div class="code-row">
        <input class="code-input" id="code-input" type="text" placeholder="e.g. egrbne2j" maxlength="20" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
        <button class="code-go-btn" id="code-go-btn">Go →</button>
      </div>
      <div class="code-error" id="code-error">Please enter a code.</div>
    </div>

    <div class="divider-row">or</div>

    <div class="actions">
      <a href="/create.html" class="btn-primary">Create a Collection</a>
      <hr class="divider"/>
      <a href="/manage.html" class="btn-secondary">My Collections</a>
    </div>

    <p class="signin-link">
      Already have an account? <a href="/auth.html">Sign in</a>
    </p>

    <script>
      function goToCode() {
        const code = document.getElementById('code-input').value.trim().toLowerCase();
        if (!code) {
          document.getElementById('code-error').style.display = 'block';
          return;
        }
        document.getElementById('code-error').style.display = 'none';
        window.location.href = '/' + code;
      }

      document.getElementById('code-go-btn').addEventListener('click', goToCode);
      document.getElementById('code-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') goToCode();
      });
    </script>
  </body>
</html>
