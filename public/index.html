<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Popcode — Augmented Reality Experiences</title>
    <style>
      @font-face {
        font-family: 'FilsonPro';
        src: url('/assets/fonts/FilsonProMedium/font.woff2') format('woff2'),
             url('/assets/fonts/FilsonProMedium/font.woff') format('woff');
        font-weight: 400;
        font-style: normal;
      }
      @font-face {
        font-family: 'FilsonPro';
        src: url('/assets/fonts/FilsonProBold/font.woff2') format('woff2'),
             url('/assets/fonts/FilsonProBold/font.woff') format('woff');
        font-weight: 700;
        font-style: normal;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        background: #f2f0eb;
        font-family: 'FilsonPro', sans-serif;
        color: #1a1a1a;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0 24px 60px;
        text-align: center;
      }
      .site-header {
        width: 100%;
        background: linear-gradient(135deg, #7657FC 0%, #589AF9 100%);
        padding: 48px 24px; min-height: 200px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        margin-bottom: 32px;
        align-self: stretch;
      }
      .logo-text {
        font-family: 'FilsonPro', sans-serif;
        font-weight: 700;
        font-size: 36px;
        color: white;
        letter-spacing: -0.02em;
      }
      h1 { font-size: 26px; font-weight: 700; margin-bottom: 12px; color: #1a1a1a; }
      .subtitle {
        font-size: 16px; color: #888; margin-bottom: 48px;
        max-width: 300px; line-height: 1.6;
      }
      .actions { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 320px; }
      .btn-primary {
        width: 100%; padding: 18px; border-radius: 30px; border: none;
        background: #6b3fa0; color: white; font-size: 17px; font-weight: 700;
        font-family: 'FilsonPro', sans-serif;
        cursor: pointer; text-decoration: none; display: block;
        box-shadow: 0 4px 20px rgba(107,63,160,0.3); transition: transform 0.15s, box-shadow 0.15s;
      }
      .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(107,63,160,0.4); }
      .btn-secondary {
        width: 100%; padding: 18px; border-radius: 30px;
        border: none;
        background: #eeeeee; color: #333333;
        font-size: 17px; font-weight: 700;
        font-family: 'FilsonPro', sans-serif;
        cursor: pointer; text-decoration: none; display: block;
        transition: background 0.2s;
      }
      .btn-secondary:hover { background: #e0e0e0; }
      .divider {
        width: 100%; max-width: 320px;
        border: none; border-top: 1px solid #e8e8e8;
        margin: 8px 0;
      }
      .signin-link { font-size: 14px; color: #888; margin-top: 8px; }
      .signin-link a { color: #6b3fa0; font-weight: 700; text-decoration: underline; }
    </style>
  </head>
  <body>
    <header class="site-header">
      <img src="/assets/Popcode_logo.rev.svg" alt="Popcode" style="height:80px;"/>
    </header>
    <h1>Bring photos to life</h1>
    <p class="subtitle">Link any photo to a video. Share the link. Point. Play.</p>

    <div class="actions">
      <a href="/create.html" class="btn-primary">Create a Collection</a>
      <hr class="divider"/>
      <a href="/manage.html" class="btn-secondary">My Collections</a>
    </div>

    <p class="signin-link" style="margin-top:32px;">
      Already have an account? <a href="/auth.html">Sign in</a>
    </p>
  </body>
</html>
