<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Popcode — Reset Password</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <style>
      @font-face {
        font-family: 'FilsonPro';
        src: url('/assets/fonts/FilsonProMedium/font.woff2') format('woff2'),
             url('/assets/fonts/FilsonProMedium/font.woff') format('woff');
        font-weight: 400;
        font-style: normal;
      }
      @font-face {
        font-family: 'FilsonPro';
        src: url('/assets/fonts/FilsonProBold/font.woff2') format('woff2'),
             url('/assets/fonts/FilsonProBold/font.woff') format('woff');
        font-weight: 700;
        font-style: normal;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        background: #f2f0eb;
        font-family: 'FilsonPro', sans-serif;
        color: #1a1a1a;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0 24px 80px;
      }
      .site-header {
        width: 100%;
        background: linear-gradient(135deg, #7657FC 0%, #589AF9 100%);
        padding: 48px 24px; min-height: 200px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        margin-bottom: 32px;
        align-self: stretch;
      }
      .logo-text {
        font-family: 'FilsonPro', sans-serif;
        font-weight: 700;
        font-size: 36px;
        color: white;
        letter-spacing: -0.02em;
      }
      .card {
        width: 100%;
        max-width: 360px;
        background: white;
        border-radius: 20px;
        padding: 32px 28px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        border: 1px solid #e8e8e8;
      }
      h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; text-align: center; color: #1a1a1a; }
      .subtitle { font-size: 13px; color: #888; text-align: center; margin-bottom: 24px; line-height: 1.5; }
      .field { margin-bottom: 16px; }
      label { font-size: 13px; font-weight: 700; color: #555; display: block; margin-bottom: 6px; }
      input[type="password"] {
        width: 100%; padding: 13px 16px; border-radius: 12px;
        border: 1px solid #e8e8e8;
        font-size: 15px; color: #1a1a1a; outline: none;
        font-family: 'FilsonPro', sans-serif;
        background: #fafaf8;
      }
      .submit-btn {
        width: 100%; padding: 15px; border-radius: 30px; border: none;
        background: #6b3fa0; color: white; font-size: 16px; font-weight: 700;
        font-family: 'FilsonPro', sans-serif;
        cursor: pointer; margin-top: 8px; transition: background 0.2s;
      }
      .submit-btn:hover { background: #5a3388; }
      .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .msg {
        display: none; border-radius: 10px; padding: 10px 14px;
        font-size: 13px; margin-bottom: 16px; line-height: 1.5;
      }
      .msg.error { background: #fff0f0; border: 1px solid #ffcccc; color: #cc3333; }
      .msg.success { background: #f0fff4; border: 1px solid #bbf7d0; color: #16a34a; }
    </style>
  </head>
  <body>
    <header class="site-header">
      <img src="/assets/Popcode_logo.rev.svg" alt="Popcode" style="height:80px;"/>
    </header>
    <div class="card">
      <h1>New Password</h1>
      <p class="subtitle">Enter a new password for your account.</p>
      <div class="msg" id="msg"></div>
      <div class="field">
        <label for="password">New Password</label>
        <input type="password" id="password" autocomplete="new-password" placeholder="At least 6 characters"/>
      </div>
      <button class="submit-btn" id="submit-btn">Set New Password</button>
    </div>

    <script>
      const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      function showMsg(text, type) {
        const el = document.getElementById('msg');
        el.textContent = text;
        el.className = 'msg ' + type;
        el.style.display = 'block';
      }

      document.getElementById('submit-btn').addEventListener('click', async () => {
        const password = document.getElementById('password').value;
        if (password.length < 6) {
          showMsg('Password must be at least 6 characters.', 'error');
          return;
        }

        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = 'Saving...';

        const { error } = await db.auth.updateUser({ password });
        if (error) {
          showMsg(error.message, 'error');
          btn.disabled = false;
          btn.textContent = 'Set New Password';
        } else {
          showMsg('Password updated! Redirecting...', 'success');
          setTimeout(() => window.location.href = '/manage.html', 1500);
        }
      });

      document.addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('submit-btn').click();
      });
    </script>
  </body>
</html>
