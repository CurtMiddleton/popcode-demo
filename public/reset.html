<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Popcode — Reset Password</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        background: linear-gradient(160deg, #5bc8f5 0%, #7c3aed 100%);
        font-family: sans-serif;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 24px;
      }
      .logo { margin-bottom: 32px; }
      .logo img { height: 120px; }
      .card {
        width: 100%;
        max-width: 360px;
        background: rgba(255,255,255,0.15);
        border-radius: 20px;
        padding: 32px 28px;
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.25);
      }
      h1 { font-size: 22px; font-weight: 800; margin-bottom: 8px; text-align: center; }
      .subtitle { font-size: 13px; opacity: 0.8; text-align: center; margin-bottom: 24px; line-height: 1.5; }
      .field { margin-bottom: 16px; }
      label { font-size: 13px; font-weight: 600; opacity: 0.85; display: block; margin-bottom: 6px; }
      input[type="password"] {
        width: 100%; padding: 13px 16px; border-radius: 12px; border: none;
        font-size: 15px; color: #333; outline: none;
      }
      .submit-btn {
        width: 100%; padding: 15px; border-radius: 30px; border: none;
        background: #3d2b8e; color: white; font-size: 16px; font-weight: 700;
        cursor: pointer; margin-top: 8px; transition: background 0.2s;
      }
      .submit-btn:hover { background: #4e38a8; }
      .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .msg {
        display: none; border-radius: 10px; padding: 10px 14px;
        font-size: 13px; margin-bottom: 16px; line-height: 1.5;
      }
      .msg.error { background: rgba(220,38,38,0.3); border: 1px solid rgba(220,38,38,0.5); }
      .msg.success { background: rgba(34,197,94,0.3); border: 1px solid rgba(34,197,94,0.5); }
    </style>
  </head>
  <body>
    <div class="logo"><img src="/assets/Popcode_logo.rev.svg" alt="Popcode"/></div>
    <div class="card">
      <h1>New Password</h1>
      <p class="subtitle">Enter a new password for your account.</p>
      <div class="msg" id="msg"></div>
      <div class="field">
        <label for="password">New Password</label>
        <input type="password" id="password" autocomplete="new-password" placeholder="At least 6 characters"/>
      </div>
      <button class="submit-btn" id="submit-btn">Set New Password</button>
    </div>

    <script>
      const SUPABASE_URL = 'https://mrwpkhsluzokytpvmwqk.supabase.co';
      const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yd3BraHNsdXpva3l0cHZtd3FrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTA2MDksImV4cCI6MjA5MTE2NjYwOX0.YMfuRpKvcmfoJ75Gxhf7ekoCaeDfR0Dsz_9Beg5ULAI';
      const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      function showMsg(text, type) {
        const el = document.getElementById('msg');
        el.textContent = text;
        el.className = 'msg ' + type;
        el.style.display = 'block';
      }

      document.getElementById('submit-btn').addEventListener('click', async () => {
        const password = document.getElementById('password').value;
        if (password.length < 6) {
          showMsg('Password must be at least 6 characters.', 'error');
          return;
        }

        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = 'Saving...';

        const { error } = await db.auth.updateUser({ password });
        if (error) {
          showMsg(error.message, 'error');
          btn.disabled = false;
          btn.textContent = 'Set New Password';
        } else {
          showMsg('Password updated! Redirecting...', 'success');
          setTimeout(() => window.location.href = '/manage.html', 1500);
        }
      });

      document.addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('submit-btn').click();
      });
    </script>
  </body>
</html>
