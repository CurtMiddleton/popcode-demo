<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Popcode — Edit Collection</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      @font-face {
        font-family: 'FilsonPro';
        src: url('/assets/fonts/FilsonProMedium/font.woff2') format('woff2'),
             url('/assets/fonts/FilsonProMedium/font.woff') format('woff');
        font-weight: 400;
        font-style: normal;
      }
      @font-face {
        font-family: 'FilsonPro';
        src: url('/assets/fonts/FilsonProBold/font.woff2') format('woff2'),
             url('/assets/fonts/FilsonProBold/font.woff') format('woff');
        font-weight: 700;
        font-style: normal;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        background: #f2f0eb;
        font-family: 'FilsonPro', sans-serif;
        color: #1a1a1a;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0 0 60px;
      }
      .site-header {
        width: 100vw;
        background: linear-gradient(135deg, #7657FC 0%, #589AF9 100%);
        padding: 24px 24px 40px;
        min-height: 200px;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        position: relative;
        margin-bottom: 32px;
        align-self: stretch;
      }
      .page-top-bar { width: 100%; max-width: 360px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 12px; padding: 0 24px; }
      .my-collections-btn { background: linear-gradient(135deg, #7657FC 0%, #589AF9 100%); color: white; border: none; border-radius: 24px; padding: 10px 20px; font-size: 14px; font-weight: 700; font-family: 'FilsonPro', sans-serif; cursor: pointer; text-decoration: none; white-space: nowrap; }
      .my-collections-btn:hover { opacity: 0.9; }
      .logo-text {
        font-family: 'FilsonPro', sans-serif;
        font-weight: 700;
        font-size: 36px;
        color: white;
        letter-spacing: -0.02em;
      }
      h1 { font-size: 26px; font-weight: 700; color: #1a1a1a; text-align: left; line-height: 1.1; }
      .subtitle { font-size: 14px; text-align: left; color: #888; margin-bottom: 28px; width: 100%; max-width: 360px; padding: 0 24px; line-height: 1.5; }
      .field-label { font-size: 15px; font-weight: 700; margin-bottom: 10px; width: 100%; max-width: 360px; padding: 0 24px; text-align: left; color: #1a1a1a; }
      input[type="text"] {
        width: 100%; max-width: 360px; padding: 14px 16px; border-radius: 12px;
        border: 1px solid #e8e8e8; font-size: 16px; color: #1a1a1a; margin-bottom: 32px; outline: none;
        background: white; font-family: 'FilsonPro', sans-serif;
      }
      .pages { width: 100%; max-width: 360px; }
      .page { margin-bottom: 28px; position: relative; display: flex; flex-direction: column; align-items: center; }
      .page-header { display: flex; align-items: center; justify-content: flex-start; position: relative; margin-bottom: 16px; width: 284px; }
      .page-label { background: #1a1a1a; color: white; border-radius: 50%; width: 28px; height: 28px; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
      .remove-page-btn { position: absolute; right: 0; background: #666666; border: none; color: white; border-radius: 50%; width: 32px; height: 32px; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; padding: 0; }
      .remove-page-btn:hover { background: #333; }
      .upload-row { display: flex; gap: 24px; justify-content: flex-start; }

      .upload-btn {
        display: flex; flex-direction: column; align-items: center; gap: 10px;
        background: white; border-radius: 10px; width: 130px; height: 110px;
        justify-content: center; cursor: pointer; border: 1px solid #e8e8e8;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: transform 0.15s;
        position: relative; overflow: hidden;
      }
      .upload-btn:active { transform: scale(0.95); }
      .upload-btn input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
      .upload-btn img.icon { width: 40px; height: 40px; }
      .upload-btn .btn-label { font-size: 11px; color: #888; font-weight: 600; text-align: center; padding: 0 8px; }
      .upload-btn.selected { background: #f0ecf8; border-color: #d0c0e8; }
      .upload-btn.selected img.icon { display: none; }
      .upload-btn.selected .btn-label { display: none; }
      .upload-btn .preview-img { display: none; position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
      .upload-btn.selected .preview-img { display: block; }
      /* Play triangle overlay on selected video thumbnails */
      .play-overlay {
        display: none; position: absolute; top: 50%; left: 50%;
        transform: translate(-44%, -50%);
        width: 0; height: 0; pointer-events: none; z-index: 1;
        border-style: solid; border-width: 11px 0 11px 20px;
        border-color: transparent transparent transparent rgba(255,255,255,0.92);
        filter: drop-shadow(0 1px 4px rgba(0,0,0,0.5));
      }
      .upload-btn.selected .play-overlay { display: block; }
      /* Existing (replaceable) button — tap to swap */
      .upload-btn.replaceable::after {
        content: '✎'; position: absolute; bottom: 6px; right: 6px;
        background: rgba(0,0,0,0.5); color: white; border-radius: 50%;
        width: 28px; height: 28px; font-size: 16px;
        display: flex; align-items: center; justify-content: center;
        pointer-events: none;
      }
      .file-name { font-size: 11px; color: #555; font-weight: 600; text-align: center; margin-top: 8px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .file-size { font-size: 10px; color: #888; font-weight: 500; text-align: center; max-width: 120px; }
      .file-size.warn { color: #d97706; font-weight: 700; }
      .upload-wrapper { display: flex; flex-direction: column; align-items: center; }
      .video-msg { display: none; max-width: 120px; margin-top: 6px; text-align: center; }
      .compress-status { font-size: 10px; color: #555; font-weight: 600; line-height: 1.4; }
      .compress-bar-wrap { background: #e8e8e8; border-radius: 99px; height: 4px; margin: 4px 0; }
      .compress-bar { height: 100%; background: #6b3fa0; border-radius: 99px; transition: width 0.2s; width: 0%; }
      .video-msg-banner { background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; padding: 8px 10px; font-size: 10px; color: #555; line-height: 1.5; }
      .video-msg-banner a { color: #6b3fa0; font-weight: 700; text-decoration: underline; }
      .compressed-badge { font-size: 10px; color: #16a34a; font-weight: 700; }
      .existing-badge { display: none; }

      .add-page-btn { width: 100%; max-width: 360px; padding: 16px; border-radius: 30px; border: none; background: #eeeeee; color: #333333; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 16px; transition: background 0.2s; font-family: 'FilsonPro', sans-serif; }
      .add-page-btn:hover { background: #e0e0e0; }
      .save-btn { width: 100%; max-width: 360px; padding: 16px; border-radius: 30px; border: none; background: linear-gradient(135deg, #7657FC 0%, #589AF9 100%); color: white; font-size: 16px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; font-family: 'FilsonPro', sans-serif; }
      .save-btn:hover { opacity: 0.9; }
      .save-btn:disabled { opacity: 0.4; cursor: not-allowed; }
      .divider { width: 100%; max-width: 360px; border: none; border-top: 1px solid #e8e8e8; margin: 16px 0; }
      .back-btn { width: 100%; max-width: 360px; padding: 16px; border-radius: 30px; border: none; background: #eeeeee; color: #333333; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s; text-decoration: none; display: block; text-align: center; font-family: 'FilsonPro', sans-serif; }
      .back-btn:hover { background: #e0e0e0; }

      #progress { display: none; width: 100%; max-width: 360px; margin-top: 24px; text-align: center; }
      .progress-bar-wrap { background: #e8e8e8; border-radius: 99px; height: 14px; margin: 14px 0; overflow: hidden; }
      .progress-bar { height: 100%; background: #6b3fa0; border-radius: 99px; transition: width 0.3s; width: 0%; }
      #progress-label { font-size: 18px; font-weight: 700; color: #1a1a1a; }
      #progress-label.error { color: #cc3333; font-weight: 700; }
      #try-again-btn { display: none; margin-top: 14px; background: #eeeeee; color: #333333; border: none; border-radius: 24px; padding: 10px 24px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s; font-family: 'FilsonPro', sans-serif; }
      #try-again-btn:hover { background: #e0e0e0; }

      #result { display: none; width: 100%; max-width: 360px; margin-top: 24px; background: white; border-radius: 16px; padding: 24px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
      #result h3 { font-size: 18px; margin-bottom: 8px; color: #1a1a1a; }
      #result p { font-size: 13px; color: #888; margin-bottom: 16px; }
      #result-url { background: #f2f0eb; border-radius: 10px; padding: 10px 14px; font-size: 12px; word-break: break-all; color: #333; margin-bottom: 12px; }
      #copy-btn { background: #6b3fa0; color: white; border: none; border-radius: 20px; padding: 10px 24px; font-size: 14px; cursor: pointer; font-weight: 600; margin-bottom: 20px; font-family: 'FilsonPro', sans-serif; }

      .loading-screen { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 40px 0; opacity: 0.7; }
      .spinner { width: 36px; height: 36px; border-radius: 50%; border: 3px solid #e8e8e8; border-top-color: #6b3fa0; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <header class="site-header">
      <img src="/assets/Popcode_logo.rev.svg" alt="Popcode" style="height:80px;"/>
      <button id="logout-btn" style="position:absolute;right:20px;top:20px;background:#78A7FF;color:white;border:none;border-radius:20px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:'FilsonPro',sans-serif;">Sign Out</button>
    </header>
    <div class="page-top-bar">
      <h1>Edit<br>Collection</h1>
      <a href="/manage.html" class="my-collections-btn">My Collections</a>
    </div>
    <p class="subtitle">Tap any photo or video to replace it. Add or remove pages.</p>

    <div id="loading-screen" class="loading-screen">
      <div class="spinner"></div>
      <span style="font-size:14px;">Loading collection...</span>
    </div>

    <div id="edit-ui" style="display:none; width:100%; max-width:360px; display:none; flex-direction:column; align-items:center;">
      <div class="field-label">Collection Name</div>
      <input type="text" id="name-input" placeholder=""/>

      <div class="pages" id="pages"></div>

      <button class="add-page-btn" id="add-page-btn">+ Add Popcode</button>
      <button class="save-btn" id="save-btn">Save Changes</button>
    </div>

    <div id="progress">
      <div id="progress-label">Starting...</div>
      <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
      <button id="try-again-btn">Try Again</button>
    </div>

    <div id="result">
      <h3>Collection updated!</h3>
      <p>Your collection is live with the new pages.</p>
      <div id="result-url"></div>
      <button id="copy-btn">Copy Link</button>
      <br/>
      <a href="/manage.html" class="back-btn" style="margin-top:12px;">← My Collections</a>
    </div>

    <script>
      const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      const MAX_VIDEO_MB = 200;
      const MAX_PHOTO_MB = 10;

      const params = new URLSearchParams(location.search);
      const slug = params.get('id');

      let currentUser = null;
      let collectionId = null;
      // existingItems: array of {id, target_index, video_url, photo_url} from DB
      let existingItems = [];
      // deletedExistingIds: set of item IDs the user removed
      const deletedExistingIds = new Set();
      // replacements: {[itemId]: {photo?: File, video?: File}} — files chosen to replace existing
      const replacements = {};
      // newPairs: keyed by page key, {photo: File, video: File}
      let newPageKey = 0;
      const newPairs = {};

      document.getElementById('logout-btn').addEventListener('click', async () => {
        await db.auth.signOut();
        window.location.href = '/auth.html';
      });

      // ── Auth ──────────────────────────────────────────────────────────────────
      db.auth.getSession().then(({ data }) => {
        if (!data.session) {
          window.location.href = '/auth.html';
        } else {
          currentUser = data.session.user;
          if (!slug) { alert('No collection specified.'); window.location.href = '/manage.html'; return; }
          loadCollection();
        }
      });

      // ── Load existing collection ──────────────────────────────────────────────
      let collectionLoaded = false;
      async function loadCollection() {
        if (collectionLoaded) return;
        collectionLoaded = true;

        const { data: col } = await db.from('collections').select('*').eq('slug', slug).single();
        if (!col) { alert('Collection not found.'); window.location.href = '/manage.html'; return; }
        collectionId = col.id;
        document.getElementById('name-input').value = col.name || '';

        const { data: items } = await db.from('collection_items')
          .select('*').eq('collection_id', col.id).order('target_index');

        // Deduplicate by target_index (keep highest id) in case of DB duplicates
        const byIndex = {};
        (items || []).forEach(item => {
          if (!byIndex[item.target_index] || item.id > byIndex[item.target_index].id) {
            byIndex[item.target_index] = item;
          }
        });
        existingItems = Object.values(byIndex).sort((a, b) => a.target_index - b.target_index);

        document.getElementById('loading-screen').style.display = 'none';
        const ui = document.getElementById('edit-ui');
        ui.style.display = 'flex';
        document.getElementById('pages').innerHTML = '';

        existingItems.forEach(item => renderExistingPage(item));
        renumberPages();
      }

      // ── Render existing page (tap photo or video to replace) ─────────────────
      function renderExistingPage(item) {
        const key = `existing-${item.id}`;
        const page = document.createElement('div');
        page.className = 'page';
        page.id = `page-${key}`;

        const photoThumb = item.photo_url || '';
        const videoThumb = item.video_url || '';

        page.innerHTML = `
          <div class="page-header">
            <div class="page-label">${item.target_index + 1}</div>
            <button class="remove-page-btn" title="Remove page"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
          </div>
          <div class="upload-row">
            <div class="upload-wrapper">
              <label class="upload-btn selected replaceable" id="photo-btn-${key}" title="Tap to replace photo">
                <input type="file" accept="image/*" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;"/>
                <img class="preview-img" id="photo-preview-${key}" src="${escapeHtml(photoThumb)}" style="display:block;"/>
              </label>
              <div class="existing-badge" id="photo-badge-${key}">Tap to replace</div>
            </div>
            <div class="upload-wrapper">
              <label class="upload-btn selected replaceable" id="video-btn-${key}" title="Tap to replace video">
                <input type="file" accept="video/*" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;"/>
                <img class="preview-img" id="video-preview-${key}" style="display:block;"/>
                <span class="play-overlay" style="display:block;"></span>
              </label>
              <div class="existing-badge" id="video-badge-${key}">Tap to replace</div>
            </div>
          </div>
        `;

        // Generate video thumbnail from URL
        if (videoThumb) {
          const vid = document.createElement('video');
          vid.crossOrigin = 'anonymous';
          vid.muted = true;
          vid.playsInline = true;
          vid.preload = 'metadata';
          vid.addEventListener('loadedmetadata', () => {
            vid.currentTime = Math.min(1.5, vid.duration * 0.15);
          });
          vid.addEventListener('seeked', () => {
            requestAnimationFrame(() => {
              requestAnimationFrame(() => {
                try {
                  const c = document.createElement('canvas'); c.width = 130; c.height = 110;
                  c.getContext('2d').drawImage(vid, 0, 0, 130, 110);
                  const el = document.getElementById(`video-preview-${key}`);
                  if (el) el.src = c.toDataURL('image/jpeg');
                } catch(e) {
                  // CORS prevented canvas capture — leave thumbnail blank
                }
              });
            });
          });
          vid.src = videoThumb;
        }

        // Photo replacement
        page.querySelector('#photo-btn-' + key + ' input').addEventListener('change', function() {
          const file = this.files[0];
          if (!file) return;
          const sizeMB = file.size / (1024 * 1024);
          if (sizeMB > MAX_PHOTO_MB) {
            alert(`This photo is ${sizeMB.toFixed(1)} MB, which exceeds the ${MAX_PHOTO_MB} MB limit.`);
            this.value = ''; return;
          }
          if (!replacements[item.id]) replacements[item.id] = {};
          replacements[item.id].photo = file;
          document.getElementById(`photo-preview-${key}`).src = URL.createObjectURL(file);
          document.getElementById(`photo-badge-${key}`).textContent = '✓ Replaced';
        });

        // Video replacement
        page.querySelector('#video-btn-' + key + ' input').addEventListener('change', async function() {
          const file = this.files[0];
          if (!file) return;
          const sizeMB = file.size / (1024 * 1024);
          if (sizeMB > MAX_VIDEO_MB) {
            if (canCompressVideo()) {
              const go = confirm(`This video is ${sizeMB.toFixed(1)} MB — over the ${MAX_VIDEO_MB} MB limit.\n\nWould you like to compress it?\n\nTap OK to compress, or Cancel to choose a different video.`);
              if (!go) { this.value = ''; return; }
              const badge = document.getElementById(`video-badge-${key}`);
              badge.textContent = 'Compressing…';
              let compressed;
              try { compressed = await compressVideo(file, () => {}); } catch(e) { compressed = null; }
              const compMB = compressed ? compressed.size / (1024 * 1024) : Infinity;
              if (compressed && compMB <= MAX_VIDEO_MB) {
                const compFile = new File([compressed], file.name.replace(/\.[^.]+$/, '.webm'), { type: compressed.type });
                if (!replacements[item.id]) replacements[item.id] = {};
                replacements[item.id].video = compFile;
                setVideoPreview(`video-preview-${key}`, compFile);
                badge.textContent = `✓ Compressed (${compMB.toFixed(1)} MB)`;
              } else {
                badge.textContent = 'Too large — try clideo.com';
                this.value = '';
              }
            } else {
              alert(`Video is ${sizeMB.toFixed(1)} MB — over the ${MAX_VIDEO_MB} MB limit. Compress at clideo.com first.`);
              this.value = '';
            }
            return;
          }
          if (!replacements[item.id]) replacements[item.id] = {};
          replacements[item.id].video = file;
          setVideoPreview(`video-preview-${key}`, file);
          document.getElementById(`video-badge-${key}`).textContent = '✓ Replaced';
        });

        page.querySelector('.remove-page-btn').addEventListener('click', () => {
          deletedExistingIds.add(item.id);
          page.remove();
          renumberPages();
        });

        document.getElementById('pages').appendChild(page);
      }

      function setVideoPreview(previewId, file) {
        const videoEl = document.createElement('video');
        videoEl.src = URL.createObjectURL(file);
        videoEl.muted = true; videoEl.playsInline = true; videoEl.currentTime = 0.5;
        videoEl.addEventListener('seeked', () => {
          const c = document.createElement('canvas'); c.width = 130; c.height = 110;
          c.getContext('2d').drawImage(videoEl, 0, 0, 130, 110);
          const el = document.getElementById(previewId);
          if (el) el.src = c.toDataURL('image/jpeg');
        });
        videoEl.load();
      }

      // ── Render new (file upload) page ─────────────────────────────────────────
      function addNewPage() {
        newPageKey++;
        const n = newPageKey;
        newPairs[n] = { photo: null, video: null };
        const page = document.createElement('div');
        page.className = 'page';
        page.id = `page-new-${n}`;
        page.innerHTML = `
          <div class="page-header">
            <div class="page-label">${n}</div>
            <button class="remove-page-btn" title="Remove page"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
          </div>
          <div class="upload-row">
            <div class="upload-wrapper">
              <label class="upload-btn" id="photo-btn-new-${n}">
                <input type="file" accept="image/*" onchange="handleFile(this,'photo',${n}).catch(e=>console.error(e))"/>
                <img class="icon" src="/assets/photo.png" alt="Photo"/>
                <img class="preview-img" id="photo-preview-new-${n}"/>
                <span class="btn-label">Photo to scan</span>
              </label>
              <div class="file-name" id="photo-name-new-${n}"></div>
              <div class="file-size" id="photo-size-new-${n}"></div>
            </div>
            <div class="upload-wrapper">
              <label class="upload-btn" id="video-btn-new-${n}">
                <input type="file" accept="video/*" onchange="handleFile(this,'video',${n}).catch(e=>console.error(e))"/>
                <img class="icon" src="/assets/video.png" alt="Video"/>
                <img class="preview-img" id="video-preview-new-${n}"/>
                <span class="play-overlay"></span>
                <span class="btn-label">Plays on scan</span>
              </label>
              <div class="file-name" id="video-name-new-${n}"></div>
              <div class="file-size" id="video-size-new-${n}"></div>
              <div class="video-msg" id="video-msg-new-${n}"></div>
            </div>
          </div>
        `;
        page.querySelector('.remove-page-btn').addEventListener('click', () => {
          delete newPairs[n];
          page.remove();
          renumberPages();
        });
        document.getElementById('pages').appendChild(page);
        renumberPages();
      }

      function renumberPages() {
        document.querySelectorAll('#pages .page-label').forEach((label, i) => {
          label.textContent = i + 1;
        });
      }

      document.getElementById('add-page-btn').addEventListener('click', addNewPage);

      // ── File handling (mirrors create.html) ───────────────────────────────────
      function formatFileSize(bytes) {
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
      }

      function canCompressVideo() {
        try {
          const canvas = document.createElement('canvas');
          if (typeof canvas.captureStream !== 'function') return false;
          if (typeof MediaRecorder === 'undefined') return false;
          const types = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm'];
          return types.some(t => MediaRecorder.isTypeSupported(t));
        } catch (e) { return false; }
      }

      function compressVideo(file, onProgress) {
        const types = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm'];
        const mimeType = types.find(t => MediaRecorder.isTypeSupported(t));
        return new Promise((resolve, reject) => {
          const video = document.createElement('video');
          const srcUrl = URL.createObjectURL(file);
          video.src = srcUrl;
          video.muted = true;
          video.playsInline = true;
          video.onloadedmetadata = () => {
            const MAX_DIM = 1280;
            const scale = Math.min(1, MAX_DIM / Math.max(video.videoWidth || 1, video.videoHeight || 1));
            const w = Math.max(2, Math.round(video.videoWidth * scale / 2) * 2);
            const h = Math.max(2, Math.round(video.videoHeight * scale / 2) * 2);
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            const stream = canvas.captureStream(30);
            const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 2_500_000 });
            const chunks = [];
            recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
            recorder.onstop = () => { URL.revokeObjectURL(srcUrl); resolve(new Blob(chunks, { type: mimeType.split(';')[0] })); };
            recorder.onerror = e => { URL.revokeObjectURL(srcUrl); reject(e.error || new Error('Compression error')); };
            let animId;
            const draw = () => {
              if (!video.ended && !video.paused) {
                ctx.drawImage(video, 0, 0, w, h);
                onProgress && onProgress(video.currentTime / (video.duration || 1));
                animId = requestAnimationFrame(draw);
              }
            };
            video.onended = () => { cancelAnimationFrame(animId); recorder.stop(); };
            recorder.start(200);
            video.play().then(draw).catch(reject);
          };
          video.onerror = () => reject(new Error('Could not load video for compression'));
          video.load();
        });
      }

      async function handleFile(input, type, n) {
        const file = input.files[0];
        if (!file) return;

        const sizeMB = file.size / (1024 * 1024);
        const limitMB = type === 'video' ? MAX_VIDEO_MB : MAX_PHOTO_MB;

        if (sizeMB > limitMB) {
          if (type === 'video') {
            if (canCompressVideo()) {
              const go = confirm(`This video is ${sizeMB.toFixed(1)} MB — over the ${limitMB} MB limit.\n\nWould you like to compress it? It may take a few minutes.\n\nTap OK to compress, or Cancel to choose a different video.`);
              if (!go) { input.value = ''; return; }
              const msgEl = document.getElementById(`video-msg-new-${n}`);
              const btn = document.getElementById(`video-btn-new-${n}`);
              msgEl.style.display = 'block';
              msgEl.innerHTML = `<div class="compress-status">Compressing… 0%</div><div class="compress-bar-wrap"><div class="compress-bar" id="cbar-new-${n}"></div></div>`;
              btn.style.pointerEvents = 'none';
              let compressed;
              try {
                compressed = await compressVideo(file, p => {
                  document.getElementById(`cbar-new-${n}`).style.width = Math.round(p * 100) + '%';
                  msgEl.querySelector('.compress-status').textContent = `Compressing… ${Math.round(p * 100)}%`;
                });
              } catch (e) { compressed = null; }
              btn.style.pointerEvents = '';
              const compressedMB = compressed ? compressed.size / (1024 * 1024) : Infinity;
              if (compressed && compressedMB <= limitMB) {
                const compressedFile = new File([compressed], file.name.replace(/\.[^.]+$/, '.webm'), { type: compressed.type });
                msgEl.innerHTML = `<div class="compressed-badge">✓ Compressed to ${compressedMB.toFixed(1)} MB</div>`;
                input.value = '';
                newPairs[n][type] = compressedFile;
                btn.classList.add('selected');
                document.getElementById(`video-name-new-${n}`).textContent = compressedFile.name.length > 18 ? compressedFile.name.substring(0,18)+'…' : compressedFile.name;
                const sizeEl = document.getElementById(`video-size-new-${n}`);
                sizeEl.textContent = formatFileSize(compressedFile.size);
                sizeEl.className = 'file-size';
                const videoEl = document.createElement('video');
                videoEl.src = URL.createObjectURL(compressedFile);
                videoEl.muted = true; videoEl.playsInline = true; videoEl.currentTime = 0.5;
                videoEl.addEventListener('seeked', () => {
                  const c = document.createElement('canvas'); c.width = 130; c.height = 110;
                  c.getContext('2d').drawImage(videoEl, 0, 0, 130, 110);
                  document.getElementById(`video-preview-new-${n}`).src = c.toDataURL('image/jpeg');
                });
                videoEl.load();
                return;
              } else {
                msgEl.innerHTML = `<div class="video-msg-banner">Still too large. Try <a href="https://clideo.com/compress-video" target="_blank" rel="noopener">clideo.com</a> to compress further.</div>`;
                input.value = ''; return;
              }
            } else {
              const msgEl = document.getElementById(`video-msg-new-${n}`);
              msgEl.style.display = 'block';
              msgEl.innerHTML = `<div class="video-msg-banner">${sizeMB.toFixed(1)} MB — over limit. Compress free at <a href="https://clideo.com/compress-video" target="_blank" rel="noopener">clideo.com</a></div>`;
              input.value = ''; return;
            }
          } else {
            alert(`This photo is ${sizeMB.toFixed(1)} MB, which exceeds the ${MAX_PHOTO_MB} MB limit. Please choose a smaller photo.`);
            input.value = ''; return;
          }
        }

        const msgEl = document.getElementById(`video-msg-new-${n}`);
        if (msgEl) { msgEl.style.display = 'none'; msgEl.innerHTML = ''; }

        newPairs[n][type] = file;
        const btn = document.getElementById(`${type}-btn-new-${n}`);
        btn.classList.add('selected');
        const shortName = file.name.length > 18 ? file.name.substring(0,18)+'…' : file.name;
        document.getElementById(`${type}-name-new-${n}`).textContent = shortName;
        const sizeEl = document.getElementById(`${type}-size-new-${n}`);
        sizeEl.textContent = formatFileSize(file.size);
        sizeEl.className = 'file-size' + (sizeMB > limitMB * 0.8 ? ' warn' : '');

        if (type === 'photo') {
          document.getElementById(`photo-preview-new-${n}`).src = URL.createObjectURL(file);
        } else {
          const videoEl = document.createElement('video');
          videoEl.src = URL.createObjectURL(file);
          videoEl.muted = true; videoEl.playsInline = true; videoEl.currentTime = 0.5;
          videoEl.addEventListener('seeked', () => {
            const canvas = document.createElement('canvas');
            canvas.width = 110; canvas.height = 110;
            canvas.getContext('2d').drawImage(videoEl, 0, 0, 130, 110);
            document.getElementById(`video-preview-new-${n}`).src = canvas.toDataURL('image/jpeg');
          });
          videoEl.load();
        }
      }

      // ── Progress helpers ──────────────────────────────────────────────────────
      function setProgress(label, pct, isError) {
        const labelEl = document.getElementById('progress-label');
        labelEl.textContent = label;
        labelEl.className = isError ? 'error' : '';
        document.getElementById('progress-bar').style.width = pct + '%';
      }

      function showSaveError(msg) {
        setProgress(msg, 0, true);
        document.getElementById('save-btn').disabled = false;
        document.getElementById('try-again-btn').style.display = 'inline-block';
      }

      document.getElementById('try-again-btn').addEventListener('click', () => {
        setProgress('Starting...', 0, false);
        document.getElementById('try-again-btn').style.display = 'none';
        document.getElementById('progress').style.display = 'none';
        document.getElementById('save-btn').disabled = false;
      });

      // ── Save ──────────────────────────────────────────────────────────────────
      document.getElementById('save-btn').addEventListener('click', async () => {
        // Collect kept existing items (not deleted)
        const keptItems = existingItems.filter(item => !deletedExistingIds.has(item.id));
        // Collect complete new pairs
        const readyNew = Object.values(newPairs).filter(p => p.photo && p.video);

        if (keptItems.length + readyNew.length === 0) {
          alert('You need at least one page with both a photo and video.');
          return;
        }

        // Validate new video sizes (stale file guard)
        for (let i = 0; i < readyNew.length; i++) {
          if (readyNew[i].video.size === 0) {
            alert(`New page ${i+1}: video appears to be empty — it may have expired. Please remove and re-add it.`);
            return;
          }
        }

        if (typeof MINDAR === 'undefined' || !MINDAR.IMAGE || !MINDAR.IMAGE.Compiler) {
          alert('MindAR compiler not loaded yet. Please wait a moment and try again.');
          return;
        }

        document.getElementById('save-btn').disabled = true;
        document.getElementById('progress').style.display = 'block';
        document.getElementById('result').style.display = 'none';
        document.getElementById('try-again-btn').style.display = 'none';

        // ── Step 1: Load all photos as Image elements ─────────────────────────
        let images = [];
        // We need photos in final order: kept existing first, then new
        // For existing items, load from photo_url (crossOrigin)
        try {
          setProgress('Loading photos...', 2);
          for (const item of keptItems) {
            const img = new Image();
            const repPhoto = replacements[item.id] && replacements[item.id].photo;
            if (repPhoto) {
              img.src = URL.createObjectURL(repPhoto);
            } else {
              img.crossOrigin = 'anonymous';
              img.src = item.photo_url;
            }
            await new Promise((resolve, reject) => {
              img.onload = resolve;
              img.onerror = () => reject(new Error(`Could not load photo for page (target ${item.target_index}). Check your connection.`));
            });
            images.push(await resizeImage(img));
          }
          for (const pair of readyNew) {
            const img = new Image();
            img.src = URL.createObjectURL(pair.photo);
            await new Promise((resolve, reject) => {
              img.onload = resolve;
              img.onerror = () => reject(new Error(`Could not load photo "${pair.photo.name}".`));
            });
            images.push(await resizeImage(img));
          }
        } catch (err) {
          showSaveError('Step 1 failed — ' + err.message);
          return;
        }

        // ── Step 2: Compile .mind ─────────────────────────────────────────────
        let mindBlob;
        try {
          setProgress('Compiling image targets...', 5);
          const compiler = new MINDAR.IMAGE.Compiler();
          await compiler.compileImageTargets(images, (progress) => {
            setProgress(`Compiling image targets... ${Math.round(progress)}%`, 5 + progress * 0.40);
          });
          const mindBuffer = await compiler.exportData();
          mindBlob = new Blob([mindBuffer]);
        } catch (err) {
          showSaveError('Step 2 failed (compilation) — ' + (err.message || 'Compilation error.'));
          return;
        }

        // ── Step 3: Upload new .mind (overwrite) ──────────────────────────────
        let mindUrl;
        try {
          setProgress('Uploading image targets...', 50);
          const { error: mindError } = await db.storage
            .from('experiences')
            .upload(`${slug}/target.mind`, mindBlob, { contentType: 'application/octet-stream', upsert: true });
          if (mindError) throw mindError;
          mindUrl = db.storage.from('experiences').getPublicUrl(`${slug}/target.mind`).data.publicUrl + `?v=${Date.now()}`;
        } catch (err) {
          showSaveError('Step 3 failed (uploading targets) — ' + (err.message || 'Upload error.'));
          return;
        }

        // ── Step 4: Upload new video/photo files ──────────────────────────────
        // Final ordering: keptItems first (use their existing URLs), then readyNew
        // We'll assign new target_index values 0..N-1
        const finalItems = [];
        let idx = 0;

        // Kept existing items — reuse existing URLs, or upload replacements if chosen
        for (const item of keptItems) {
          let video_url = item.video_url;
          let photo_url = item.photo_url;
          const rep = replacements[item.id];
          if (rep && rep.video) {
            const vPath = `${slug}/video_${idx}.mp4`;
            await db.storage.from('experiences').remove([urlToStoragePath(item.video_url)].filter(Boolean));
            const { error: vErr } = await db.storage.from('experiences')
              .upload(vPath, rep.video, { contentType: rep.video.type || 'video/mp4', upsert: true });
            if (vErr) throw new Error(`Replacing video: ${vErr.message}`);
            video_url = db.storage.from('experiences').getPublicUrl(vPath).data.publicUrl;
          }
          if (rep && rep.photo) {
            const photoExt = rep.photo.name.split('.').pop() || 'jpg';
            const pPath = `${slug}/photo_${idx}.${photoExt}`;
            await db.storage.from('experiences').remove([urlToStoragePath(item.photo_url)].filter(Boolean));
            const { error: pErr } = await db.storage.from('experiences')
              .upload(pPath, rep.photo, { contentType: rep.photo.type || 'image/jpeg', upsert: true });
            if (pErr) throw new Error(`Replacing photo: ${pErr.message}`);
            photo_url = db.storage.from('experiences').getPublicUrl(pPath).data.publicUrl;
          }
          finalItems.push({ target_index: idx, video_url, photo_url });
          idx++;
        }

        // New pairs — upload files
        try {
          for (let i = 0; i < readyNew.length; i++) {
            setProgress(`Uploading new page ${i+1} of ${readyNew.length}...`, 55 + (i / readyNew.length) * 25);

            // Find a unique slot name (avoid collisions with existing files)
            const videoPath = `${slug}/video_${idx}.mp4`;
            const photoExt = readyNew[i].photo.name.split('.').pop() || 'jpg';
            const photoPath = `${slug}/photo_${idx}.${photoExt}`;

            const { error: vErr } = await db.storage
              .from('experiences')
              .upload(videoPath, readyNew[i].video, { contentType: readyNew[i].video.type || 'video/mp4' });
            if (vErr) throw new Error(`Video ${i+1}: ${vErr.message}`);

            const { error: pErr } = await db.storage
              .from('experiences')
              .upload(photoPath, readyNew[i].photo, { contentType: readyNew[i].photo.type || 'image/jpeg' });
            if (pErr) throw new Error(`Photo ${i+1}: ${pErr.message}`);

            finalItems.push({
              target_index: idx,
              video_url: db.storage.from('experiences').getPublicUrl(videoPath).data.publicUrl,
              photo_url: db.storage.from('experiences').getPublicUrl(photoPath).data.publicUrl
            });
            idx++;
          }
        } catch (err) {
          showSaveError('Step 4 failed (uploading files) — ' + (err.message || 'Upload error.'));
          return;
        }

        // ── Step 5: Delete storage files for removed items ────────────────────
        try {
          const removedItems = existingItems.filter(item => deletedExistingIds.has(item.id));
          if (removedItems.length > 0) {
            const paths = [];
            for (const item of removedItems) {
              // Extract path from public URL
              const vPath = urlToStoragePath(item.video_url);
              const pPath = urlToStoragePath(item.photo_url);
              if (vPath) paths.push(vPath);
              if (pPath) paths.push(pPath);
            }
            if (paths.length > 0) {
              const { error } = await db.storage.from('experiences').remove(paths);
              if (error) console.warn('Storage delete warning:', error.message);
            }
          }
        } catch (err) {
          console.warn('Could not delete old files:', err.message);
          // Non-fatal — continue
        }

        // ── Step 6: Update collections.mind_file_url and name ─────────────────
        try {
          setProgress('Saving collection...', 85);
          const name = document.getElementById('name-input').value.trim() || null;
          const { error } = await db.from('collections')
            .update({ mind_file_url: mindUrl, name })
            .eq('id', collectionId);
          if (error) throw error;
        } catch (err) {
          showSaveError('Step 5 failed (saving collection) — ' + (err.message || 'Database error.'));
          return;
        }

        // ── Step 7: Replace all collection_items ──────────────────────────────
        try {
          setProgress('Saving pages...', 90);
          // Delete ALL items for this collection (including any DB duplicates)
          const { error: delErr, count } = await db.from('collection_items')
            .delete({ count: 'exact' })
            .eq('collection_id', collectionId);
          if (delErr) throw new Error('Could not clear existing pages: ' + delErr.message);
          const rows = finalItems.map(fi => ({
            collection_id: collectionId,
            target_index: fi.target_index,
            video_url: fi.video_url,
            photo_url: fi.photo_url
          }));
          const { error: insErr } = await db.from('collection_items').insert(rows);
          if (insErr) throw insErr;
        } catch (err) {
          showSaveError('Step 6 failed (saving pages) — ' + (err.message || 'Database error.'));
          return;
        }

        // ── Done ──────────────────────────────────────────────────────────────
        setProgress('Done!', 100);
        const shortUrl = `popcode.app/${slug}`;
        const viewUrl = `https://popcode.app/${slug}`;
        document.getElementById('result-url').innerHTML = `<a href="${viewUrl}" target="_blank" rel="noopener" style="color:#6b3fa0;text-decoration:none;font-weight:600;">${shortUrl}</a>`;
        document.getElementById('result').style.display = 'block';
        document.getElementById('copy-btn').onclick = () => {
          navigator.clipboard.writeText(viewUrl);
          document.getElementById('copy-btn').textContent = 'Copied!';
        };
      });

      // ── Helpers ───────────────────────────────────────────────────────────────
      async function resizeImage(img) {
        const MAX_COMPILE_DIM = 640;
        if (img.naturalWidth <= MAX_COMPILE_DIM && img.naturalHeight <= MAX_COMPILE_DIM) return img;
        const scale = Math.min(MAX_COMPILE_DIM / img.naturalWidth, MAX_COMPILE_DIM / img.naturalHeight);
        const rc = document.createElement('canvas');
        rc.width = Math.round(img.naturalWidth * scale);
        rc.height = Math.round(img.naturalHeight * scale);
        rc.getContext('2d').drawImage(img, 0, 0, rc.width, rc.height);
        const resized = new Image();
        resized.src = rc.toDataURL('image/jpeg', 0.92);
        await new Promise(r => resized.onload = r);
        return resized;
      }

      function urlToStoragePath(url) {
        if (!url) return null;
        try {
          const u = new URL(url);
          // Supabase storage public URLs: /storage/v1/object/public/BUCKET/PATH
          const match = u.pathname.match(/\/storage\/v1\/object\/public\/experiences\/(.+)/);
          return match ? match[1] : null;
        } catch (e) { return null; }
      }

      function escapeHtml(str) {
        if (!str) return '';
        const d = document.createElement('div');
        d.appendChild(document.createTextNode(str));
        return d.innerHTML;
      }
    </script>
  </body>
</html>
