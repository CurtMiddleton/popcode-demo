<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mockup A — Clean White | Popcode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #ffffff;
      color: #111827;
      min-height: 100vh;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 24px 0;
      max-width: 560px;
      margin: 0 auto;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 28px;
      font-weight: 900;
      color: #7c3aed;
      letter-spacing: -0.5px;
    }

    .sign-out {
      font-size: 13px;
      color: #9ca3af;
      text-decoration: none;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.15s;
    }

    .sign-out:hover {
      color: #6b7280;
    }

    /* Main */
    .main {
      max-width: 560px;
      margin: 0 auto;
      padding: 56px 24px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 800;
      color: #111827;
      letter-spacing: -0.5px;
    }

    .btn-create {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border: 2px solid #7c3aed;
      color: #7c3aed;
      background: #ffffff;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }

    .btn-create:hover {
      background: #7c3aed;
      color: #ffffff;
    }

    .btn-create .plus {
      font-size: 18px;
      line-height: 1;
    }

    /* Cards */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      overflow: hidden;
    }

    .card-thumbnail {
      height: 120px;
      width: 100%;
      background: linear-gradient(135deg, #e0d7ff, #c4b5fd);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-thumbnail-icon {
      font-size: 32px;
      opacity: 0.4;
    }

    .card-body {
      padding: 16px 20px 20px;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 4px;
    }

    .card-meta {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 16px;
    }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 7px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: opacity 0.15s, background 0.15s;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .btn-view {
      background: #7c3aed;
      color: #ffffff;
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
    }

    .btn-delete {
      background: none;
      color: #ef4444;
      padding-left: 6px;
      padding-right: 6px;
      margin-left: auto;
    }

    .btn-delete:hover {
      opacity: 1;
      color: #dc2626;
    }

    /* Rename form (hidden by default, shown on card 2 as example) */
    .rename-form {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #f3f4f6;
    }

    .rename-input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #111827;
      outline: none;
      transition: border-color 0.15s;
    }

    .rename-input:focus {
      border-color: #7c3aed;
    }

    .btn-save {
      padding: 8px 16px;
      background: #7c3aed;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
    }

    .btn-cancel {
      padding: 8px 12px;
      background: none;
      color: #9ca3af;
      border: none;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
    }

    /* Footer */
    .footer {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 24px 48px;
      text-align: center;
    }

    .footer-note {
      font-size: 11px;
      color: #d1d5db;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <header class="header">
    <span class="logo">popcode</span>
    <button class="sign-out">Sign out</button>
  </header>

  <main class="main">
    <div class="page-header">
      <h1 class="page-title">My Collections</h1>
      <a href="#" class="btn-create">
        <span class="plus">+</span> Create New
      </a>
    </div>

    <div class="cards">

      <!-- Card 1: Summer Vacation -->
      <div class="card">
        <div class="card-thumbnail">
          <span class="card-thumbnail-icon">🏖</span>
        </div>
        <div class="card-body">
          <div class="card-title">Summer Vacation</div>
          <div class="card-meta">6 pages &middot; Created Mar 12, 2026</div>
          <div class="card-actions">
            <a href="#" class="btn btn-view">View</a>
            <button class="btn btn-secondary">Copy Link</button>
            <button class="btn btn-secondary">Rename</button>
            <button class="btn btn-delete">Delete</button>
          </div>
        </div>
      </div>

      <!-- Card 2: Baby's First Year — with rename form visible -->
      <div class="card">
        <div class="card-thumbnail" style="background: linear-gradient(135deg, #dbeafe, #bfdbfe);">
          <span class="card-thumbnail-icon">👶</span>
        </div>
        <div class="card-body">
          <div class="card-title">Baby's First Year</div>
          <div class="card-meta">12 pages &middot; Created Jan 4, 2026</div>
          <div class="card-actions">
            <a href="#" class="btn btn-view">View</a>
            <button class="btn btn-secondary">Copy Link</button>
            <button class="btn btn-secondary" style="background: #ede9fe; color: #7c3aed;">Rename</button>
            <button class="btn btn-delete">Delete</button>
          </div>
          <!-- Rename form (shown as active state example) -->
          <div class="rename-form">
            <input class="rename-input" type="text" value="Baby's First Year" />
            <button class="btn-save">Save</button>
            <button class="btn-cancel">Cancel</button>
          </div>
        </div>
      </div>

      <!-- Card 3: Wedding Day -->
      <div class="card">
        <div class="card-thumbnail" style="background: linear-gradient(135deg, #fce7f3, #fbcfe8);">
          <span class="card-thumbnail-icon">💍</span>
        </div>
        <div class="card-body">
          <div class="card-title">Wedding Day</div>
          <div class="card-meta">8 pages &middot; Created Sep 28, 2025</div>
          <div class="card-actions">
            <a href="#" class="btn btn-view">View</a>
            <button class="btn btn-secondary">Copy Link</button>
            <button class="btn btn-secondary">Rename</button>
            <button class="btn btn-delete">Delete</button>
          </div>
        </div>
      </div>

    </div>
  </main>

  <footer class="footer">
    <p class="footer-note">Design Concept A</p>
  </footer>

</body>
</html>
