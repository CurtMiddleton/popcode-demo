<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mockup B — Warm Cream | Popcode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Jost', sans-serif;
      background: #faf8f5;
      color: #1c1917;
      min-height: 100vh;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 28px 0;
      max-width: 580px;
      margin: 0 auto;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 900;
      color: #9333ea;
      letter-spacing: 0.05em;
    }

    .sign-out {
      font-size: 13px;
      color: #a8a29e;
      text-decoration: none;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.15s;
    }

    .sign-out:hover {
      color: #78716c;
    }

    /* Main */
    .main {
      max-width: 580px;
      margin: 0 auto;
      padding: 52px 28px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 44px;
    }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 800;
      color: #1c1917;
      letter-spacing: -0.5px;
    }

    .btn-create {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 11px 22px;
      border: none;
      color: #ffffff;
      background: #9333ea;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 12px rgba(147, 51, 234, 0.28);
      transition: box-shadow 0.15s, transform 0.1s;
    }

    .btn-create:hover {
      box-shadow: 0 6px 18px rgba(147, 51, 234, 0.36);
      transform: translateY(-1px);
    }

    .btn-create .plus {
      font-size: 18px;
      line-height: 1;
    }

    /* Cards */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .card {
      background: #ffffff;
      border: none;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      position: relative;
    }

    /* Bottom accent border */
    .card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: #e9d5ff;
    }

    .card-thumbnail {
      height: 130px;
      width: 100%;
      background: linear-gradient(135deg, #fde68a, #f9a8d4);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-thumbnail-icon {
      font-size: 36px;
      opacity: 0.5;
    }

    .card-body {
      padding: 18px 22px 24px;
    }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      font-weight: 700;
      color: #1c1917;
      margin-bottom: 5px;
    }

    .card-meta {
      font-size: 12px;
      color: #a8a29e;
      margin-bottom: 18px;
    }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 7px 15px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }

    .btn-view {
      background: #1c1917;
      color: #ffffff;
    }

    .btn-secondary {
      background: #f5f5f4;
      color: #44403c;
    }

    .btn-delete {
      background: #fee2e2;
      color: #dc2626;
      margin-left: auto;
    }

    /* Rename form (hidden by default, shown on card 2 as example) */
    .rename-form {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #f5f5f4;
    }

    .rename-input {
      flex: 1;
      padding: 9px 14px;
      border: 1.5px solid #e7e5e4;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      color: #1c1917;
      background: #faf8f5;
      outline: none;
      transition: border-color 0.15s;
    }

    .rename-input:focus {
      border-color: #9333ea;
    }

    .btn-save {
      padding: 9px 18px;
      background: #9333ea;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-cancel {
      padding: 9px 12px;
      background: none;
      color: #a8a29e;
      border: none;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
    }

    /* Collection count badge */
    .count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #f0e6ff;
      color: #9333ea;
      font-size: 11px;
      font-weight: 700;
      margin-left: 8px;
      vertical-align: middle;
    }

    /* Footer */
    .footer {
      max-width: 580px;
      margin: 0 auto;
      padding: 0 28px 56px;
      text-align: center;
    }

    .footer-note {
      font-size: 11px;
      color: #d6d3d1;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <header class="header">
    <span class="logo">popcode</span>
    <button class="sign-out">Sign out</button>
  </header>

  <main class="main">
    <div class="page-header">
      <h1 class="page-title">
        My Collections
        <span class="count-badge">3</span>
      </h1>
      <a href="#" class="btn-create">
        <span class="plus">+</span> Create New
      </a>
    </div>

    <div class="cards">

      <!-- Card 1: Summer Vacation -->
      <div class="card">
        <div class="card-thumbnail">
          <span class="card-thumbnail-icon">🏖</span>
        </div>
        <div class="card-body">
          <div class="card-title">Summer Vacation</div>
          <div class="card-meta">6 pages &middot; Created Mar 12, 2026</div>
          <div class="card-actions">
            <a href="#" class="btn btn-view">View</a>
            <button class="btn btn-secondary">Copy Link</button>
            <button class="btn btn-secondary">Rename</button>
            <button class="btn btn-delete">Delete</button>
          </div>
        </div>
      </div>

      <!-- Card 2: Baby's First Year — with rename form visible -->
      <div class="card">
        <div class="card-thumbnail" style="background: linear-gradient(135deg, #a5f3fc, #6ee7b7);">
          <span class="card-thumbnail-icon">👶</span>
        </div>
        <div class="card-body">
          <div class="card-title">Baby's First Year</div>
          <div class="card-meta">12 pages &middot; Created Jan 4, 2026</div>
          <div class="card-actions">
            <a href="#" class="btn btn-view">View</a>
            <button class="btn btn-secondary">Copy Link</button>
            <button class="btn btn-secondary" style="background: #f3e8ff; color: #9333ea;">Rename</button>
            <button class="btn btn-delete">Delete</button>
          </div>
          <!-- Rename form (shown as active state example) -->
          <div class="rename-form">
            <input class="rename-input" type="text" value="Baby's First Year" />
            <button class="btn-save">Save</button>
            <button class="btn-cancel">Cancel</button>
          </div>
        </div>
      </div>

      <!-- Card 3: Wedding Day -->
      <div class="card">
        <div class="card-thumbnail" style="background: linear-gradient(135deg, #fde68a, #fca5a5);">
          <span class="card-thumbnail-icon">💍</span>
        </div>
        <div class="card-body">
          <div class="card-title">Wedding Day</div>
          <div class="card-meta">8 pages &middot; Created Sep 28, 2025</div>
          <div class="card-actions">
            <a href="#" class="btn btn-view">View</a>
            <button class="btn btn-secondary">Copy Link</button>
            <button class="btn btn-secondary">Rename</button>
            <button class="btn btn-delete">Delete</button>
          </div>
        </div>
      </div>

    </div>
  </main>

  <footer class="footer">
    <p class="footer-note">Design Concept B</p>
  </footer>

</body>
</html>
